const WIZARD_TRIGGERS = {

};

const DEFAULT_SETTINGS = {
  calorieTarget: 1876, proteinTarget: 163, carbsTarget: 153, fatTarget: 68,
  weightUnit: "lbs", carbsDisplay: "total",
  goalWeight: 150, goalDate: "2026-09-14",
  aiProvider: "claude-haiku", aiEnabled: true, geminiApiKey: "", claudeApiKey: "",
  macroPreset: "Custom",
};

// ============================================================
// UTILS
// ============================================================
const fmtDate = (d) => d.toISOString().split("T")[0];
const todayStr = () => fmtDate(new Date());
const parseDateStr = (s) => { const p = s.split("-").map(Number); return new Date(p[0], p[1]-1, p[2]); };
const dayLabel = (s) => parseDateStr(s).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]; });
const round1 = (n) => Math.round(n * 10) / 10;

// ============================================================
// STORAGE (localStorage)
// ============================================================
const db = {
  get: function(key, fallback) {
    try { const v = localStorage.getItem("ml_" + key); return v ? JSON.parse(v) : fallback; }
    catch (e) { return fallback; }
  },
  set: function(key, val) {
    try { localStorage.setItem("ml_" + key, JSON.stringify(val)); return true; }
    catch (e) { console.error("Storage write failed:", e); return false; }
  },
};

// ============================================================
// STATE
// ============================================================
const state = {
  tab: "dashboard",
  date: todayStr(),
  settings: Object.assign({}, DEFAULT_SETTINGS, db.get("settings", {})),
  foodLogs: db.get("foodLogs", {}),
  weights: db.get("weights", {}),
  favorites: db.get("favorites", []),
  recentFoods: db.get("recentFoods", []),
  foodCache: db.get("foodCache", {}),
  ui: {}
};

function saveSettings() { db.set("settings", state.settings); }
function saveFoodLogs() { db.set("foodLogs", state.foodLogs); }
function saveWeights() { db.set("weights", state.weights); }
function saveFavorites() { db.set("favorites", state.favorites); }
function saveRecentFoods() { db.set("recentFoods", state.recentFoods); }
function saveFoodCache() { db.set("foodCache", state.foodCache); }

function cleanExpiredPhotos() {
  const now = new Date().toISOString();
  let changed = false;
  for (const d in state.foodLogs) {
    state.foodLogs[d] = state.foodLogs[d].map(function(e) {
      if (e.photo && e.photoExpires && e.photoExpires < now) {
        changed = true;
        return Object.assign({}, e, { photo: null, photoExpires: null });
      }
      return e;
    });
  }
  if (changed) saveFoodLogs();
}


// ============================================================
// API HELPERS
// ============================================================
async function searchUSDA(query) {
  try {
    const r = await fetch("https://api.nal.usda.gov/fdc/v1/foods/search?query=" + encodeURIComponent(query) + "&pageSize=15&api_key=DEMO_KEY");
    const d = await r.json();
    return (d.foods || []).map(function(f) {
      const get = function(name) {
        const n = (f.foodNutrients || []).find(function(x){ return x.nutrientName === name; });
        return n ? round1(n.value) : 0;
      };
      const desc = (f.description || "").toLowerCase();
      const cooked = desc.indexOf("cooked") >= 0 || desc.indexOf("grilled") >= 0 || desc.indexOf("baked") >= 0 || desc.indexOf("fried") >= 0 || desc.indexOf("roasted") >= 0 || desc.indexOf("broiled") >= 0;
      return {
        id: "usda_" + f.fdcId, name: f.description, brand: f.brandName || f.brandOwner || "",
        source: "USDA", per100g: true,
        calories: get("Energy"), protein: get("Protein"), carbs: get("Carbohydrate, by difference"),
        fat: get("Total lipid (fat)"), fiber: get("Fiber, total dietary"),
        state: cooked ? "Cooked" : (desc.indexOf("raw") >= 0 ? "Raw" : "\u2014"),
        servingSizes: [
          { label: "100g", grams: 100 },
          { label: "1 oz (28g)", grams: 28 },
          { label: "4 oz (113g)", grams: 113 },
          { label: "6 oz (170g)", grams: 170 },
          { label: "8 oz (227g)", grams: 227 },
        ],
      };
    });
  } catch (e) { return []; }
}

async function searchOpenFoodFacts(query) {
  try {
    const r = await fetch("https://world.openfoodfacts.org/cgi/search.pl?search_terms=" + encodeURIComponent(query) + "&search_simple=1&action=process&json=1&page_size=10");
    const d = await r.json();
    return (d.products || []).filter(function(p){ return p.nutriments; }).map(function(p) {
      const n = p.nutriments;
      const name = p.product_name || "Unknown";
      const sizes = [{ label: "100g", grams: 100 }];
      if (p.serving_quantity) sizes.push({ label: "1 serving (" + p.serving_quantity + "g)", grams: parseFloat(p.serving_quantity) });
      return {
        id: "off_" + (p._id || p.code), name: name, brand: p.brands || "",
        source: "Open Food Facts", per100g: true,
        calories: Math.round(n["energy-kcal_100g"] || 0),
        protein: round1(n.proteins_100g || 0),
        carbs: round1(n.carbohydrates_100g || 0),
        fat: round1(n.fat_100g || 0),
        fiber: round1(n.fiber_100g || 0),
        state: "\u2014",
        servingSizes: sizes,
      };
    });
  } catch (e) { return []; }
}

async function searchBarcode(code) {
  try {
    const r = await fetch("https://world.openfoodfacts.org/api/v0/product/" + code + ".json");
    const d = await r.json();
    if (d.status !== 1) return null;
    const p = d.product, n = p.nutriments;
    const sizes = [{ label: "100g", grams: 100 }];
    if (p.serving_quantity) sizes.push({ label: "1 serving (" + p.serving_quantity + "g)", grams: parseFloat(p.serving_quantity) });
    return {
      id: "off_" + p.code, name: p.product_name || "Unknown", brand: p.brands || "",
      source: "Open Food Facts (Barcode)", per100g: true,
      calories: Math.round(n["energy-kcal_100g"] || 0),
      protein: round1(n.proteins_100g || 0),
      carbs: round1(n.carbohydrates_100g || 0),
      fat: round1(n.fat_100g || 0),
      fiber: round1(n.fiber_100g || 0),
      state: "\u2014",
      servingSizes: sizes,
    };
  } catch (e) { return null; }
}

async function estimateWithClaude(description, photoBase64, model, apiKey) {
  const content = [];
  if (photoBase64) content.push({ type: "image", source: { type: "base64", media_type: "image/jpeg", data: photoBase64 } });
  content.push({ type: "text", text: 'Estimate the macronutrients for this food: "' + description + '". ' + (photoBase64 ? "A photo is attached for context." : "") + ' Return ONLY valid JSON (no markdown fences) as an array: [{"name":"food name","quantity_grams":number,"calories":number,"protein":number,"carbs":number,"fat":number,"fiber":number}]. Estimate realistic portion sizes. Be as accurate as possible.' });
  try {
    const modelId = model === "claude-sonnet" ? "claude-sonnet-4-6" : "claude-haiku-4-5-20251001";
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({ model: modelId, max_tokens: 1000, messages: [{ role: "user", content: content }] }),
    });
    const d = await r.json();
    if (d.error) { console.error("Claude API error:", d.error); return { error: d.error.message || "API error" }; }
    const text = (d.content || []).map(function(i){ return i.text || ""; }).join("");
    const clean = text.replace(/```json|```/g, "").trim();
    return { data: JSON.parse(clean) };
  } catch (e) { console.error("AI error:", e); return { error: e.message }; }
}

async function estimateWithGemini(description, apiKey) {
  try {
    const r = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=" + apiKey, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: 'Estimate macronutrients for: "' + description + '". Return ONLY valid JSON array: [{"name":"food name","quantity_grams":number,"calories":number,"protein":number,"carbs":number,"fat":number,"fiber":number}].' }] }],
      }),
    });
    const d = await r.json();
    if (d.error) return { error: d.error.message || "API error" };
    const text = d.candidates && d.candidates[0] && d.candidates[0].content.parts[0].text || "";
    return { data: JSON.parse(text.replace(/```json|```/g, "").trim()) };
  } catch (e) { return { error: e.message }; }
}

function deduplicateFoods(foods) {
  const merged = [];
  const seen = new Map();
  for (let i = 0; i < foods.length; i++) {
    const f = foods[i];
    const key = f.name.toLowerCase().trim() + "_" + f.calories + "_" + f.protein;
    if (seen.has(key)) {
      const existing = seen.get(key);
      if (existing.source.indexOf(f.source) < 0) existing.source += " \u2022 " + f.source;
    } else {
      const copy = Object.assign({}, f);
      seen.set(key, copy);
      merged.push(copy);
    }
  }
  return merged;
}

function calcMacrosForWeight(food, grams) {
  if (!food) return { calories: 0, protein: 0, carbs: 0, fat: 0, fiber: 0 };
  const base = food.per100g ? 100 : ((food.servingSizes && food.servingSizes[0] && food.servingSizes[0].grams) || 100);
  const mult = grams / base;
  return {
    calories: Math.round(food.calories * mult),
    protein: round1(food.protein * mult),
    carbs: round1(food.carbs * mult),
    fat: round1(food.fat * mult),
    fiber: round1((food.fiber || 0) * mult),
  };
}


// ============================================================
// TINY RENDER ENGINE
// A single root re-render on every state change. Uses event
// delegation on #app so we never need to worry about rebinding
// listeners after re-render.
// ============================================================
const root = document.getElementById("app");
let pendingFocusId = null; // element id to focus after next render

function render() {
  root.innerHTML = renderApp();
  if (pendingFocusId) {
    const el = document.getElementById(pendingFocusId);
    if (el) { el.focus(); if (el.select) { try { el.select(); } catch(e){} } }
    pendingFocusId = null;
  }
}

function rerender() { render(); }

// Delegated click handling: any element with data-action gets routed here.
root.addEventListener("click", function(e) {
  const el = e.target.closest("[data-action]");
  if (!el) return;
  const action = el.getAttribute("data-action");
  const arg = el.getAttribute("data-arg");
  const arg2 = el.getAttribute("data-arg2");
  if (typeof actions[action] === "function") {
    actions[action](arg, arg2, el);
  }
});

// Delegated input handling for text/number inputs bound via data-bind
root.addEventListener("input", function(e) {
  const el = e.target;
  const bind = el.getAttribute && el.getAttribute("data-bind");
  if (bind && typeof inputActions[bind] === "function") {
    inputActions[bind](el.value, el);
  }
});

root.addEventListener("change", function(e) {
  const el = e.target;
  const bind = el.getAttribute && el.getAttribute("data-change");
  if (bind && typeof changeActions[bind] === "function") {
    changeActions[bind](el, e);
  }
});

const actions = {};
const inputActions = {};
const changeActions = {};

function esc_attr(s) { return esc(s).replace(/"/g, "&quot;"); }


// ============================================================
// UI HELPER RENDER FUNCTIONS (return HTML strings)
// ============================================================
function progressBar(value, max, color, label, sublabel, unit) {
  unit = unit || "g";
  const pct = max > 0 ? Math.min((value / max) * 100, 100) : 0;
  const over = value > max;
  return '' +
    '<div class="pbWrap">' +
      '<div class="pbTop">' +
        '<div class="pbLeft">' +
          '<div class="pbDot" style="background:' + color + '"></div>' +
          '<span class="pbLabel">' + esc(label) + '</span>' +
          (sublabel ? '<span class="pbSub">' + esc(sublabel) + '</span>' : '') +

function badge(text, color) {

  return '<span class="badge" style="background:' + color + '22;color:' + color + '">' + esc(text) + '</span>';

function statCard(label, value, color) {

      '<div class="statLabel">' + esc(label) + '</div>' +
      '<div class="statValue" style="color:' + color + '">' + esc(value) + '</div>' +
    '</div>';
}

function btn(opts) {
  // opts: {label, action, arg, arg2, color, outline, full, small, disabled, extraStyle, id}
  const classes = ["btn"];
  if (opts.outline) classes.push("outline");
  if (opts.full) classes.push("full");
  if (opts.small) classes.push("small");
  if (opts.color === "danger") classes.push("danger");
  const style = opts.color && opts.color !== "danger" ? ' style="background:' + (opts.outline ? "transparent" : opts.color) + ';' + (opts.outline ? "color:" + opts.color + ";border-color:" + opts.color : "") + (opts.extraStyle || "") + '"' : (opts.extraStyle ? ' style="' + opts.extraStyle + '"' : "");
  return '<button class="' + classes.join(" ") + '"' +
    (opts.id ? ' id="' + opts.id + '"' : '') +
    ' data-action="' + esc_attr(opts.action) + '"' +
    (opts.arg !== undefined ? ' data-arg="' + esc_attr(opts.arg) + '"' : '') +
    (opts.arg2 !== undefined ? ' data-arg2="' + esc_attr(opts.arg2) + '"' : '') +
    (opts.disabled ? ' disabled' : '') +
    style + '>' + esc(opts.label) + '</button>';
}

function textInput(opts) {
  // opts: {id, value, placeholder, type, bind, style}
  return '<input class="input" type="' + (opts.type || "text") + '"' +
    (opts.id ? ' id="' + opts.id + '"' : '') +
    ' value="' + esc_attr(opts.value == null ? "" : opts.value) + '"' +
    (opts.placeholder ? ' placeholder="' + esc_attr(opts.placeholder) + '"' : '') +
    (opts.bind ? ' data-bind="' + esc_attr(opts.bind) + '"' : '') +
    (opts.step ? ' step="' + opts.step + '"' : '') +
    (opts.style ? ' style="' + opts.style + '"' : '') + '>';
}

function toggleSwitch(on, action, arg) {
  return '<button class="toggle' + (on ? ' on' : '') + '" data-action="' + esc_attr(action) + '"' +
    (arg !== undefined ? ' data-arg="' + esc_attr(arg) + '"' : '') + '><div class="toggleDot"></div></button>';
}

function card(innerHtml, extraStyle) {
  return '<div class="card"' + (extraStyle ? ' style="' + extraStyle + '"' : '') + '>' + innerHtml + '</div>';
}

// DATA HELPERS
// ============================================================
function getDayTotals(date) {
  const entries = state.foodLogs[date] || [];
  return entries.reduce(function(acc, e) {
    return {
      calories: acc.calories + (e.macros.calories || 0),
      protein: acc.protein + (e.macros.protein || 0),
      carbs: acc.carbs + (e.macros.carbs || 0),
      fat: acc.fat + (e.macros.fat || 0),
      fiber: acc.fiber + (e.macros.fiber || 0),
    };
  }, { calories: 0, protein: 0, carbs: 0, fat: 0, fiber: 0 });
}

function addFoodToLog(food) {
  const entry = {
    id: "log_" + Date.now() + "_" + Math.random().toString(36).slice(2,7),
    foodId: food.id, name: food.name,
    weight: food.loggedWeight || 100,
    macros: food.loggedMacros || { calories: food.calories, protein: food.protein, carbs: food.carbs, fat: food.fat, fiber: food.fiber || 0 },
    timestamp: food.timestamp || new Date().toISOString(),
    source: food.source || "Manual",
    photo: food.photo || null,
    photoExpires: food.photo ? new Date(Date.now() + 2*24*60*60*1000).toISOString() : null,
  };
  if (!state.foodLogs[state.date]) state.foodLogs[state.date] = [];
  state.foodLogs[state.date].push(entry);
  saveFoodLogs();

  if (food.wizardUsed && !state.favorites.find(function(f){ return f.id === food.id; })) {
    state.favorites.unshift(Object.assign({}, food, { addedAt: new Date().toISOString() }));
    state.favorites = state.favorites.slice(0, 100);
    saveFavorites();
  }
  state.recentFoods = [Object.assign({}, food, { lastUsed: new Date().toISOString() })]
    .concat(state.recentFoods.filter(function(r){ return r.id !== food.id; }))
    .slice(0, 50);
  saveRecentFoods();

  if (!state.foodCache[food.id]) {
    state.foodCache[food.id] = food;
    saveFoodCache();
  }
}

function removeFoodFromLog(entryId) {
  state.foodLogs[state.date] = (state.foodLogs[state.date] || []).filter(function(e){ return e.id !== entryId; });
  saveFoodLogs();
}

function updateFoodEntry(entryId, updates) {
  state.foodLogs[state.date] = (state.foodLogs[state.date] || []).map(function(e) {
    return e.id === entryId ? Object.assign({}, e, updates) : e;
  });
  saveFoodLogs();
}

function renderDashboard() {
  const totals = getDayTotals(state.date);
  const set = state.settings;
  const calPct = set.calorieTarget > 0 ? Math.round((totals.calories / set.calorieTarget) * 100) : 0;
  const remaining = set.calorieTarget - totals.calories;
  const entries = state.foodLogs[state.date] || [];

  let html = card(
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">' +
      '<div>' +
        '<div style="font-size:42px;font-weight:800;line-height:1;letter-spacing:-1px">' + Math.round(totals.calories).toLocaleString() + '</div>' +
        '<div style="color:' + C.textMut + ';font-size:14px;margin-top:4px">of ' + set.calorieTarget.toLocaleString() + ' kcal</div>' +
      '</div>' +
      '<div style="text-align:right">' +
        '<div style="font-size:28px;font-weight:700;color:' + (remaining >= 0 ? C.success : C.danger) + '">' + Math.abs(Math.round(remaining)) + '</div>' +
        '<div style="color:' + C.textMut + ';font-size:12px;text-transform:uppercase">' + (remaining >= 0 ? "Remaining" : "Over") + '</div>' +
        '<div style="color:' + C.textMut + ';font-size:13px;margin-top:2px">' + calPct + '% done</div>' +
      '</div>' +
    '</div>' +
    progressBar(totals.calories, set.calorieTarget, C.calories, "Calories", "", " kcal") +
    progressBar(totals.protein, set.proteinTarget, C.protein, "Protein") +
    progressBar(totals.carbs, set.carbsTarget, C.carbs, "Carbs", totals.fiber > 0 ? "(" + Math.round(totals.fiber) + "g fiber)" : "") +
    progressBar(totals.fat, set.fatTarget, C.fat, "Fat")
  );

  html += '<div class="row" style="margin-bottom:16px">' + btn({ label: "\uFF0B Add Food", action: "setTab", arg: "food", full: true }) + '</div>';

  if (entries.length > 0) {
    // group by hour
    const groups = {};
    const order = [];
    entries.forEach(function(e) {
      const h = new Date(e.timestamp).getHours();
      const label = (h === 0 ? 12 : h > 12 ? h - 12 : h) + " " + (h >= 12 ? "PM" : "AM");
      if (!groups[label]) { groups[label] = []; order.push(label); }
      groups[label].push(e);
    });
    let logHtml = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">' +
      '<h3 class="cardTitle" style="margin:0">Today\'s Log</h3>' +
      '<span style="color:' + C.textMut + ';font-size:13px">' + entries.length + ' items</span></div>';

    order.slice().reverse().forEach(function(timeLabel) {
      const items = groups[timeLabel];
      const groupCals = items.reduce(function(a,i){ return a + (i.macros.calories||0); }, 0);
      logHtml += '<div style="display:flex;justify-content:space-between;align-items:center;margin:12px 0 8px">' +
        '<span style="color:' + C.textSec + ';font-size:13px;font-weight:600">\u{1F550} ' + timeLabel + '</span>' +
        '<span style="color:' + C.textMut + ';font-size:12px">' + groupCals + ' kcal</span></div>';
      items.forEach(function(entry) {
        logHtml += renderFoodEntry(entry);
      });
    });
    html += card(logHtml);
  } else {
    html += card('<div class="empty"><div style="font-size:32px;margin-bottom:8px">\u{1F37D}</div><div style="color:' + C.textSec + ';font-size:15px">No food logged yet today</div><div style="color:' + C.textMut + ';font-size:13px;margin-top:4px">Tap "Add Food" to get started</div></div>');
  }

  return html;
}

function macroEditField(key, label, value) {
  return '<div><label class="label" style="text-transform:capitalize">' + label + '</label>' +
    '<input class="input" type="number" id="editMacro_' + key + '" value="' + value + '" style="padding:6px;font-size:13px"></div>';
}

actions.toggleEditEntry = function(entryId) {
  if (state.ui.editingEntryId === entryId) { state.ui.editingEntryId = null; }
  else { state.ui.editingEntryId = entryId; state.ui.editMode = "weight"; }
  rerender();
};
actions.setEditMode = function(mode) { state.ui.editMode = mode; rerender(); };
actions.removeFood = function(entryId) { removeFoodFromLog(entryId); rerender(); };

actions.saveEditWeight = function(entryId) {
  const input = document.getElementById("editWeightInput");
  const w = parseFloat(input.value);
  if (!w || w <= 0) return;
  const entry = (state.foodLogs[state.date] || []).find(function(e){ return e.id === entryId; });
  if (!entry) return;
  const ratio = w / entry.weight;
  updateFoodEntry(entryId, {
    weight: w,
    macros: {
      calories: Math.round(entry.macros.calories * ratio),
      protein: round1(entry.macros.protein * ratio),
      carbs: round1(entry.macros.carbs * ratio),
      fat: round1(entry.macros.fat * ratio),
      fiber: round1((entry.macros.fiber||0) * ratio),
    }
  });
  state.ui.editingEntryId = null;
  rerender();
};

actions.saveEditMacros = function(entryId) {
  const p = parseFloat(document.getElementById("editMacro_protein").value) || 0;
  const c = parseFloat(document.getElementById("editMacro_carbs").value) || 0;
  const f = parseFloat(document.getElementById("editMacro_fat").value) || 0;
  const fib = parseFloat(document.getElementById("editMacro_fiber").value) || 0;
  updateFoodEntry(entryId, { macros: { protein: p, carbs: c, fat: f, fiber: fib, calories: Math.round(p*4 + c*4 + f*9) } });
  state.ui.editingEntryId = null;
  rerender();
};

function detectWizard(q) {
  const lower = q.toLowerCase().trim();
  for (const type in WIZARD_TRIGGERS) {
    const triggers = WIZARD_TRIGGERS[type];
    for (let i = 0; i < triggers.length; i++) {
      if (lower.indexOf(triggers[i]) >= 0) return type;
    }
  }
  return null;
}

actions.doFoodSearch = async function() {

  if (!fu.query.trim()) return;
  fu.searching = true;
  fu.wizardSuggestion = detectWizard(fu.query);
  const cacheResults = Object.values(state.foodCache).filter(function(f){
    return f.name.toLowerCase().indexOf(fu.query.toLowerCase()) >= 0;
  }).map(function(f){ return Object.assign({}, f, { source: f.source + " (Cached)" }); });
  fu.results = cacheResults;
  rerender();

  const usdaP = searchUSDA(fu.query);
  const offP = searchOpenFoodFacts(fu.query);
  const usda = await usdaP, off = await offP;
  fu.results = deduplicateFoods(cacheResults.concat(usda, off));
  fu.searching = false;
  rerender();
};

actions.runAIEstimate = async function() {
  const fu = foodUi();
  if (!fu.aiDesc.trim() && !fu.aiPhoto) return;

  if (state.settings.aiProvider === "gemini" && state.settings.geminiApiKey) {

function renderWizardScreen(fu) {
  const config = WIZARD_CONFIGS[fu.wizardType];

  let html = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">' +

    inner = renderWizardAI(config, wiz);
  } else {

  html += card(inner);

}

  const currentStep = config.steps[wiz.step];

    html += '<button class="wizOpt" data-action="wizardSelect" data-arg="' + esc_attr(opt) + '">' + esc(opt) + '</button>';

actions.wizardSelect = async function(option) {
  const fu = foodUi();
  const wiz = fu.wizard;
  const config = WIZARD_CONFIGS[fu.wizardType];
  const currentStep = config.steps[wiz.step];
  wiz.selections[currentStep.key] = option;
  const isLastStep = wiz.step === config.steps.length - 1;

  if (option === "Other") {
    wiz.showAI = true;
    rerender();
    return;
  }
  if (isLastStep) {
    wiz.searching = true;
    rerender();
    const parts = [config.label];
    Object.keys(wiz.selections).forEach(function(k) {
      const v = wiz.selections[k];
      if (v !== "Other" && v !== "As-Served") parts.push(v);
    });
    const query = parts.join(" ");
    const usda = await searchUSDA(query);
    const off = await searchOpenFoodFacts(query);
    const merged = deduplicateFoods(usda.concat(off));
    wiz.searchResults = merged;
    wiz.searching = false;
    if (merged.length > 0) wiz.selectedFood = merged[0];
    rerender();
  } else {
    wiz.step += 1;
    rerender();
  }
};

actions.wizardSelectFood = function(foodId) {
  const wiz = foodUi().wizard;

  if (f) wiz.selectedFood = f;
  rerender();

actions.wizardAiEstimate = async function() {
  const fu = foodUi();
  const wiz = fu.wizard;
  if (!wiz.aiDesc.trim()) return;
  wiz.aiLoading = true; wiz.aiError = null;
  rerender();
  const config = WIZARD_CONFIGS[fu.wizardType];
  const parts = [config.label];
  Object.keys(wiz.selections).forEach(function(k) { if (wiz.selections[k] !== "Other") parts.push(wiz.selections[k]); });
  const fullDesc = parts.join(", ") + ": " + wiz.aiDesc;

  let result;
  if (state.settings.aiProvider === "gemini" && state.settings.geminiApiKey) {
    result = await estimateWithGemini(fullDesc, state.settings.geminiApiKey);
  } else if (!state.settings.claudeApiKey) {
    result = { error: "No Claude API key set. Add one in Strategy \u2192 AI Settings." };
  } else {
    result = await estimateWithClaude(fullDesc, null, state.settings.aiProvider, state.settings.claudeApiKey);
  }
  wiz.aiLoading = false;
  if (result.error) { wiz.aiError = result.error; rerender(); return; }
  if (result.data && result.data.length > 0) {
    const est = result.data[0];
    wiz.selectedFood = {
      id: "ai_" + Date.now(), name: est.name || fullDesc, source: "AI Estimate",
      calories: est.calories, protein: est.protein, carbs: est.carbs, fat: est.fat, fiber: est.fiber || 0,
      state: wiz.selections.prep || "\u2014",
      servingSizes: [{ label: est.quantity_grams + "g", grams: est.quantity_grams }],
      per100g: false,
    };
    wiz.weight = String(est.quantity_grams || 100);
    wiz.searchResults = [];
  }
  wiz.showAI = false;
  rerender();
};

actions.wizardConfirmAdd = function() {
  const fu = foodUi();
  const wiz = fu.wizard;
  if (!wiz.selectedFood) return;
  const w = parseFloat(wiz.weight) || 100;
  const m = calcMacrosForWeight(wiz.selectedFood, w);

function renderWeightChart(data, goalWeight) {
  const w = 460, h = 200, padL = 36, padR = 10, padT = 10, padB = 24;
  const weights = data.map(function(d){ return d.weight; });
  let minW = Math.min.apply(null, weights), maxW = Math.max.apply(null, weights);
  if (goalWeight) { minW = Math.min(minW, goalWeight); maxW = Math.max(maxW, goalWeight); }
  const pad = (maxW - minW) * 0.15 || 2;
  minW -= pad; maxW += pad;
  const xStep = data.length > 1 ? (w - padL - padR) / (data.length - 1) : 0;
  const yScale = function(val) { return padT + (1 - (val - minW) / (maxW - minW)) * (h - padT - padB); };
  const xScale = function(i) { return padL + i * xStep; };

  let path = "";
  data.forEach(function(d, i) {
    const x = xScale(i), y = yScale(d.weight);
    path += (i === 0 ? "M" : "L") + x.toFixed(1) + "," + y.toFixed(1) + " ";
  });

  let dots = "";
  data.forEach(function(d, i) {
    dots += '<circle cx="' + xScale(i).toFixed(1) + '" cy="' + yScale(d.weight).toFixed(1) + '" r="3" fill="' + C.primary + '"></circle>';
  });

  let gridLines = "";
  const numGrid = 4;
  for (let g = 0; g <= numGrid; g++) {
    const y = padT + (g / numGrid) * (h - padT - padB);
    gridLines += '<line x1="' + padL + '" y1="' + y.toFixed(1) + '" x2="' + (w-padR) + '" y2="' + y.toFixed(1) + '" stroke="' + C.border + '" stroke-width="1" stroke-dasharray="3,3"></line>';
  }

  let xLabels = "";
  const labelEvery = Math.max(1, Math.ceil(data.length / 5));
  data.forEach(function(d, i) {
    if (i % labelEvery === 0 || i === data.length - 1) {
      const lbl = parseDateStr(d.date).toLocaleDateString("en-US", { month: "short", day: "numeric" });
      xLabels += '<text x="' + xScale(i).toFixed(1) + '" y="' + (h-6) + '" font-size="10" fill="' + C.textMut + '" text-anchor="middle">' + lbl + '</text>';
    }
  });

  let yLabels = "";
  for (let g = 0; g <= numGrid; g++) {
    const val = maxW - (g / numGrid) * (maxW - minW);
    const y = padT + (g / numGrid) * (h - padT - padB);
    yLabels += '<text x="4" y="' + (y+3).toFixed(1) + '" font-size="10" fill="' + C.textMut + '">' + Math.round(val) + '</text>';
  }

  let goalLine = "";
  if (goalWeight && goalWeight >= minW && goalWeight <= maxW) {
    const gy = yScale(goalWeight);
    goalLine = '<line x1="' + padL + '" y1="' + gy.toFixed(1) + '" x2="' + (w-padR) + '" y2="' + gy.toFixed(1) + '" stroke="' + C.success + '" stroke-width="1.5" stroke-dasharray="5,5"></line>' +
      '<text x="' + (w-padR) + '" y="' + (gy-4).toFixed(1) + '" font-size="10" fill="' + C.success + '" text-anchor="end">Goal: ' + goalWeight + '</text>';
  }

  return '<div style="width:100%;overflow-x:auto"><svg viewBox="0 0 ' + w + ' ' + h + '" style="width:100%;height:220px" preserveAspectRatio="xMidYMid meet">' +
    gridLines + yLabels + xLabels + goalLine +
    '<path d="' + path + '" fill="none" stroke="' + C.primary + '" stroke-width="2"></path>' +
    dots +
  '</svg></div>';
}

function parseCsvLine(line) {
  const result = [];
  let cur = "", inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQuotes) {
      if (c === '"') {
        if (line[i+1] === '"') { cur += '"'; i++; }
        else { inQuotes = false; }
      } else { cur += c; }
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { result.push(cur); cur = ""; }
      else cur += c;
    }
  }
  result.push(cur);
  return result;
}

changeActions.renphoImport = function(el) {
  const file = el.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const text = ev.target.result;
      const lines = text.split("\n").filter(function(l){ return l.trim(); });
      const cols0 = parseCsvLine(lines[0]).map(function(h){ return h.toLowerCase(); });
      const dateIdx = cols0.findIndex(function(h){ return h.indexOf("time") >= 0 || h.indexOf("date") >= 0; });
      const weightIdx = cols0.findIndex(function(h){ return h.indexOf("weight") >= 0; });
      if (dateIdx < 0 || weightIdx < 0) { weightUi().importMsg = "Could not detect date/weight columns"; rerender(); return; }
      let count = 0;
      for (let i = 1; i < lines.length; i++) {
        const cols = parseCsvLine(lines[i]);
        if (cols.length <= Math.max(dateIdx, weightIdx)) continue;
        const dateStr = cols[dateIdx].trim().replace(/"/g, "");
        const w = parseFloat(cols[weightIdx].trim().replace(/"/g, ""));
        if (!w || isNaN(w)) continue;
        let d;
        if (dateStr.indexOf("/") >= 0) {
          const parts = dateStr.split(/[\s/]/);
          if (parts[2] && parts[2].length === 4) d = parts[2] + "-" + parts[0].padStart(2,"0") + "-" + parts[1].padStart(2,"0");
          else d = fmtDate(new Date(dateStr));
        } else {
          d = fmtDate(new Date(dateStr));
        }
        if (d && d !== "NaN-NaN-NaN" && !state.weights[d]) {
          state.weights[d] = { weight: w, unit: "lbs", timestamp: new Date(dateStr).toISOString() };
          count++;
        }
      }
      saveWeights();
      weightUi().importMsg = "Imported " + count + " weight entries";
      rerender();
    } catch (e) {
      weightUi().importMsg = "Error parsing file. Check format.";
      rerender();
    }
  };
  reader.readAsText(file);
  el.value = "";
};

function renderDataSection() {
  const su = strategyUi();
  let html = '<h3 class="cardTitle">Data Management</h3>';
  html += '<div style="display:flex;flex-direction:column;gap:10px">';
  html += btn({ label: "\u{1F4E4} Export All Data (JSON)", action: "exportData", outline: true, full: true });
  html += '<input type="file" accept=".json" id="importFileInput" data-change="importData" style="display:none">';
  html += btn({ label: "\u{1F4E5} Import Data (JSON)", action: "clickImportData", outline: true, full: true });
  html += '<div style="border-top:1px solid ' + C.border + ';margin:8px 0"></div>';
  if (!su.confirmClear) {
    html += btn({ label: "\u{1F5D1} Clear All Data", action: "askConfirmClear", outline: true, full: true, color: "danger" });
  } else {
    html += '<div style="padding:16px;background:' + C.danger + '11;border-radius:12px;border:1px solid ' + C.danger + '33">' +
      '<div style="color:' + C.danger + ';font-weight:600;margin-bottom:8px">Are you sure?</div>' +
      '<div style="color:' + C.textSec + ';font-size:13px;margin-bottom:12px">This will permanently delete all your food logs, weight history, favorites, and settings. Export your data first if you want to keep it.</div>' +
      '<div class="row">' + btn({ label: "Cancel", action: "cancelConfirmClear", outline: true, small: true, full: true }) + btn({ label: "Delete Everything", action: "clearAllData", small: true, full: true, color: "danger" }) + '</div>' +
    '</div>';
  }
  html += '</div>';
  html += '<div style="color:' + C.textMut + ';font-size:11px;margin-top:16px;text-align:center">MacroLog v1.0</div>';
  return card(html);
}

actions.exportData = function() {
  const exportObj = { settings: state.settings, foodLogs: state.foodLogs, weights: state.weights, favorites: state.favorites, recentFoods: state.recentFoods, exportDate: new Date().toISOString(), version: "1.0" };
  const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "macrolog-export-" + todayStr() + ".json"; a.click();
  URL.revokeObjectURL(url);
};
actions.clickImportData = function() { const el = document.getElementById("importFileInput"); if (el) el.click(); };
changeActions.importData = function(el) {
  const file = el.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.settings) { state.settings = Object.assign({}, DEFAULT_SETTINGS, data.settings); saveSettings(); }
      if (data.foodLogs) { state.foodLogs = data.foodLogs; saveFoodLogs(); }
      if (data.weights) { state.weights = data.weights; saveWeights(); }
      if (data.favorites) { state.favorites = data.favorites; saveFavorites(); }
      if (data.recentFoods) { state.recentFoods = data.recentFoods; saveRecentFoods(); }
      alert("Data imported successfully!");
      rerender();
    } catch (e) { alert("Error importing data. Check file format."); }
  };
  reader.readAsText(file);
  el.value = "";
};
actions.askConfirmClear = function() { strategyUi().confirmClear = true; rerender(); };
actions.cancelConfirmClear = function() { strategyUi().confirmClear = false; rerender(); };
actions.clearAllData = function() {
  state.settings = Object.assign({}, DEFAULT_SETTINGS);
  state.foodLogs = {}; state.weights = {}; state.favorites = []; state.recentFoods = []; state.foodCache = {};
  saveSettings(); saveFoodLogs(); saveWeights(); saveFavorites(); saveRecentFoods(); saveFoodCache();
  strategyUi().confirmClear = false;
  rerender();
};

cleanExpiredPhotos();
render();
