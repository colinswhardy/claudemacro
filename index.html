const fmtDate = (d) => d.toISOString().split("T")[0];
const todayStr = () => fmtDate(new Date());
const parseDateStr = (s) => { const p = s.split("-").map(Number); return new Date(p[0], p[1]-1, p[2]); };
const dayLabel = (s) => parseDateStr(s).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]; });
const round1 = (n) => Math.round(n * 10) / 10;

// ============================================================
// STORAGE (localStorage)

const db = {
  get: function(key, fallback) {
    try { const v = localStorage.getItem("ml_" + key); return v ? JSON.parse(v) : fallback; }
    catch (e) { return fallback; }
  },
  set: function(key, val) {
    try { localStorage.setItem("ml_" + key, JSON.stringify(val)); return true; }
    catch (e) { console.error("Storage write failed:", e); return false; }

};

function cleanExpiredPhotos() {
  const now = new Date().toISOString();
  let changed = false;
  for (const d in state.foodLogs) {
    state.foodLogs[d] = state.foodLogs[d].map(function(e) {
      if (e.photo && e.photoExpires && e.photoExpires < now) {
        changed = true;
        return Object.assign({}, e, { photo: null, photoExpires: null });
      }
      return e;
    });
  }
  if (changed) saveFoodLogs();
}


// ============================================================
// API HELPERS
// ============================================================

// ---- Supabase auth (plain REST, no SDK) ----
function saveSession(session) {
  state.session = session;
  state.authError = null;
  db.set("supabaseSession", session);
}
function clearSession() {
  state.session = null;
  db.set("supabaseSession", null);
}

async function supabaseSignIn(email, password) {
  try {
    const r = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=password", {
      method: "POST",
      headers: { "Content-Type": "application/json", "apikey": SUPABASE_ANON_KEY },
      body: JSON.stringify({ email: email, password: password }),
    });
    const d = await r.json();
    if (!r.ok) return { error: d.error_description || d.msg || d.message || d.error || "Sign in failed" };
    return {
      data: {
        accessToken: d.access_token, refreshToken: d.refresh_token,
        expiresAt: Date.now() + (d.expires_in || 3600) * 1000,
        userId: d.user && d.user.id, email: d.user && d.user.email,
      }
    };
  } catch (e) { return { error: e.message }; }
}

async function supabaseRefreshSession() {
  if (!state.session || !state.session.refreshToken) return null;
  try {
    const r = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=refresh_token", {
      method: "POST",
      headers: { "Content-Type": "application/json", "apikey": SUPABASE_ANON_KEY },
      body: JSON.stringify({ refresh_token: state.session.refreshToken }),
    });
    const d = await r.json();
    if (!r.ok) { clearSession(); return null; }
    const session = {
      accessToken: d.access_token, refreshToken: d.refresh_token,
      expiresAt: Date.now() + (d.expires_in || 3600) * 1000,
      userId: d.user && d.user.id, email: d.user && d.user.email,
    };
    saveSession(session);
    return session;
  } catch (e) { return null; } // offline or unreachable - keep the existing (possibly stale) session
}

// Returns a usable access token, refreshing first if it's expired or close to it.
// Never blocks app usage on failure - just returns null and callers skip syncing for now.
async function getValidAccessToken() {
  if (!state.session) return null;
  if (state.session.expiresAt - Date.now() > 60000) return state.session.accessToken;
  const refreshed = await supabaseRefreshSession();
  return refreshed ? refreshed.accessToken : null;
}

// USDA only returns real serving-size metadata (servingSize/servingSizeUnit/householdServingFullText)
// for Branded/Survey data types; Foundation/SR Legacy items have none. When present, surface it as
// the top option (it's what's actually on the label), ahead of the generic weight shortcuts.
function usdaServingSizes(f) {
  const sizes = [];
  if (f.servingSize && f.servingSizeUnit) {
    const unit = String(f.servingSizeUnit).toLowerCase();
    let grams = null;
    if (unit.indexOf("g") === 0 || unit === "grm") grams = f.servingSize;
    else if (unit.indexOf("ml") === 0) grams = f.servingSize;
    else if (unit.indexOf("oz") === 0 || unit.indexOf("ounce") === 0) grams = f.servingSize * 28.3495;
    if (grams) {
      grams = Math.round(grams);
      const label = f.householdServingFullText ? f.householdServingFullText + " (" + grams + "g)" : grams + "g serving";
      sizes.push({ label: label, grams: grams });
    }
  }
  sizes.push({ label: "100g", grams: 100 });
  sizes.push({ label: "1 oz (28g)", grams: 28 });
  sizes.push({ label: "4 oz (113g)", grams: 113 });
  sizes.push({ label: "6 oz (170g)", grams: 170 });
  sizes.push({ label: "8 oz (227g)", grams: 227 });
  return sizes;
}

function offServingSizes(p) {
  const sizes = [];
  if (p.serving_quantity) {
    const grams = parseFloat(p.serving_quantity);
    if (grams) sizes.push({ label: p.serving_size ? p.serving_size : "1 serving (" + grams + "g)", grams: grams });
  }
  sizes.push({ label: "100g", grams: 100 });
  return sizes;
}

async function searchUSDA(query) {
  try {
    const r = await fetch("https://api.nal.usda.gov/fdc/v1/foods/search?query=" + encodeURIComponent(query) + "&pageSize=15&api_key=DEMO_KEY");
    const d = await r.json();
    return (d.foods || []).map(function(f) {
      const get = function(name) {
        const n = (f.foodNutrients || []).find(function(x){ return x.nutrientName === name; });
        return n ? round1(n.value) : 0;
      };
      const desc = (f.description || "").toLowerCase();
      const cooked = desc.indexOf("cooked") >= 0 || desc.indexOf("grilled") >= 0 || desc.indexOf("baked") >= 0 || desc.indexOf("fried") >= 0 || desc.indexOf("roasted") >= 0 || desc.indexOf("broiled") >= 0;
      return {
        id: "usda_" + f.fdcId, name: f.description, brand: f.brandName || f.brandOwner || "",
        source: "USDA", per100g: true,
        calories: get("Energy"), protein: get("Protein"), carbs: get("Carbohydrate, by difference"),
        fat: get("Total lipid (fat)"), fiber: get("Fiber, total dietary"),
        state: cooked ? "Cooked" : (desc.indexOf("raw") >= 0 ? "Raw" : "\u2014"),
        servingSizes: usdaServingSizes(f),
      };
    });
  } catch (e) { return []; }
}

async function searchOpenFoodFacts(query) {
  try {
    const r = await fetch("https://world.openfoodfacts.org/cgi/search.pl?search_terms=" + encodeURIComponent(query) + "&search_simple=1&action=process&json=1&page_size=10");
    const d = await r.json();
    return (d.products || []).filter(function(p){ return p.nutriments; }).map(function(p) {
      const n = p.nutriments;
      const name = p.product_name || "Unknown";
      return {
        id: "off_" + (p._id || p.code), name: name, brand: p.brands || "",
        source: "Open Food Facts", per100g: true,
        calories: Math.round(n["energy-kcal_100g"] || 0),
        protein: round1(n.proteins_100g || 0),
        carbs: round1(n.carbohydrates_100g || 0),
        fat: round1(n.fat_100g || 0),
        fiber: round1(n.fiber_100g || 0),
        state: "\u2014",
        servingSizes: offServingSizes(p),
      };
    });
  } catch (e) { return []; }
}

async function searchBarcode(code) {
  try {
    const r = await fetch("https://world.openfoodfacts.org/api/v0/product/" + code + ".json");
    const d = await r.json();
    if (d.status !== 1) return null;
    const p = d.product, n = p.nutriments;
    return {
      id: "off_" + p.code, name: p.product_name || "Unknown", brand: p.brands || "",
      source: "Open Food Facts (Barcode)", per100g: true,
      calories: Math.round(n["energy-kcal_100g"] || 0),
      protein: round1(n.proteins_100g || 0),
      carbs: round1(n.carbohydrates_100g || 0),
      fat: round1(n.fat_100g || 0),
      fiber: round1(n.fiber_100g || 0),
      state: "\u2014",
      servingSizes: offServingSizes(p),
    };
  } catch (e) { return null; }
}

async function estimateWithClaude(description, photoBase64, model, apiKey) {
  const content = [];
  if (photoBase64) content.push({ type: "image", source: { type: "base64", media_type: "image/jpeg", data: photoBase64 } });
  const desc = (description || "").trim();
  let promptText;
  if (desc && photoBase64) promptText = 'Estimate the macronutrients for this food: "' + desc + '". A photo is attached for additional context.';
  else if (photoBase64) promptText = 'Estimate the macronutrients for the food shown in this photo.';
  else promptText = 'Estimate the macronutrients for this food: "' + desc + '".';
  promptText += ' Return ONLY valid JSON (no markdown fences) as an array: [{"name":"food name","quantity_grams":number,"calories":number,"protein":number,"carbs":number,"fat":number,"fiber":number}]. Estimate realistic portion sizes. Be as accurate as possible.';
  content.push({ type: "text", text: promptText });
  try {
    const modelId = model === "claude-sonnet" ? "claude-sonnet-4-6" : "claude-haiku-4-5-20251001";
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({ model: modelId, max_tokens: 1000, messages: [{ role: "user", content: content }] }),
    });
    const d = await r.json();
    if (d.error) { console.error("Claude API error:", d.error); return { error: d.error.message || "API error" }; }
    const text = (d.content || []).map(function(i){ return i.text || ""; }).join("");
    const clean = text.replace(/```json|```/g, "").trim();
    return { data: JSON.parse(clean) };
  } catch (e) { console.error("AI error:", e); return { error: e.message }; }
}

async function estimateWithGemini(description, apiKey) {
  try {
    const r = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=" + apiKey, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: 'Estimate macronutrients for: "' + description + '". Return ONLY valid JSON array: [{"name":"food name","quantity_grams":number,"calories":number,"protein":number,"carbs":number,"fat":number,"fiber":number}].' }] }],
      }),
    });
    const d = await r.json();
    if (d.error) return { error: d.error.message || "API error" };
    const text = d.candidates && d.candidates[0] && d.candidates[0].content.parts[0].text || "";
    return { data: JSON.parse(text.replace(/```json|```/g, "").trim()) };
  } catch (e) { return { error: e.message }; }
}

function deduplicateFoods(foods) {
  const merged = [];
  const seen = new Map();
  for (let i = 0; i < foods.length; i++) {
    const f = foods[i];
    const key = f.name.toLowerCase().trim() + "_" + f.calories + "_" + f.protein;
    if (seen.has(key)) {
      const existing = seen.get(key);
      if (existing.source.indexOf(f.source) < 0) existing.source += " \u2022 " + f.source;
    } else {
      const copy = Object.assign({}, f);
      seen.set(key, copy);
      merged.push(copy);
    }
  }
  return merged;
}

function calcMacrosForWeight(food, grams) {
  if (!food) return { calories: 0, protein: 0, carbs: 0, fat: 0, fiber: 0 };
  const base = food.per100g ? 100 : ((food.servingSizes && food.servingSizes[0] && food.servingSizes[0].grams) || 100);
  const mult = grams / base;
  return {
    calories: Math.round(food.calories * mult),
    protein: round1(food.protein * mult),
    carbs: round1(food.carbs * mult),
    fat: round1(food.fat * mult),
    fiber: round1((food.fiber || 0) * mult),
  };
}


// ============================================================
// TINY RENDER ENGINE
// A single root re-render on every state change. Uses event
// delegation on #app so we never need to worry about rebinding
// listeners after re-render.
// ============================================================
const root = document.getElementById("app");
let pendingFocusId = null; // element id to focus after next render
let barcodeStream = null; // live camera MediaStream while the barcode scanner is open
let barcodeDetectionRAF = null; // requestAnimationFrame handle for the scan loop

function render() {
  root.innerHTML = renderApp();
  if (pendingFocusId) {
    const el = document.getElementById(pendingFocusId);
    if (el) { el.focus(); if (el.select) { try { el.select(); } catch(e){} } }
    pendingFocusId = null;
  }
  // A full innerHTML re-render tears down any live <video> element, which would otherwise
  // silently disconnect the camera feed if something re-renders while scanning is active.
  if (barcodeStream && state.ui.food && state.ui.food.scanningBarcode) {
    const v = document.getElementById("barcodeVideo");
    if (v) v.srcObject = barcodeStream;
  }
}

function rerender() { render(); }

// Delegated click handling: any element with data-action gets routed here.
root.addEventListener("click", function(e) {
  const el = e.target.closest("[data-action]");
  if (!el) return;
  const action = el.getAttribute("data-action");
  const arg = el.getAttribute("data-arg");
  const arg2 = el.getAttribute("data-arg2");
  if (typeof actions[action] === "function") {
    actions[action](arg, arg2, el);
  }
});

// Delegated input handling for text/number inputs bound via data-bind
root.addEventListener("input", function(e) {
  const el = e.target;
  const bind = el.getAttribute && el.getAttribute("data-bind");
  if (bind && typeof inputActions[bind] === "function") {
    inputActions[bind](el.value, el);
  }
});

root.addEventListener("change", function(e) {
  const el = e.target;
  const bind = el.getAttribute && el.getAttribute("data-change");
  if (bind && typeof changeActions[bind] === "function") {
    changeActions[bind](el, e);
  }
});

// Enter key on any input tagged with data-enter triggers the same action as that
// screen's primary "confirm" button (search, log, save, add, etc.).
root.addEventListener("keydown", function(e) {
  if (e.key !== "Enter") return;
  const el = e.target;
  if (!el || el.tagName !== "INPUT") return;
  const actionName = el.getAttribute("data-enter");
  if (actionName && typeof actions[actionName] === "function") {
    e.preventDefault();
    el.blur();
    actions[actionName]();
  }
});

    (opts.id ? ' id="' + opts.id + '"' : '') +

function getDayTotals(date) {
  const entries = state.foodLogs[date] || [];
  return entries.reduce(function(acc, e) {
    return {
      calories: acc.calories + (e.macros.calories || 0),
      protein: acc.protein + (e.macros.protein || 0),
      carbs: acc.carbs + (e.macros.carbs || 0),
      fat: acc.fat + (e.macros.fat || 0),
      fiber: acc.fiber + (e.macros.fiber || 0),
    };
  }, { calories: 0, protein: 0, carbs: 0, fat: 0, fiber: 0 });
}

function addFoodToLog(food) {
  const entry = {
    id: "log_" + Date.now() + "_" + Math.random().toString(36).slice(2,7),
    foodId: food.id, name: food.name,
    weight: food.loggedWeight || 100,
    macros: food.loggedMacros || { calories: food.calories, protein: food.protein, carbs: food.carbs, fat: food.fat, fiber: food.fiber || 0 },
    timestamp: food.timestamp || new Date().toISOString(),
    source: food.source || "Manual",
    photo: food.photo || null,
    photoExpires: food.photo ? new Date(Date.now() + 2*24*60*60*1000).toISOString() : null,
  };
  if (!state.foodLogs[state.date]) state.foodLogs[state.date] = [];
  state.foodLogs[state.date].push(entry);
  saveFoodLogs();

  if (food.wizardUsed && !state.favorites.find(function(f){ return f.id === food.id; })) {
    state.favorites.unshift(Object.assign({}, food, { addedAt: new Date().toISOString() }));
    state.favorites = state.favorites.slice(0, 100);
    saveFavorites();
  }
  state.recentFoods = [Object.assign({}, food, { lastUsed: new Date().toISOString() })]
    .concat(state.recentFoods.filter(function(r){ return r.id !== food.id; }))
    .slice(0, 50);
  saveRecentFoods();

  if (!state.foodCache[food.id]) {
    state.foodCache[food.id] = food;
    saveFoodCache();
  }
}

function removeFoodFromLog(entryId) {
  state.foodLogs[state.date] = (state.foodLogs[state.date] || []).filter(function(e){ return e.id !== entryId; });
  saveFoodLogs();
}

function updateFoodEntry(entryId, updates) {
  state.foodLogs[state.date] = (state.foodLogs[state.date] || []).map(function(e) {
    return e.id === entryId ? Object.assign({}, e, updates) : e;
  });
  saveFoodLogs();
}

actions.saveEntryPortion = function() {
  const id = state.ui.editingEntryId;
  if (!id) return;
  const w = parseFloat(state.ui.entryWeightInput);
  if (!w || w <= 0) return;
  const entry = (state.foodLogs[state.date] || []).find(function(e){ return e.id === id; });
  if (!entry) return;
  const cachedFood = state.foodCache[entry.foodId];
  let macros;
  if (cachedFood) {
    macros = calcMacrosForWeight(cachedFood, w);
  } else {
    const ratio = w / entry.weight;
    macros = {
      calories: Math.round(entry.macros.calories * ratio),
      protein: round1(entry.macros.protein * ratio),
      carbs: round1(entry.macros.carbs * ratio),
      fat: round1(entry.macros.fat * ratio),
      fiber: round1((entry.macros.fiber||0) * ratio),
    };
  }
  updateFoodEntry(id, { weight: w, macros: macros });
  closeEntryEditor();
  rerender();
};

// Editing macros on a log entry only affects that entry \u2014 UNLESS it's a food you created
// yourself (a recipe or a manual/custom-barcode entry), in which case the correction is
// also written back to the source so future uses of it are already fixed.
function propagateCustomFoodEdit(entry, newMacros) {
  if (entry.source === "Manual Entry" || entry.source === "Custom Barcode Entry") {
    const cached = state.foodCache[entry.foodId];
    if (cached) {
      state.foodCache[entry.foodId] = Object.assign({}, cached, {
        calories: newMacros.calories, protein: newMacros.protein, carbs: newMacros.carbs, fat: newMacros.fat, fiber: newMacros.fiber,
      });
      saveFoodCache();
    }
    if (entry.source === "Custom Barcode Entry" && entry.foodId && entry.foodId.indexOf("barcode_") === 0) {
      const code = entry.foodId.slice("barcode_".length);
      if (state.customBarcodes[code]) {
        state.customBarcodes[code] = Object.assign({}, state.customBarcodes[code], {
          calories: newMacros.calories, protein: newMacros.protein, carbs: newMacros.carbs, fat: newMacros.fat, fiber: newMacros.fiber,
        });
        saveCustomBarcodes();
      }
    }
  } else if (entry.source === "Recipe" && entry.foodId && entry.foodId.indexOf("recipe_food_") === 0) {
    const recipeId = entry.foodId.slice("recipe_food_".length);
    const recipe = state.recipes.find(function(r){ return r.id === recipeId; });
    if (recipe) {
      const old = entry.macros;
      const ratioP = old.protein > 0 ? newMacros.protein / old.protein : 1;
      const ratioC = old.carbs > 0 ? newMacros.carbs / old.carbs : 1;
      const ratioF = old.fat > 0 ? newMacros.fat / old.fat : 1;
      const newIngredients = recipe.ingredients.map(function(ing) {
        const p2 = round1(ing.protein * ratioP), c2 = round1(ing.carbs * ratioC), f2 = round1(ing.fat * ratioF);
        return Object.assign({}, ing, { protein: p2, carbs: c2, fat: f2, calories: Math.round(p2 * 4 + c2 * 4 + f2 * 9) });
      });
      state.recipes = state.recipes.map(function(r){ return r.id === recipeId ? Object.assign({}, r, { ingredients: newIngredients }) : r; });
      saveRecipes();
    }
  }
}

actions.saveEditMacros = function() {
  const id = state.ui.editingEntryId;
  if (!id) return;
  const entry = (state.foodLogs[state.date] || []).find(function(e){ return e.id === id; });
  if (!entry) return;
  const p = parseFloat(document.getElementById("editMacro_protein").value) || 0;
  const c = parseFloat(document.getElementById("editMacro_carbs").value) || 0;
  const f = parseFloat(document.getElementById("editMacro_fat").value) || 0;
  const fib = parseFloat(document.getElementById("editMacro_fiber").value) || 0;
  const newMacros = { protein: p, carbs: c, fat: f, fiber: fib, calories: Math.round(p*4 + c*4 + f*9) };
  propagateCustomFoodEdit(entry, newMacros);
  updateFoodEntry(id, { macros: newMacros });
  closeEntryEditor();
  rerender();
};

function moveFoodEntryToDate(entryId, toDate) {
  const fromDate = state.date;
  if (!toDate || toDate === fromDate) return false;
  const list = state.foodLogs[fromDate] || [];
  const idx = list.findIndex(function(e){ return e.id === entryId; });
  if (idx < 0) return false;
  const entry = list[idx];
  list.splice(idx, 1);
  state.foodLogs[fromDate] = list;
  if (!state.foodLogs[toDate]) state.foodLogs[toDate] = [];
  state.foodLogs[toDate].push(entry);
  saveFoodLogs();
  return true;
}

async function startBarcodeCamera() {
  const fu = foodUi();
  if (!("BarcodeDetector" in window)) {
    fu.scanError = "Live camera scanning isn't supported in this browser — use manual entry below.";
    rerender();
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    if (!foodUi().scanningBarcode) { stream.getTracks().forEach(function(t){ t.stop(); }); return; } // closed while awaiting permission
    barcodeStream = stream;
    const video = document.getElementById("barcodeVideo");
    if (!video) { stopBarcodeCamera(); return; }
    video.srcObject = stream;
    await video.play();
    const detector = new BarcodeDetector({ formats: ["ean_13", "ean_8", "upc_a", "upc_e", "code_128"] });
    const tick = async function() {
      if (!foodUi().scanningBarcode) return;
      try {
        const codes = await detector.detect(video);
        if (codes.length > 0) {
          stopBarcodeCamera();
          handleBarcodeDetected(codes[0].rawValue);
          return;
        }
      } catch (e) { /* keep trying next frame */ }
      barcodeDetectionRAF = requestAnimationFrame(tick);
    };
    barcodeDetectionRAF = requestAnimationFrame(tick);
  } catch (e) {
    foodUi().scanError = "Couldn't access camera (" + e.message + ") — use manual entry below.";
    rerender();
  }
}

async function handleBarcodeDetected(code) {
  const fu = foodUi();
  fu.scanNotFoundCode = null;

  const remembered = state.customBarcodes[code];
  if (remembered) {
    fu.scanningBarcode = false;
    fu.addingFood = remembered;
    fu.addWeight = String(remembered.loggedWeight || (remembered.servingSizes && remembered.servingSizes[0] && remembered.servingSizes[0].grams) || "");
    pendingFocusId = "addWeightInput";
    rerender();
    return;
  }

  fu.scanLoading = true; fu.scanError = null;
  rerender();
  const food = await searchBarcode(code);
  fu.scanLoading = false;
  if (!food) {
    fu.scanNotFoundCode = code;
    fu.customBarcodeManual = { name: "", weight: "100", calories: "", protein: "", carbs: "", fat: "", fiber: "" };
    rerender();
    return;
  }
  fu.scanningBarcode = false;
  fu.addingFood = food;
  fu.addWeight = "";
  pendingFocusId = "addWeightInput";
  rerender();
}

function sumRecipeIngredients(ingredients) {
  return (ingredients || []).reduce(function(acc, i) {
    return {
      weight: acc.weight + (i.weight || 0),
      calories: acc.calories + (i.calories || 0),
      protein: acc.protein + (i.protein || 0),
      carbs: acc.carbs + (i.carbs || 0),
      fat: acc.fat + (i.fat || 0),
      fiber: acc.fiber + (i.fiber || 0),
    };
  }, { weight: 0, calories: 0, protein: 0, carbs: 0, fat: 0, fiber: 0 });
}

function renderAiComparison(fu) {
  if (!fu.aiCompareError && !fu.aiCompareResults) return '';
  let html = '<div style="margin-top:4px;margin-bottom:16px">';
  html += '<div style="color:' + C.textSec + ';font-size:13px;font-weight:600;margin-bottom:8px">Gemini Comparison</div>';
  if (fu.aiCompareError) {
    html += '<div style="padding:10px 12px;background:' + C.warning + '15;border-radius:8px;color:' + C.warning + ';font-size:13px">' + esc(fu.aiCompareError) + '</div></div>';
    return html;
  }
  const primaryLabel = state.settings.aiProvider === "claude-sonnet" ? "Sonnet" : "Haiku";
  const a = sumAiItems(fu.aiResults);
  const b = sumAiItems(fu.aiCompareResults);
  const metrics = [["Calories", "calories", C.calories, ""], ["Protein", "protein", C.protein, "g"], ["Carbs", "carbs", C.carbs, "g"], ["Fat", "fat", C.fat, "g"]];

  html += '<div style="background:' + C.inputBg + ';border:1px solid ' + C.border + ';border-radius:10px;padding:12px 14px">';
  html += '<div style="display:flex;font-size:11px;color:' + C.textMut + ';margin-bottom:8px"><div style="flex:1"></div><div style="width:64px;text-align:right">' + esc(primaryLabel) + '</div><div style="width:64px;text-align:right">Gemini</div></div>';
  metrics.forEach(function(m) {
    const va = a[m[1]], vb = b[m[1]];
    const denom = Math.max(va, vb, 1);
    const pctDiff = Math.abs(va - vb) / denom * 100;
    const notable = pctDiff >= 15;
    html += '<div style="display:flex;align-items:center;padding:4px 0' + (notable ? ';background:' + C.warning + '11;border-radius:6px' : '') + '">' +
      '<div style="flex:1;font-size:13px;color:' + m[2] + '">' + m[0] + '</div>' +
      '<div style="width:64px;text-align:right;font-size:13px;color:' + C.text + '">' + (Math.round(va * 10) / 10) + m[3] + '</div>' +
      '<div style="width:64px;text-align:right;font-size:13px;color:' + C.text + '">' + (Math.round(vb * 10) / 10) + m[3] + '</div>' +
    '</div>';
    if (notable) {
      html += '<div style="text-align:right;font-size:11px;color:' + C.warning + ';margin-bottom:2px">⚠ differs by ' + Math.round(pctDiff) + '%</div>';
    }
  });
  html += '</div>';
  if (fu.aiPhoto) {
    html += '<div style="color:' + C.textMut + ';font-size:11px;margin-top:6px">Gemini’s estimate is text-only — it doesn’t see the attached photo.</div>';
  }
  html += '</div>';
  return html;
}

function sumAiItems(items) {
  return (items || []).reduce(function(acc, item) {
    return {
      weight: acc.weight + (item.quantity_grams || 0),
      calories: acc.calories + (item.calories || 0),
      protein: acc.protein + (item.protein || 0),
      carbs: acc.carbs + (item.carbs || 0),
      fat: acc.fat + (item.fat || 0),
      fiber: acc.fiber + (item.fiber || 0),
    };
  }, { weight: 0, calories: 0, protein: 0, carbs: 0, fat: 0, fiber: 0 });
}

actions.runAIEstimate = async function() {
  const fu = foodUi();
  if (!fu.aiDesc.trim() && !fu.aiPhoto) return;
  fu.aiLoading = true; fu.aiError = null; fu.aiCompareResults = null; fu.aiCompareError = null;
  rerender();

  const set = state.settings;
  const isClaudePrimary = set.aiProvider === "claude-haiku" || set.aiProvider === "claude-sonnet";
  const doCompare = isClaudePrimary && set.compareWithGemini;

  let primaryP;
  if (set.aiProvider === "gemini" && set.geminiApiKey) {
    primaryP = estimateWithGemini(fu.aiDesc, set.geminiApiKey);
  } else if (!set.claudeApiKey) {
    primaryP = Promise.resolve({ error: "No Claude API key set. Add one in Strategy \u2192 AI Settings, or switch provider to Gemini." });
  } else {
    primaryP = estimateWithClaude(fu.aiDesc, fu.aiPhoto, set.aiProvider, set.claudeApiKey);
  }
  const comparePromise = doCompare
    ? (set.geminiApiKey ? estimateWithGemini(fu.aiDesc, set.geminiApiKey) : Promise.resolve({ error: "No Gemini API key set. Add one in Strategy \u2192 AI Settings to enable comparison." }))
    : Promise.resolve(null);

  const results = await Promise.all([primaryP, comparePromise]);
  const result = results[0];
  const compareResult = results[1];
  fu.aiLoading = false;
  if (result.error) { fu.aiError = result.error; }
  else { fu.aiResults = result.data; fu.aiError = null; }
  if (compareResult) {
    if (compareResult.error) { fu.aiCompareError = compareResult.error; }
    else { fu.aiCompareResults = compareResult.data; fu.aiCompareError = null; }
  }
  rerender();
};

};

actions.addAiResultsCombined = function() {

    state: "\u2014", loggedWeight: round1(totals.weight),

  });
  rerender();
};

function renderWizardScreen(fu) {

actions.wizardSelect = async function(option) {
  const fu = foodUi();
  const wiz = fu.wizard;
  const config = WIZARD_CONFIGS[fu.wizardType];
  const currentStep = config.steps[wiz.step];
  wiz.selections[currentStep.key] = option;
  const isLastStep = wiz.step === config.steps.length - 1;

  if (option === "Other") {
    wiz.showAI = true;
    rerender();
    return;
  }
  if (isLastStep) {
    wiz.searching = true;
    rerender();
    const parts = [config.label];
    Object.keys(wiz.selections).forEach(function(k) {
      const v = wiz.selections[k];
      if (v !== "Other" && v !== "As-Served") parts.push(v);
    });
    const query = parts.join(" ");
    const usda = await searchUSDA(query);
    const off = await searchOpenFoodFacts(query);
    const merged = deduplicateFoods(usda.concat(off));
    wiz.searchResults = merged;
    wiz.searching = false;
    if (merged.length > 0) { wiz.selectedFood = merged[0]; wiz.weight = ""; pendingFocusId = "wizardWeightInput"; }
    rerender();
  } else {
    wiz.step += 1;
    rerender();
  }
};

function renderWeightChart(data, goalWeight, selectedDate) {
  const w = 460, h = 200, padL = 36, padR = 10, padT = 10, padB = 24;
  const weights = data.map(function(d){ return d.weight; });
  let minW = Math.min.apply(null, weights), maxW = Math.max.apply(null, weights);
  if (goalWeight) { minW = Math.min(minW, goalWeight); maxW = Math.max(maxW, goalWeight); }
  const pad = (maxW - minW) * 0.15 || 2;
  minW -= pad; maxW += pad;
  const xStep = data.length > 1 ? (w - padL - padR) / (data.length - 1) : 0;
  const yScale = function(val) { return padT + (1 - (val - minW) / (maxW - minW)) * (h - padT - padB); };
  const xScale = function(i) { return padL + i * xStep; };

  let path = "";
  data.forEach(function(d, i) {
    const x = xScale(i), y = yScale(d.weight);
    path += (i === 0 ? "M" : "L") + x.toFixed(1) + "," + y.toFixed(1) + " ";
  });

  let dots = "";
  data.forEach(function(d, i) {
    const cx = xScale(i).toFixed(1), cy = yScale(d.weight).toFixed(1);
    const isSel = d.date === selectedDate;
    // Larger invisible circle first so small dots stay easy to tap on mobile.
    dots += '<circle cx="' + cx + '" cy="' + cy + '" r="12" fill="transparent" data-action="selectWeightPoint" data-arg="' + d.date + '" style="cursor:pointer"></circle>';
    dots += '<circle cx="' + cx + '" cy="' + cy + '" r="' + (isSel ? 6 : 3) + '" fill="' + (isSel ? C.warning : C.primary) + '"' + (isSel ? ' stroke="#fff" stroke-width="2"' : '') + ' data-action="selectWeightPoint" data-arg="' + d.date + '" style="cursor:pointer;pointer-events:none"></circle>';
  });

  let gridLines = "";
  const numGrid = 4;
  for (let g = 0; g <= numGrid; g++) {
    const y = padT + (g / numGrid) * (h - padT - padB);
    gridLines += '<line x1="' + padL + '" y1="' + y.toFixed(1) + '" x2="' + (w-padR) + '" y2="' + y.toFixed(1) + '" stroke="' + C.border + '" stroke-width="1" stroke-dasharray="3,3"></line>';
  }

  let xLabels = "";
  const labelEvery = Math.max(1, Math.ceil(data.length / 5));
  data.forEach(function(d, i) {
    if (i % labelEvery === 0 || i === data.length - 1) {
      const lbl = parseDateStr(d.date).toLocaleDateString("en-US", { month: "short", day: "numeric" });
      xLabels += '<text x="' + xScale(i).toFixed(1) + '" y="' + (h-6) + '" font-size="10" fill="' + C.textMut + '" text-anchor="middle">' + lbl + '</text>';
    }
  });

  let yLabels = "";
  for (let g = 0; g <= numGrid; g++) {
    const val = maxW - (g / numGrid) * (maxW - minW);
    const y = padT + (g / numGrid) * (h - padT - padB);
    yLabels += '<text x="4" y="' + (y+3).toFixed(1) + '" font-size="10" fill="' + C.textMut + '">' + Math.round(val) + '</text>';
  }

  let goalLine = "";
  if (goalWeight && goalWeight >= minW && goalWeight <= maxW) {
    const gy = yScale(goalWeight);
    goalLine = '<line x1="' + padL + '" y1="' + gy.toFixed(1) + '" x2="' + (w-padR) + '" y2="' + gy.toFixed(1) + '" stroke="' + C.success + '" stroke-width="1.5" stroke-dasharray="5,5"></line>' +
      '<text x="' + (w-padR) + '" y="' + (gy-4).toFixed(1) + '" font-size="10" fill="' + C.success + '" text-anchor="end">Goal: ' + goalWeight + '</text>';
  }

  return '<div style="width:100%;overflow-x:auto"><svg viewBox="0 0 ' + w + ' ' + h + '" style="width:100%;height:220px" preserveAspectRatio="xMidYMid meet">' +
    gridLines + yLabels + xLabels + goalLine +
    '<path d="' + path + '" fill="none" stroke="' + C.primary + '" stroke-width="2"></path>' +
    dots +
  '</svg></div>';
}

function parseCsvLine(line) {
  const result = [];
  let cur = "", inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQuotes) {
      if (c === '"') {
        if (line[i+1] === '"') { cur += '"'; i++; }
        else { inQuotes = false; }
      } else { cur += c; }
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { result.push(cur); cur = ""; }
      else cur += c;
    }
  }
  result.push(cur);
  return result;
}

changeActions.renphoImport = function(el) {
  const file = el.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const text = ev.target.result;
      const lines = text.split("\n").filter(function(l){ return l.trim(); });
      const cols0 = parseCsvLine(lines[0]).map(function(h){ return h.toLowerCase(); });
      const dateIdx = cols0.findIndex(function(h){ return h.indexOf("time") >= 0 || h.indexOf("date") >= 0; });
      const weightIdx = cols0.findIndex(function(h){ return h.indexOf("weight") >= 0; });
      if (dateIdx < 0 || weightIdx < 0) { weightUi().importMsg = "Could not detect date/weight columns"; rerender(); return; }
      let count = 0;
      for (let i = 1; i < lines.length; i++) {
        const cols = parseCsvLine(lines[i]);
        if (cols.length <= Math.max(dateIdx, weightIdx)) continue;
        const dateStr = cols[dateIdx].trim().replace(/"/g, "");
        const w = parseFloat(cols[weightIdx].trim().replace(/"/g, ""));
        if (!w || isNaN(w)) continue;
        let d;
        if (dateStr.indexOf("/") >= 0) {
          const parts = dateStr.split(/[\s/]/);
          if (parts[2] && parts[2].length === 4) d = parts[2] + "-" + parts[0].padStart(2,"0") + "-" + parts[1].padStart(2,"0");
          else d = fmtDate(new Date(dateStr));
        } else {
          d = fmtDate(new Date(dateStr));
        }
        if (d && d !== "NaN-NaN-NaN" && !state.weights[d]) {
          state.weights[d] = { weight: w, unit: "lbs", timestamp: new Date(dateStr).toISOString() };
          count++;
        }
      }
      saveWeights();
      weightUi().importMsg = "Imported " + count + " weight entries";
      rerender();
    } catch (e) {
      weightUi().importMsg = "Error parsing file. Check format.";
      rerender();
    }
  };
  reader.readAsText(file);
  el.value = "";
};

      '<div style="color:' + C.textMut + ';font-size:11px;margin-top:2px">Calories stay in sync with these grams automatically. Lock up to 2 macros (\u{1F512}) to protect them when you edit the calorie target instead — the unlocked one(s) absorb the change.</div>' +
    '</div>';
  } else {
    const combos = [
      ["protein", "Protein %", C.protein, 4, "proteinTarget"],
      ["carbs", "Carbs %", C.carbs, 4, "carbsTarget"],

    combos.forEach(function(c) {

      html += '<div><label class="label" style="color:' + c[2] + '">' + c[1] + ' \u2192 ' + set[targetKey] + 'g</label>' +

    });

}

actions.applyPreset = function(name) {
  const preset = MACRO_PRESETS.find(function(p){ return p.name === name; });
  if (!preset) return;
  const set = state.settings;
  const cal = set.calorieTarget;
  set.macroPreset = name;
  set.proteinTarget = Math.round((cal * preset.protein / 100) / 4);
  set.carbsTarget = Math.round((cal * preset.carbs / 100) / 4);
  set.fatTarget = Math.round((cal * preset.fat / 100) / 9);
  saveSettings();
  rerender();
};
actions.setInputMode = function(m) { strategyUi().inputMode = m; rerender(); };

const MACRO_CAL_PER_G = { protein: 4, carbs: 4, fat: 9 };

// Editing a macro gram field directly always recomputes calories from the (now current) grams —
// locks don't apply in this direction, they only protect grams when *calories* change (below).
function syncCalorieFromMacros() {
  const set = state.settings;
  set.calorieTarget = Math.round(set.proteinTarget * 4 + set.carbsTarget * 4 + set.fatTarget * 9);
  saveSettings();
  const el = document.getElementById("calorieTargetInput");
  if (el) el.value = set.calorieTarget;
}
inputActions.proteinTarget = function(v) { state.settings.proteinTarget = parseInt(v,10) || 0; state.settings.macroPreset = "Custom"; syncCalorieFromMacros(); };
inputActions.carbsTarget = function(v) { state.settings.carbsTarget = parseInt(v,10) || 0; state.settings.macroPreset = "Custom"; syncCalorieFromMacros(); };
inputActions.fatTarget = function(v) { state.settings.fatTarget = parseInt(v,10) || 0; state.settings.macroPreset = "Custom"; syncCalorieFromMacros(); };

// Editing calories redistributes the change across unlocked macros only, preserving their
// relative proportion to each other; locked macros' grams are left untouched.
inputActions.calorieTarget = function(v) {
  const set = state.settings;
  const newCal = parseInt(v, 10) || 0;
  set.calorieTarget = newCal;
  const locks = set.macroLocks || {};
  const keys = ["protein", "carbs", "fat"];
  const lockedKeys = keys.filter(function(k){ return locks[k]; });
  const unlockedKeys = keys.filter(function(k){ return !locks[k]; });
  const lockedCal = lockedKeys.reduce(function(sum, k){ return sum + set[k + "Target"] * MACRO_CAL_PER_G[k]; }, 0);
  const remaining = Math.max(0, newCal - lockedCal);
  if (unlockedKeys.length > 0) {
    const unlockedCalTotal = unlockedKeys.reduce(function(sum, k){ return sum + set[k + "Target"] * MACRO_CAL_PER_G[k]; }, 0);
    unlockedKeys.forEach(function(k) {
      const share = unlockedCalTotal > 0 ? (set[k + "Target"] * MACRO_CAL_PER_G[k]) / unlockedCalTotal : 1 / unlockedKeys.length;
      set[k + "Target"] = Math.round((remaining * share) / MACRO_CAL_PER_G[k]);
    });
  }
  set.macroPreset = "Custom";
  saveSettings();
  keys.forEach(function(k) {
    const el = document.getElementById(k + "TargetInput");
    if (el) el.value = set[k + "Target"];
  });
};

actions.toggleMacroLock = function(key) {
  const set = state.settings;
  const locks = Object.assign({ protein: false, carbs: false, fat: false }, set.macroLocks);
  const lockedCount = ["protein", "carbs", "fat"].filter(function(k){ return locks[k]; }).length;
  if (!locks[key] && lockedCount >= 2) return; // max 2 locks at once
  locks[key] = !locks[key];
  set.macroLocks = locks;
  saveSettings();
  rerender();
};

root.addEventListener("input", function(e) {
  const el = e.target;
  const bind = el.getAttribute && el.getAttribute("data-bind");
  if (bind && bind.indexOf("pct_") === 0) {
    const parts = bind.split("_"); // pct_targetKey_calPerG
    const targetKey = parts[1], calPerG = parseInt(parts[2], 10);
    const newPct = parseInt(el.value, 10);
    state.settings[targetKey] = Math.round((state.settings.calorieTarget * newPct / 100) / calPerG);
    state.settings.macroPreset = "Custom";
    saveSettings();
    rerender();
  }
});

function renderWeightGoalsSection() {
  const set = state.settings;
  const allWeights = Object.keys(state.weights).sort().map(function(d){ return [d, state.weights[d]]; });
  const latestWeight = allWeights.length > 0 ? allWeights[allWeights.length-1][1].weight : null;
  const goalWeight = parseFloat(set.goalWeight);
  const remaining = (latestWeight != null && goalWeight) ? Math.abs(latestWeight - goalWeight) : null;
  const thirtyDaysAgo = Date.now() - 30*86400000;
  const last30 = allWeights.filter(function(w){ return parseDateStr(w[0]).getTime() >= thirtyDaysAgo; });
  let weeklyRate = null;
  if (last30.length >= 2) {
    const daysSpan = (parseDateStr(last30[last30.length-1][0]) - parseDateStr(last30[0][0])) / 86400000;
    if (daysSpan > 0) weeklyRate = (last30[last30.length-1][1].weight - last30[0][1].weight) / (daysSpan / 7);
  }
  const weeksToGoal = (weeklyRate && remaining) ? Math.abs(remaining / weeklyRate) : null;
  const estGoalDate = weeksToGoal ? new Date(Date.now() + weeksToGoal*7*86400000) : null;

  const effStartDate = set.startDate || (allWeights.length > 0 ? allWeights[0][0] : null);
  const effStartWeight = (set.startWeight != null && set.startWeight !== "") ? set.startWeight : (allWeights.length > 0 ? allWeights[0][1].weight : null);
  const totalChangeSinceStart = (latestWeight != null && effStartWeight != null) ? round1(latestWeight - effStartWeight) : null;

  let html = '<h3 class="cardTitle">Weight Goals</h3>';
  if (latestWeight != null) html += statCard("Current Weight", latestWeight + " " + set.weightUnit, C.text);
  html += '<div style="margin-top:16px"><label class="label">Goal Weight (' + set.weightUnit + ')</label>' + textInput({ value: set.goalWeight, type: "number", bind: "goalWeight" }) + '</div>';
  html += '<div style="margin-top:12px"><label class="label">Target Date</label>' + textInput({ value: set.goalDate, type: "date", bind: "goalDate" }) + '</div>';
  if (remaining != null) {
    html += '<div class="row" style="margin-top:16px">' +
      statCard("Remaining", remaining.toFixed(1) + " " + set.weightUnit) +
      statCard("Est. Weeks", weeksToGoal ? weeksToGoal.toFixed(1) : "\u2014") +
    '</div>';
  }
  if (estGoalDate) {
    html += '<div style="margin-top:10px">' + statCard("Estimated Goal Date", estGoalDate.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"}), C.success) + '</div>';
  }

  html += '<div style="border-top:1px solid ' + C.border + ';margin:20px 0 16px"></div>';
  html += '<div class="label" style="margin-bottom:12px;text-transform:uppercase;font-weight:600;letter-spacing:0.5px">Starting Point</div>';
  html += '<div><label class="label">Starting Date</label>' + textInput({ value: set.startDate || "", type: "date", bind: "goalsStartDate" }) + '</div>';
  html += '<div style="margin-top:12px"><label class="label">Starting Weight (' + set.weightUnit + ')</label>' + textInput({ value: set.startWeight != null ? set.startWeight : "", type: "number", placeholder: effStartWeight != null ? String(effStartWeight) : "", bind: "goalsStartWeight" }) + '</div>';
  if (totalChangeSinceStart != null) {
    html += '<div style="margin-top:12px">' + statCard("Total Change Since Start", (totalChangeSinceStart > 0 ? "+" : "") + totalChangeSinceStart + " " + set.weightUnit, totalChangeSinceStart <= 0 ? C.success : C.danger) + '</div>';
  }
  html += '<div style="color:' + C.textMut + ';font-size:11px;margin-top:8px">Leave blank to auto-use your earliest logged weight. This also drives the "Total Change" and "Weekly Change" stats on the Weight tab.</div>';

  return card(html);
}

actions.exportData = function() {
  const exportObj = { settings: state.settings, foodLogs: state.foodLogs, weights: state.weights, favorites: state.favorites, recentFoods: state.recentFoods, recipes: state.recipes, customBarcodes: state.customBarcodes, exportDate: new Date().toISOString(), version: "1.0" };
  const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "macrolog-export-" + todayStr() + ".json"; a.click();
  URL.revokeObjectURL(url);
};
actions.clickImportData = function() { const el = document.getElementById("importFileInput"); if (el) el.click(); };
changeActions.importData = function(el) {
  const file = el.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.settings) { state.settings = Object.assign({}, DEFAULT_SETTINGS, data.settings); saveSettings(); }
      if (data.foodLogs) { state.foodLogs = data.foodLogs; saveFoodLogs(); }
      if (data.weights) { state.weights = data.weights; saveWeights(); }
      if (data.favorites) { state.favorites = data.favorites; saveFavorites(); }
      if (data.recentFoods) { state.recentFoods = data.recentFoods; saveRecentFoods(); }
      if (data.recipes) { state.recipes = data.recipes; saveRecipes(); }
      if (data.customBarcodes) { state.customBarcodes = data.customBarcodes; saveCustomBarcodes(); }
      alert("Data imported successfully!");
      rerender();
    } catch (e) { alert("Error importing data. Check file format."); }
  };
  reader.readAsText(file);
  el.value = "";
};
actions.askConfirmClear = function() { strategyUi().confirmClear = true; rerender(); };
actions.cancelConfirmClear = function() { strategyUi().confirmClear = false; rerender(); };
actions.clearAllData = function() {
  state.settings = Object.assign({}, DEFAULT_SETTINGS);
  state.foodLogs = {}; state.weights = {}; state.favorites = []; state.recentFoods = []; state.foodCache = {}; state.recipes = []; state.customBarcodes = {};
  saveSettings(); saveFoodLogs(); saveWeights(); saveFavorites(); saveRecentFoods(); saveFoodCache(); saveRecipes(); saveCustomBarcodes();
  strategyUi().confirmClear = false;
  rerender();
};

// Keep the session token fresh in the background; never blocks app usage if offline/unreachable.
if (state.session) getValidAccessToken();

// If the app has been backgrounded for a while (not just a quick app-switch), treat
// coming back to it like reopening it: land on Dashboard / today, not wherever it was left.
let hiddenSinceMs = null;
document.addEventListener("visibilitychange", function() {
  if (document.hidden) {
    hiddenSinceMs = Date.now();
  } else {
    if (hiddenSinceMs && (Date.now() - hiddenSinceMs) > 10 * 60 * 1000) {
      stopBarcodeCamera();
      state.tab = "dashboard";
      state.date = todayStr();
      state.ui = {};
      rerender();
    }
    hiddenSinceMs = null;
  }
});
