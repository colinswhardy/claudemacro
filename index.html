<style>

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:#0B0E18;color:#E2E8F0;}

input,button,textarea,select{font-family:inherit;}
input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
input[type="number"]{-moz-appearance:textfield;}
input[type="range"]{-webkit-appearance:none;height:6px;border-radius:3px;background:#1E2640;outline:none;width:100%;}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;cursor:pointer;background:#3B82F6;}
input[type="range"]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;cursor:pointer;background:#3B82F6;border:none;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#1E2640;border-radius:2px;}
button{cursor:pointer;}
a{color:inherit;}
.hidden{display:none !important;}
#app{max-width:500px;margin:0 auto;position:relative;padding-bottom:120px;min-height:100vh;}
.header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;position:sticky;top:0;z-index:100;background:rgba(11,14,24,0.92);backdrop-filter:blur(12px);}
.brand{font-size:18px;font-weight:700;color:#3B82F6;}
.dateNav{display:flex;align-items:center;gap:8px;}
.navArrow{background:none;border:none;color:#94A3B8;font-size:18px;cursor:pointer;padding:4px;}
.dateBtn{background:#0F1220;border:1px solid #1E2640;border-radius:10px;color:#E2E8F0;padding:6px 16px;font-size:14px;font-weight:500;cursor:pointer;}
.dateBtn.today{color:#3B82F6;}
.settingsBtn{background:none;border:none;color:#64748B;font-size:20px;cursor:pointer;}
.content{padding:0 16px;}
.bottomBar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;z-index:100;display:flex;flex-direction:column;background:rgba(20,24,40,0.94);border-top:1px solid #1E2640;backdrop-filter:blur(12px);}
.bottomNav{display:flex;box-sizing:border-box;}
.quickActions{display:flex;gap:8px;padding:6px 16px;box-sizing:border-box;}
.tabBtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;padding:10px 4px;color:#64748B;cursor:pointer;font-size:11px;}
.tabBtn.active{color:#3B82F6;font-weight:600;}
.tabIcon{font-size:20px;}
.card{background:#141828;border:1px solid #1E2640;border-radius:16px;padding:20px;margin-bottom:16px;}
.cardTitle{font-size:16px;font-weight:600;margin:0 0 16px;color:#E2E8F0;}
.btn{background:#3B82F6;color:#fff;border:none;border-radius:10px;padding:12px 20px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity 0.15s;}
.btn:active{opacity:0.8;}
.btn.outline{background:transparent;border:1px solid #3B82F6;color:#3B82F6;}
.btn.danger{background:#EF4444;}
.btn.outline.danger{background:transparent;border:1px solid #EF4444;color:#EF4444;}
.btn.full{width:100%;}

.landscapeBlock{display:none;}
/* Phones/small tablets turned sideways (short viewport height is what distinguishes this from

  #app{display:none;}
  .landscapeBlock{display:flex;position:fixed;inset:0;background:#0B0E18;color:#E2E8F0;align-items:center;justify-content:center;text-align:center;padding:32px;z-index:9999;flex-direction:column;gap:10px;}

}

};

// Bump by 0.01 on every shipped change (see CLAUDE.md Deploy section) -- shown at the bottom of

const APP_VERSION = "1.08";

const SUPABASE_URL = "https://flwzhavwubgniepiwnqt.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_goCDpfYoolFIqfCVDUkXMw_10c2xGxb";

const DEFAULT_SETTINGS = {
  calorieTarget: 1876, proteinTarget: 163, carbsTarget: 153, fatTarget: 68,

  goalWeight: 150, goalDate: "2026-09-14", goalRatePerWeek: "",
  startWeight: null, startDate: null,
  aiProvider: "claude-sonnet", aiEnabled: true, geminiApiKey: "", claudeApiKey: "", compareWithGemini: false,

// ============================================================
// UTILS
// ============================================================
// Local calendar date, not UTC -- d.toISOString() is always UTC, so in any timezone behind
// UTC this would report tomorrow's date for several hours every evening (the bug that sent
// the app straight to "Thursday" while it was still Wednesday locally).
const fmtDate = (d) => {
  const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, "0"), day = String(d.getDate()).padStart(2, "0");
  return y + "-" + m + "-" + day;
};
const todayStr = () => fmtDate(new Date());
const parseDateStr = (s) => { const p = s.split("-").map(Number); return new Date(p[0], p[1]-1, p[2]); };
const dayLabel = (s) => parseDateStr(s).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]; });
const round1 = (n) => Math.round(n * 10) / 10;

// ============================================================
// STORAGE (localStorage)
// ============================================================
const db = {
  get: function(key, fallback) {
    try { const v = localStorage.getItem("ml_" + key); return v ? JSON.parse(v) : fallback; }
    catch (e) { return fallback; }
  },
  set: function(key, val) {
    try { localStorage.setItem("ml_" + key, JSON.stringify(val)); return true; }
    catch (e) { console.error("Storage write failed:", e); return false; }
  },
};

// ============================================================
// STATE
// ============================================================
const state = {
  tab: "dashboard",
  date: todayStr(),
  settings: Object.assign({}, DEFAULT_SETTINGS, db.get("settings", {})),
  foodLogs: db.get("foodLogs", {}),
  weights: db.get("weights", {}),
  favorites: db.get("favorites", []),
  recentFoods: db.get("recentFoods", []),
  foodCache: db.get("foodCache", {}),
  recipes: db.get("recipes", []),
  customBarcodes: db.get("customBarcodes", {}),
  session: db.get("supabaseSession", null),
  authError: null,
  authLoading: false,
  lastSyncedAt: null,
  ui: {}
};

function saveSettings() { db.set("settings", state.settings); scheduleCloudSync("settings", pushSettingsToCloud); }
function saveFoodLogs() { db.set("foodLogs", state.foodLogs); scheduleCloudSync("foodLogs", pushFoodLogsToCloud); }
function saveWeights() { db.set("weights", state.weights); scheduleCloudSync("weights", pushWeightsToCloud); }
function saveFavorites() { db.set("favorites", state.favorites); scheduleCloudSync("favorites", pushFavoritesToCloud); }
function saveRecentFoods() { db.set("recentFoods", state.recentFoods); scheduleCloudSync("recentFoods", pushRecentFoodsToCloud); }
function saveFoodCache() { db.set("foodCache", state.foodCache); scheduleCloudSync("foodCache", pushFoodCacheToCloud); }
function saveRecipes() { db.set("recipes", state.recipes); scheduleCloudSync("recipes", pushRecipesToCloud); }
function saveCustomBarcodes() { db.set("customBarcodes", state.customBarcodes); scheduleCloudSync("customBarcodes", pushCustomBarcodesToCloud); }

function cleanExpiredPhotos() {
  const now = new Date().toISOString();
  let changed = false;
  for (const d in state.foodLogs) {
    state.foodLogs[d] = state.foodLogs[d].map(function(e) {
      if (e.photo && e.photoExpires && e.photoExpires < now) {
        changed = true;

    });

}


// ============================================================
// API HELPERS
// ============================================================

// ---- Supabase auth (plain REST, no SDK) ----
function saveSession(session) {
  state.session = session;
  state.authError = null;
  db.set("supabaseSession", session);
}
function clearSession() {
  state.session = null;
  db.set("supabaseSession", null);
}

async function supabaseSignIn(email, password) {
  try {
    const r = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=password", {
      method: "POST",
      headers: { "Content-Type": "application/json", "apikey": SUPABASE_ANON_KEY },
      body: JSON.stringify({ email: email, password: password }),
    });
    const d = await r.json();
    if (!r.ok) return { error: d.error_description || d.msg || d.message || d.error || "Sign in failed" };
    return {
      data: {
        accessToken: d.access_token, refreshToken: d.refresh_token,
        expiresAt: Date.now() + (d.expires_in || 3600) * 1000,
        userId: d.user && d.user.id, email: d.user && d.user.email,
      }
    };
  } catch (e) { return { error: e.message }; }
}

async function supabaseRefreshSession() {
  if (!state.session || !state.session.refreshToken) return null;
  try {
    const r = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=refresh_token", {
      method: "POST",
      headers: { "Content-Type": "application/json", "apikey": SUPABASE_ANON_KEY },
      body: JSON.stringify({ refresh_token: state.session.refreshToken }),
    });
    const d = await r.json();
    if (!r.ok) { clearSession(); return null; }
    const session = {
      accessToken: d.access_token, refreshToken: d.refresh_token,
      expiresAt: Date.now() + (d.expires_in || 3600) * 1000,
      userId: d.user && d.user.id, email: d.user && d.user.email,
    };
    saveSession(session);
    return session;
  } catch (e) { return null; } // offline or unreachable - keep the existing (possibly stale) session
}

// Returns a usable access token, refreshing first if it's expired or close to it.
// Never blocks app usage on failure - just returns null and callers skip syncing for now.
async function getValidAccessToken() {
  if (!state.session) return null;
  if (state.session.expiresAt - Date.now() > 60000) return state.session.accessToken;
  const refreshed = await supabaseRefreshSession();
  return refreshed ? refreshed.accessToken : null;
}

// Generic PostgREST call against a table under /rest/v1/. Attaches the current user's
// access token (required for RLS to identify them) plus the project apikey header.
// Returns { data } on success or { error } on failure; never throws.
async function supabaseTable(path, options) {
  options = options || {};
  const token = await getValidAccessToken();
  if (!token) return { error: "Not signed in or offline" };
  try {
    const r = await fetch(SUPABASE_URL + "/rest/v1/" + path, {
      method: options.method || "GET",
      headers: Object.assign({
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": "Bearer " + token,
        "Content-Type": "application/json",
      }, options.headers || {}),
      body: options.body ? JSON.stringify(options.body) : undefined,
      // Lets the request complete even if the tab is backgrounded or torn down right after it
      // starts -- exactly what happens when someone logs food and immediately locks their
      // phone. Bodies here are small JSON blobs, well under keepalive's ~64KB combined limit.
      keepalive: true,
    });
    if (!r.ok) {
      const errBody = await r.json().catch(function(){ return {}; });
      return { error: errBody.message || errBody.error || ("HTTP " + r.status) };
    }
    if (r.status === 204) return { data: null };
    const data = await r.json().catch(function(){ return null; });
    return { data: data };
  } catch (e) { return { error: e.message }; }
}

// Fetches every row for a query by paging through PostgREST's Range header, so results
// aren't silently truncated once a table grows past the server's default row cap.
const SUPABASE_PAGE_SIZE = 1000;
async function pullAllRows(path) {
  let allRows = [];
  let offset = 0;
  while (true) {
    const r = await supabaseTable(path, { headers: { "Range-Unit": "items", "Range": offset + "-" + (offset + SUPABASE_PAGE_SIZE - 1) } });
    if (r.error) return r;
    const rows = r.data || [];
    allRows = allRows.concat(rows);
    if (rows.length < SUPABASE_PAGE_SIZE) break;
    offset += SUPABASE_PAGE_SIZE;
  }
  return { data: allRows };
}

async function pushSettingsToCloud() {
  if (!state.session) return { error: "Not signed in" };
  return supabaseTable("user_settings?on_conflict=user_id", {
    method: "POST",
    headers: { "Prefer": "resolution=merge-duplicates" },
    body: { user_id: state.session.userId, data: state.settings, updated_at: new Date().toISOString() },
  });
}

async function pullSettingsFromCloud() {
  if (!state.session) return { error: "Not signed in" };
  return supabaseTable("user_settings?user_id=eq." + state.session.userId + "&select=data,updated_at");
}

function flattenFoodLogsForSync() {
  const rows = [];
  Object.keys(state.foodLogs).forEach(function(date) {
    (state.foodLogs[date] || []).forEach(function(e) {
      rows.push({
        id: e.id, user_id: state.session.userId, log_date: date,
        food_id: e.foodId || null, name: e.name, weight: e.weight,
        calories: e.macros.calories, protein: e.macros.protein, carbs: e.macros.carbs,
        fat: e.macros.fat, fiber: e.macros.fiber || 0,
        // PostgREST's bulk upsert turns every row in the batch into one INSERT with the same
        // column set, so these must always be present (never omitted via undefined) even when
        // there's no value -- explicit null, not a missing key.
        brand: e.brand || null, animal_override: e.animalOverride == null ? null : e.animalOverride,
        source: e.source || null, logged_at: e.timestamp || new Date().toISOString(),
        updated_at: e.updatedAt || e.timestamp || new Date().toISOString(),
      });
    });
  });
  return rows;
}
async function pushFoodLogsToCloud() {
  if (!state.session) return { error: "Not signed in" };
  const rows = flattenFoodLogsForSync();

// ---- Automatic background sync ----
// Each push re-sends the full current dataset (upsert), so it's idempotent: a failed or
// skipped push just gets caught up by the next one. That means no separate retry queue is
// needed -- debouncing so we don't hammer the API on every keystroke is all this needs.
//
// The debounce window is also a real data-loss window: if the app is backgrounded or closed
// within those 2.5s (e.g. logging a food and immediately locking the phone -- a completely
// normal thing to do), the pending push never fires, and that entry exists only in this
// device's localStorage with no cloud copy. pendingSyncPushFns tracks the not-yet-fired push
// alongside its timer specifically so flushPendingCloudSyncs() (wired to visibilitychange and
// pagehide below) can fire it immediately instead of waiting out the debounce.
const syncDebounceTimers = {};
const pendingSyncPushFns = {};
function scheduleCloudSync(kind, pushFn) {
  if (!state.session) return;
  if (syncDebounceTimers[kind]) clearTimeout(syncDebounceTimers[kind]);
  pendingSyncPushFns[kind] = pushFn;
  syncDebounceTimers[kind] = setTimeout(function() {
    delete syncDebounceTimers[kind];
    delete pendingSyncPushFns[kind];
    // Deliberately does not rerender() on completion -- this can fire while the user is mid-
    // keystroke elsewhere in the app, and a surprise rerender would steal focus. The "last
    // synced" status just picks up the new value next time that screen is naturally rendered.
    pushFn().then(function(result) {
      if (!result.error) state.lastSyncedAt = Date.now();
    });
  }, 2500);
}
function flushPendingCloudSyncs() {
  Object.keys(pendingSyncPushFns).forEach(function(kind) {
    clearTimeout(syncDebounceTimers[kind]);
    delete syncDebounceTimers[kind];
    const pushFn = pendingSyncPushFns[kind];
    delete pendingSyncPushFns[kind];
    pushFn().then(function(result) {
      if (!result.error) state.lastSyncedAt = Date.now();
    });
  });
}

// Merge strategy: rows that exist in the cloud but not locally (by id) get added; rows that
// exist in both get the newer one (by updated_at) kept. Mutates state.foodLogs/state.weights
// in place (never reassigns the top-level object) so a concurrent local mutation elsewhere
// can't be silently clobbered by a stale wholesale replace. This is also what brings a fresh
// device's empty local store up to date on login.
function mergeFoodLogsFromCloud(cloudRows) {
  const localById = new Map();
  Object.keys(state.foodLogs).forEach(function(d) {
    (state.foodLogs[d] || []).forEach(function(e){ localById.set(e.id, { date: d, entry: e }); });
  });
  let changed = 0;
  (cloudRows || []).forEach(function(row) {
    if (wasRecentlyDeleted("food_log_entries", row.id)) return;
    const existing = localById.get(row.id);
    const entry = {
      id: row.id, foodId: row.food_id, name: row.name, weight: row.weight,
      macros: { calories: row.calories, protein: row.protein, carbs: row.carbs, fat: row.fat, fiber: row.fiber || 0 },
      brand: row.brand || null, animalOverride: row.animal_override == null ? null : row.animal_override,
      timestamp: row.logged_at, source: row.source || "Synced", updatedAt: row.updated_at || row.logged_at,
    };
    if (existing) {
      const localTime = Date.parse(existing.entry.updatedAt || existing.entry.timestamp || 0) || 0;
      const cloudTime = Date.parse(row.updated_at || row.logged_at || 0) || 0;
      if (cloudTime <= localTime) return; // local is same-or-newer, keep it
      const list = state.foodLogs[existing.date] || [];
      const idx = list.findIndex(function(e){ return e.id === row.id; });
      if (idx >= 0) { list[idx] = entry; changed++; }
      return;
    }
    if (!state.foodLogs[row.log_date]) state.foodLogs[row.log_date] = [];
    state.foodLogs[row.log_date].push(entry);
    changed++;
  });
  db.set("foodLogs", state.foodLogs);
  return changed;
}

function mergeWeightsFromCloud(cloudRows) {
  let changed = 0;
  (cloudRows || []).forEach(function(row) {
    if (wasRecentlyDeleted("weight_entries", row.log_date)) return;
    const existing = state.weights[row.log_date];
    const entry = { weight: row.weight, unit: row.unit || "lbs", timestamp: row.logged_at, updatedAt: row.updated_at || row.logged_at };
    if (existing) {
      const localTime = Date.parse(existing.updatedAt || existing.timestamp || 0) || 0;
      const cloudTime = Date.parse(row.updated_at || row.logged_at || 0) || 0;
      if (cloudTime <= localTime) return;
      state.weights[row.log_date] = entry;
      changed++;
      return;
    }
    state.weights[row.log_date] = entry;
    changed++;
  });
  db.set("weights", state.weights);
  return changed;
}

// Settings are a single blob, not a collection -- cloud wins when a row exists, on the

}

// Tracks ids deleted locally within the last little while, so a background sync's pull --
// which can race ahead of the DELETE below actually landing in Supabase -- doesn't silently
// resurrect a row the user just removed by treating it as "new from the cloud."
const RECENTLY_DELETED_TTL_MS = 30000;
const recentlyDeletedIds = { food_log_entries: new Map(), recipes: new Map(), weight_entries: new Map(), custom_barcodes: new Map() };
function markRecentlyDeleted(table, id) {
  if (recentlyDeletedIds[table]) recentlyDeletedIds[table].set(id, Date.now());
}
function wasRecentlyDeleted(table, id) {
  const m = recentlyDeletedIds[table];
  if (!m) return false;
  const t = m.get(id);
  if (t === undefined) return false;
  if (Date.now() - t > RECENTLY_DELETED_TTL_MS) { m.delete(id); return false; }
  return true;
}

// Fire-and-forget row delete; doesn't block or retry. If it fails while offline the row
// resurfaces on the next pull -- an acceptable edge case at this scale rather than building
// a full delete queue for a personal app used from one active device at a time.
function scheduleCloudDelete(table, idColumn, idValue) {
  markRecentlyDeleted(table, idValue);
  if (!state.session) return;
  supabaseTable(table + "?" + idColumn + "=eq." + encodeURIComponent(idValue), { method: "DELETE" });
}

// Safe to call anytime (login, or periodically in the background).
async function pullAndMergeAll() {
  if (!state.session) return { error: "Not signed in" };

  // Settings must be pulled BEFORE pushing: a freshly-installed device's local defaults
  // would otherwise overwrite the real account settings the instant it logs in. Only seed
  // the cloud from local if there's genuinely nothing there yet (first-ever setup).
  const settingsPull = await pullSettingsFromCloud();
  if (settingsPull.error) return { error: settingsPull.error };
  if (settingsPull.data && settingsPull.data.length > 0) {
    mergeSettingsFromCloud(settingsPull.data[0].data);
  } else {
    await pushSettingsToCloud();
  }

  // PULL AND MERGE FIRST, then push. Order matters and was a real data-loss bug when reversed:
  // favorites/recentFoods/foodCache are stored as one whole JSON blob each, and their push is a
  // blind whole-blob overwrite of the cloud copy. If we pushed first, a device that booted with
  // an empty or truncated local store (a fresh install, or iOS/PWA localStorage eviction) would
  // overwrite the cloud's complete history with its near-empty local copy -- wiping history for
  // every device ("history is empty sometimes"). Pulling and merging first means local already
  // contains the cloud's data before we push, so the push always sends local-unioned-with-cloud,
  // never a subset. It also makes food-log newer-wins correct: the blind id-upsert on push can't
  // clobber a newer cloud edit with a stale local one, because the merge pulled the newer cloud
  // version in first.
  const [logsPull, weightsPull, recipesPull, barcodesPull, favsPull, recentPull, cachePull] = await Promise.all([
    pullFoodLogsFromCloud(), pullWeightsFromCloud(), pullRecipesFromCloud(), pullCustomBarcodesFromCloud(),
    pullFavoritesFromCloud(), pullRecentFoodsFromCloud(), pullFoodCacheFromCloud(),
  ]);
  const firstError = logsPull.error || weightsPull.error || recipesPull.error || barcodesPull.error || favsPull.error || recentPull.error || cachePull.error;
  if (firstError) return { error: firstError };

  const logsAdded = mergeFoodLogsFromCloud(logsPull.data);
  const weightsAdded = mergeWeightsFromCloud(weightsPull.data);
  const recipesAdded = mergeRecipesFromCloud(recipesPull.data);
  const barcodesAdded = mergeCustomBarcodesFromCloud(barcodesPull.data);
  const favsAdded = mergeFavoritesFromCloud(favsPull.data && favsPull.data[0] && favsPull.data[0].data);
  const recentAdded = mergeRecentFoodsFromCloud(recentPull.data && recentPull.data[0] && recentPull.data[0].data);
  const cacheAdded = mergeFoodCacheFromCloud(cachePull.data && cachePull.data[0] && cachePull.data[0].data);

  // Now push the merged local state up, so anything this device had that the cloud lacked gets
  // persisted. Safe to overwrite the whole-blob collections now: local already contains the
  // cloud's copy after the merges above.
  await Promise.all([
    pushFoodLogsToCloud(), pushWeightsToCloud(), pushRecipesToCloud(), pushCustomBarcodesToCloud(),
    pushFavoritesToCloud(), pushRecentFoodsToCloud(), pushFoodCacheToCloud(),
  ]);

  state.lastSyncedAt = Date.now();
  const totalAdded = logsAdded + weightsAdded + recipesAdded + barcodesAdded + favsAdded + recentAdded + cacheAdded;
  return { data: { logsAdded: logsAdded, weightsAdded: weightsAdded, totalAdded: totalAdded } };
}

// USDA only returns real serving-size metadata (servingSize/servingSizeUnit/householdServingFullText)
// for Branded/Survey data types; Foundation/SR Legacy items have none. When present, surface it as
// the top option (it's what's actually on the label), ahead of the generic weight shortcuts.
function usdaServingSizes(f) {
  const sizes = [];
  if (f.servingSize && f.servingSizeUnit) {
    const unit = String(f.servingSizeUnit).toLowerCase();
    let grams = null;
    if (unit.indexOf("g") === 0 || unit === "grm") grams = f.servingSize;
    else if (unit.indexOf("ml") === 0) grams = f.servingSize;
    else if (unit.indexOf("oz") === 0 || unit.indexOf("ounce") === 0) grams = f.servingSize * 28.3495;
    if (grams) {
      grams = Math.round(grams);
      const label = f.householdServingFullText ? f.householdServingFullText + " (" + grams + "g)" : grams + "g serving";
      sizes.push({ label: label, grams: grams });
    }
  }
  sizes.push({ label: "100g", grams: 100 });
  sizes.push({ label: "1 oz (28g)", grams: 28 });
  sizes.push({ label: "4 oz (113g)", grams: 113 });
  sizes.push({ label: "6 oz (170g)", grams: 170 });
  sizes.push({ label: "8 oz (227g)", grams: 227 });
  return sizes;
}

function offServingSizes(p) {
  const sizes = [];
  if (p.serving_quantity) {
    const grams = parseFloat(p.serving_quantity);
    if (grams) sizes.push({ label: p.serving_size ? p.serving_size : "1 serving (" + grams + "g)", grams: grams });
  }
  sizes.push({ label: "100g", grams: 100 });
  return sizes;
}

async function searchUSDA(query) {
  try {
    const r = await fetch("https://api.nal.usda.gov/fdc/v1/foods/search?query=" + encodeURIComponent(query) + "&pageSize=15&api_key=DEMO_KEY");
    const d = await r.json();
    return (d.foods || []).map(function(f) {
      const get = function(name) {
        const n = (f.foodNutrients || []).find(function(x){ return x.nutrientName === name; });
        return n ? round1(n.value) : 0;
      };
      const desc = (f.description || "").toLowerCase();
      const cooked = desc.indexOf("cooked") >= 0 || desc.indexOf("grilled") >= 0 || desc.indexOf("baked") >= 0 || desc.indexOf("fried") >= 0 || desc.indexOf("roasted") >= 0 || desc.indexOf("broiled") >= 0;
      return {
        id: "usda_" + f.fdcId, name: f.description, brand: f.brandName || f.brandOwner || "",
        source: "USDA", per100g: true,
        calories: get("Energy"), protein: get("Protein"), carbs: get("Carbohydrate, by difference"),
        fat: get("Total lipid (fat)"), fiber: get("Fiber, total dietary"),
        state: cooked ? "Cooked" : (desc.indexOf("raw") >= 0 ? "Raw" : "\u2014"),
        servingSizes: usdaServingSizes(f),
      };
    });
  } catch (e) { return []; }
}

async function searchOpenFoodFacts(query) {

    const d = await r.json();
    return (d.products || []).filter(function(p){ return p.nutriments; }).map(function(p) {

async function estimateWithClaude(description, photoBase64, model, apiKey) {
  const content = [];
  if (photoBase64) content.push({ type: "image", source: { type: "base64", media_type: "image/jpeg", data: photoBase64 } });
  const desc = (description || "").trim();
  let promptText;
  if (desc && photoBase64) promptText = 'Estimate the macronutrients for this food: "' + desc + '". A photo is attached for additional context.';
  else if (photoBase64) promptText = 'Estimate the macronutrients for the food shown in this photo.';
  else promptText = 'Estimate the macronutrients for this food: "' + desc + '".';
  promptText += ' Return ONLY valid JSON (no markdown fences) as an array: [{"name":"food name","quantity_grams":number,"calories":number,"protein":number,"carbs":number,"fat":number,"fiber":number,"reason":"one short sentence on how you arrived at this estimate, e.g. the assumed cut/portion/preparation"}]. Estimate realistic portion sizes. Be as accurate as possible.';
  content.push({ type: "text", text: promptText });
  try {
    const modelId = model === "claude-sonnet" ? "claude-sonnet-5" : "claude-haiku-4-5-20251001";
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({ model: modelId, max_tokens: 1200, messages: [{ role: "user", content: content }] }),
    });
    const d = await r.json();
    if (d.error) { console.error("Claude API error:", d.error); return { error: d.error.message || "API error" }; }
    const text = (d.content || []).map(function(i){ return i.text || ""; }).join("");
    const clean = text.replace(/```json|```/g, "").trim();
    return { data: JSON.parse(clean) };
  } catch (e) { console.error("AI error:", e); return { error: e.message }; }
}

async function estimateWithGemini(description, apiKey) {
  try {
    const r = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent?key=" + apiKey, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: 'Estimate macronutrients for: "' + description + '". Return ONLY valid JSON array: [{"name":"food name","quantity_grams":number,"calories":number,"protein":number,"carbs":number,"fat":number,"fiber":number,"reason":"one short sentence on how you arrived at this estimate, e.g. the assumed cut/portion/preparation"}].' }] }],
      }),
    });
    const d = await r.json();
    if (d.error) return { error: d.error.message || "API error" };
    const text = d.candidates && d.candidates[0] && d.candidates[0].content.parts[0].text || "";
    return { data: JSON.parse(text.replace(/```json|```/g, "").trim()) };
  } catch (e) { return { error: e.message }; }
}

function deduplicateFoods(foods) {
  const merged = [];
  const seen = new Map();
  for (let i = 0; i < foods.length; i++) {
    const f = foods[i];
    const key = f.name.toLowerCase().trim() + "_" + f.calories + "_" + f.protein;
    if (seen.has(key)) {
      const existing = seen.get(key);
      if (existing.source.indexOf(f.source) < 0) existing.source += " \u2022 " + f.source;
    } else {
      const copy = Object.assign({}, f);
      seen.set(key, copy);
      merged.push(copy);
    }
  }
  return merged;
}

// How many grams the food's stored calories/protein/carbs/fat actually describe.
// Database foods (USDA / Open Food Facts) are per-100g. Everything the user creates -- manual
// entries, AI estimates, recipe logs, custom barcodes -- stores ABSOLUTE macros for one
// specific portion instead, so the portion has to be recoverable or the numbers get rescaled
// as though they were per-100g. That was a real bug: a 235 kcal / 83g item re-added from
// History came back as 235 * (83/100) = 195 kcal, because these foods recorded servingSizes: []
// (or omitted it) and the lookup fell through to 100.
// loggedWeight is the retroactive rescue for entries already saved in that broken shape -- for
// every path that stores absolute macros, loggedWeight is exactly the portion they belong to.
// The calories shown in a search-result row need a label that actually matches what the number
// means -- "kcal/100g" was hardcoded everywhere, which is only true for database (USDA/OFF)
// foods. Absolute-portion foods (Manual Entry, AI Estimate, Recipe, custom barcodes) were
// showing e.g. "235 kcal/100g" for a 235-calorie, 83g hot dog -- actively misleading, and the
// same wrong assumption that caused the calcMacrosForWeight rescaling bug above.
function foodQuantityLabel(food) {
  if (food.per100g) return "kcal/100g";
  const g = foodBaseGrams(food);
  return "kcal/" + round1(g) + "g";
}

function foodBaseGrams(food) {
  if (food.per100g) return 100;
  const serving = food.servingSizes && food.servingSizes[0] && food.servingSizes[0].grams;
  if (serving > 0) return serving;
  if (food.loggedWeight > 0) return food.loggedWeight;
  return 100;
}

function calcMacrosForWeight(food, grams) {
  if (!food) return { calories: 0, protein: 0, carbs: 0, fat: 0, fiber: 0 };
  const base = foodBaseGrams(food);
  const mult = grams / base;
  return {
    calories: Math.round(food.calories * mult),
    protein: round1(food.protein * mult),
    carbs: round1(food.carbs * mult),
    fat: round1(food.fat * mult),
    fiber: round1((food.fiber || 0) * mult),
  };
}


// ============================================================
// TINY RENDER ENGINE
// A single root re-render on every state change. Uses event
// delegation on #app so we never need to worry about rebinding
// listeners after re-render.
// ============================================================
const root = document.getElementById("app");
let pendingFocusId = null; // element id to focus after next render
let barcodeStream = null; // live camera MediaStream while the barcode scanner is open
let barcodeDetectionRAF = null; // requestAnimationFrame handle for the scan loop

// ---- Toast (brief "Food Added" style confirmation) ----
let toastToken = 0;
function showToast(message) {
  const token = ++toastToken;
  state.toast = message;
  rerender();
  setTimeout(function() {
    if (toastToken === token) { state.toast = null; rerender(); }
  }, 900);
}

// ---- Back button / gesture navigation ----
// This app has no router, but the browser back button and edge-swipe gestures both fire
// the same popstate event, so we can intercept them without one. The model is 3 flat tiers:
// depth 0 = dashboard tab; depth 1 = any other tab at its base view; depth 2 = a Food-tab
// sub-screen (AI estimate, manual entry, barcode scan, wizard, recipe builder, etc). Every
// render() call pushes/resyncs history to match the current depth automatically -- so
// entering a deeper screen is always handled generically here, no matter which action got
// you there. Only the "step back" direction needs each screen's close/cancel/confirm action
// to opt in (call stepBackOneLevel()) instead of clearing its own flag directly, so that
// physical back-button presses and in-app Cancel buttons collapse state exactly the same way.
let navDepth = 0;
function computeNavDepth() {
  const fu = state.ui.food;
  if (state.tab === "food" && fu && (fu.scanningBarcode || fu.loggingRecipe || fu.recipeBuilder || fu.wizardType || fu.showAI || fu.manualEntry || fu.addingFood)) return 2;
  if (state.tab !== "dashboard") return 1;
  return 0;
}
function syncNavHistoryDepth() {
  const target = computeNavDepth();
  while (navDepth < target) { navDepth++; history.pushState({ macrologNav: navDepth }, ""); }
  if (target < navDepth) navDepth = target; // a "direct jump" (goToday, date nav, switching tabs) skips
  // stepBackOneLevel()'s history.back() -- just resync the counter rather than trying to pop
  // browser history to match; worst case a jump like this leaves a harmless extra entry that
  // costs one extra back-press before the app exits, far rarer than the normal step-by-step case.
}
// Collapses exactly one level based on current state -- shared by the popstate handler and by
// stepBackOneLevel()'s defensive fallback if navDepth somehow drifted out of sync.
function collapseOneNavLevel() {
  const fu = state.ui.food;
  if (state.tab === "food" && fu) {
    if (fu.scanningBarcode) { stopBarcodeCamera(); fu.scanningBarcode = false; fu.scanError = null; fu.scanManualCode = ""; fu.scanLoading = false; fu.scanNotFoundCode = null; return true; }
    if (fu.loggingRecipe) { fu.loggingRecipe = null; return true; }
    if (fu.recipeBuilder) { fu.recipeBuilder = null; return true; }
    if (fu.wizardType) { fu.wizardType = null; fu.wizard = null; fu.wizardSuggestion = null; return true; }
    if (fu.showAI) {
      // Also reset aiDesc/aiPhoto (not just the results) -- otherwise a leftover description
      // or photo from a cancelled attempt would silently resurface (and clobber whatever the
      // search-box carryover would otherwise fill in) the next time the AI screen is opened.
      fu.showAI = false; fu.aiResults = null; fu.aiError = null; fu.aiCompareResults = null; fu.aiCompareError = null; fu.aiDesc = ""; fu.aiPhoto = null;
      return true;
    }
    if (fu.manualEntry) { fu.manualEntry = false; return true; }
    if (fu.addingFood) { fu.addingFood = null; return true; }
  }
  if (state.tab !== "dashboard") { stopBarcodeCamera(); state.tab = "dashboard"; state.ui = {}; return true; }
  return false;
}
// Call from a screen's own Cancel/Back/confirm action instead of clearing its flag directly,
// so browser-back and the in-app button always collapse state through the same single path.
// Guarded against rapid re-entry: history.back() is async (the actual collapse happens once
// its popstate arrives), so a fast double-tap on Cancel before that fires would otherwise
// queue a second history.back() and over-collapse by an extra level.
let backNavPending = false;
function stepBackOneLevel() {
  if (navDepth > 0) {
    if (backNavPending) return;
    backNavPending = true;
    history.back();
  } else {
    collapseOneNavLevel();
    rerender();
  }
}

function render() {
  syncNavHistoryDepth();
  root.innerHTML = renderApp();
  if (pendingFocusId) {
    const el = document.getElementById(pendingFocusId);
    if (el) { el.focus(); if (el.select) { try { el.select(); } catch(e){} } }
    pendingFocusId = null;
  }
  // A full innerHTML re-render tears down any live <video> element, which would otherwise
  // silently disconnect the camera feed if something re-renders while scanning is active.
  if (barcodeStream && state.ui.food && state.ui.food.scanningBarcode) {
    const v = document.getElementById("barcodeVideo");
    if (v) v.srcObject = barcodeStream;
  }
}

function rerender() { render(); }

// Delegated click handling: any element with data-action gets routed here.
root.addEventListener("click", function(e) {
  const el = e.target.closest("[data-action]");
  if (!el) return;
  const action = el.getAttribute("data-action");
  const arg = el.getAttribute("data-arg");
  const arg2 = el.getAttribute("data-arg2");
  if (typeof actions[action] === "function") {
    actions[action](arg, arg2, el);
  }
});

// Delegated input handling for text/number inputs bound via data-bind
root.addEventListener("input", function(e) {
  const el = e.target;
  const bind = el.getAttribute && el.getAttribute("data-bind");
  if (bind && typeof inputActions[bind] === "function") {
    inputActions[bind](el.value, el);
  }
});

root.addEventListener("change", function(e) {
  const el = e.target;
  const bind = el.getAttribute && el.getAttribute("data-change");
  if (bind && typeof changeActions[bind] === "function") {
    changeActions[bind](el, e);
  }
});

// Enter key on any input tagged with data-enter triggers the same action as that
// screen's primary "confirm" button (search, log, save, add, etc.).
root.addEventListener("keydown", function(e) {
  if (e.key !== "Enter") return;
  const el = e.target;
  if (!el || el.tagName !== "INPUT") return;
  const actionName = el.getAttribute("data-enter");
  if (actionName && typeof actions[actionName] === "function") {
    e.preventDefault();
    el.blur();
    actions[actionName]();
  }
});

// ============================================================
// DATA HELPERS
// ============================================================
// No food database (USDA, Open Food Facts) reports protein "by source" -- this is a best-effort
// guess from the food's name, not real nutrition data. Meat, dairy, egg, and fish/seafood
// keywords all count as animal protein (eggs and fish aren't literally meat or dairy, but
// Colin confirmed they should count the same way, making the complement effectively "plant
// protein"). Word-boundary matching (\b) specifically to avoid false positives like "egg"
// matching inside "eggplant" or "ham" matching inside "hamster"/"shame". A handful of solid
// compound words (milkshake, cheeseburger, eggnog) are listed explicitly since \b wouldn't
// otherwise catch them (no boundary between "milk" and "shake" in "milkshake").
// Mixed dishes (e.g. "Chicken and Black Bean Burrito") are attributed entirely to animal
// protein if ANY animal keyword matches -- meaning the plant-protein total is a floor, not
// exact, and skews low on mixed dishes rather than high.
const ANIMAL_PROTEIN_RE = new RegExp(
  "\\b(chicken|turkey|beef|steak|pork|ham|bacon|sausage|lamb|veal|duck|meat|jerky|salami|" +
  "pepperoni|prosciutto|chorizo|brisket|ribs|meatball|ground beef|mince|" +
  "fish|salmon|tuna|shrimp|prawn|crab|lobster|cod|tilapia|sardine|anchovy|trout|halibut|" +
  "mahi|scallop|oyster|mussel|clam|seafood|calamari|squid|" +
  "milk|cheese|yogurt|yoghurt|cream|butter|ghee|whey|casein|kefir|mozzarella|cheddar|" +
  "parmesan|ricotta|custard|" +
  "egg|eggs|omelet|omelette|frittata|" +
  "milkshake|cheeseburger|hamburger|eggnog|buttermilk)\\b", "i"
);
function isAnimalProteinFood(name) {
  return ANIMAL_PROTEIN_RE.test(name || "");
}

// entry.animalOverride (true/false/null) lets a manual correction win over the keyword guess --
// null (the default, "Auto") falls through to isAnimalProteinFood. Per-entry only for now, not
// propagated to the underlying food, so re-adding the same food from History re-guesses fresh.
function isAnimalProteinEntry(entry) {
  return entry.animalOverride != null ? entry.animalOverride : isAnimalProteinFood(entry.name);
}

function getDayTotals(date) {
  const entries = state.foodLogs[date] || [];
  return entries.reduce(function(acc, e) {
    const protein = e.macros.protein || 0;
    return {
      calories: acc.calories + (e.macros.calories || 0),
      protein: acc.protein + protein,
      carbs: acc.carbs + (e.macros.carbs || 0),
      fat: acc.fat + (e.macros.fat || 0),
      fiber: acc.fiber + (e.macros.fiber || 0),
      plantProtein: acc.plantProtein + (isAnimalProteinEntry(e) ? 0 : protein),
    };
  }, { calories: 0, protein: 0, carbs: 0, fat: 0, fiber: 0, plantProtein: 0 });
}

function addFoodToLog(food) {
  const entry = {
    id: "log_" + Date.now() + "_" + Math.random().toString(36).slice(2,7),
    foodId: food.id, name: food.name, brand: food.brand || "",
    weight: food.loggedWeight || 100,
    macros: food.loggedMacros || { calories: food.calories, protein: food.protein, carbs: food.carbs, fat: food.fat, fiber: food.fiber || 0 },
    timestamp: food.timestamp || new Date().toISOString(),
    source: food.source || "Manual",
    animalOverride: food.animalOverride != null ? food.animalOverride : null,
    photo: food.photo || null,
    photoExpires: food.photo ? new Date(Date.now() + 2*24*60*60*1000).toISOString() : null,
    updatedAt: new Date().toISOString(),
  };
  if (!state.foodLogs[state.date]) state.foodLogs[state.date] = [];
  state.foodLogs[state.date].push(entry);
  saveFoodLogs();

  if (food.wizardUsed && !state.favorites.find(function(f){ return f.id === food.id; })) {
    state.favorites.unshift(Object.assign({}, food, { addedAt: new Date().toISOString() }));
    state.favorites = state.favorites.slice(0, 100);
    saveFavorites();
  }
  // History (the Food tab's History sub-tab) is meant to be a durable, searchable list of
  // everything ever added, so old items can be re-found and re-added -- so this cap is
  // deliberately high (was 50, which quietly dropped anything older). 500 distinct foods is
  // effectively "everything" for one person over years while keeping the synced JSON blob a
  // sane size; only the very oldest, least-recently-used items fall off past that.
  state.recentFoods = [Object.assign({}, food, { lastUsed: new Date().toISOString() })]
    .concat(state.recentFoods.filter(function(r){ return r.id !== food.id; }))
    .slice(0, 500);
  saveRecentFoods();

  if (!state.foodCache[food.id]) {
    state.foodCache[food.id] = food;
    saveFoodCache();
  }
  showToast("Food Added");
}

function removeFoodFromLog(entryId) {
  state.foodLogs[state.date] = (state.foodLogs[state.date] || []).filter(function(e){ return e.id !== entryId; });
  saveFoodLogs();
  scheduleCloudDelete("food_log_entries", "id", entryId);
}

function updateFoodEntry(entryId, updates) {
  state.foodLogs[state.date] = (state.foodLogs[state.date] || []).map(function(e) {
    return e.id === entryId ? Object.assign({}, e, updates, { updatedAt: new Date().toISOString() }) : e;
  });
  saveFoodLogs();
}

    progressBar(totals.calories, set.calorieTarget, C.calories, "Calories", "", " kcal") +
    progressBar(totals.protein, set.proteinTarget, C.protein, "Protein", (set.showPlantProtein && totals.plantProtein > 0) ? "(" + Math.round(totals.plantProtein) + "g plant-based)" : "") +
    progressBar(totals.carbs, set.carbsTarget, C.carbs, "Carbs", totals.fiber > 0 ? "(" + Math.round(totals.fiber) + "g fiber)" : "") +
    progressBar(totals.fat, set.fatTarget, C.fat, "Fat")
  );

  html += '<div class="row" style="margin-bottom:16px">' + btn({ label: "\uFF0B Add Food", action: "setTab", arg: "food", full: true }) + '</div>';

  if (entries.length > 0) {
    // group by hour
    const groups = {};
    const order = [];
    entries.forEach(function(e) {
      const h = new Date(e.timestamp).getHours();
      const label = (h === 0 ? 12 : h > 12 ? h - 12 : h) + " " + (h >= 12 ? "PM" : "AM");
      if (!groups[label]) { groups[label] = []; order.push(label); }
      groups[label].push(e);
    });
    let logHtml = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">' +
      '<h3 class="cardTitle" style="margin:0">Today\'s Log</h3>' +
      '<span style="color:' + C.textMut + ';font-size:13px">' + entries.length + ' items</span></div>';

    order.slice().reverse().forEach(function(timeLabel) {
      const items = groups[timeLabel];
      const groupCals = items.reduce(function(a,i){ return a + (i.macros.calories||0); }, 0);
      logHtml += '<div style="display:flex;justify-content:space-between;align-items:center;margin:12px 0 8px">' +
        '<span style="color:' + C.textSec + ';font-size:13px;font-weight:600">\u{1F550} ' + timeLabel + '</span>' +
        '<span style="color:' + C.textMut + ';font-size:12px">' + groupCals + ' kcal</span></div>';
      items.forEach(function(entry) {
        logHtml += renderFoodEntry(entry);
      });
    });
    html += card(logHtml);
  } else {
    html += card('<div class="empty"><div style="font-size:32px;margin-bottom:8px">\u{1F37D}</div><div style="color:' + C.textSec + ';font-size:15px">No food logged yet today</div><div style="color:' + C.textMut + ';font-size:13px;margin-top:4px">Tap "Add Food" to get started</div></div>');
  }

  return html;
}

// A real, distinct brand is shown as its own line; falling back to the source (e.g. "Manual
// Entry", "Recipe") would just repeat the source line right underneath it, so that fallback is
// suppressed here (unlike foodQuantityLabel, which needs a fallback for the math to be right --
// this one is purely cosmetic).
function entryBrandLine(entry) {
  return (entry.brand && entry.brand !== entry.source) ? entry.brand : null;
}

// True protein/carbs/fat all recorded as exactly zero -- almost always a sign something went
// wrong capturing the macros (a bad AI estimate, a product with missing OFF nutrition data,
// etc.) rather than a food that's genuinely all zeros, so it's worth flagging rather than
// silently trusting it. Deliberately does not check calories -- a food can have real calories
// from something not tracked (e.g. alcohol) while still validly having 0g of all three.
function entryHasZeroMacros(entry) {
  const m = entry.macros;
  return m.protein === 0 && m.carbs === 0 && m.fat === 0;
}

function renderFoodEntry(entry) {
  const editing = state.ui.editingEntryId === entry.id;
  const confirmingRemove = state.ui.confirmRemoveEntryId === entry.id;
  const brandLine = entryBrandLine(entry);
  const zeroMacros = entryHasZeroMacros(entry);
  let html = '<div class="foodEntry">' +
    '<div data-action="toggleEntryEditor" data-arg="' + entry.id + '" style="cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start">' +
      '<div style="flex:1;min-width:0">' +
        '<div style="color:' + C.text + ';font-weight:600;font-size:14px">' + esc(entry.name) + '</div>' +
        (brandLine ? '<div style="color:' + C.textMut + ';font-size:12px;margin-top:1px">' + esc(brandLine) + '</div>' : '') +
        '<div style="color:' + C.textMut + ';font-size:12px;margin-top:2px">' + esc(entry.source) + ' \u2022 ' + entry.weight + 'g</div>' +
        (zeroMacros ? '<div style="color:' + C.warning + ';font-size:11px;margin-top:4px">\u26a0 No protein/carbs/fat recorded \u2014 tap to check the macros</div>' : '') +
      '</div>' +
      '<div style="text-align:right;display:flex;align-items:center;gap:8px">' +
        '<span style="color:' + C.calories + ';font-weight:700;font-size:16px">' + entry.macros.calories + '</span>' +
        '<span style="color:' + C.textMut + ';font-size:12px">kcal</span>' +
        '<button data-action="askRemoveFood" data-arg="' + entry.id + '" style="background:none;border:none;color:' + C.textMut + ';cursor:pointer;font-size:16px;padding:2px">\u{1F5D1}</button>' +
      '</div>' +
    '</div>' +
    '<div style="display:flex;gap:10px;margin-top:8px;font-size:12px">' +
      '<span style="color:' + C.protein + '">P: ' + entry.macros.protein + 'g</span>' +
      '<span style="color:' + C.carbs + '">C: ' + entry.macros.carbs + 'g</span>' +
      '<span style="color:' + C.fat + '">F: ' + entry.macros.fat + 'g</span>' +
    '</div>';

  if (confirmingRemove) {
    html += '<div class="row" style="margin-top:8px">' +
      btn({ label: "Cancel", action: "cancelRemoveFood", small: true, outline: true, full: true }) +
      btn({ label: "Remove Entry?", action: "removeFood", arg: entry.id, small: true, full: true, color: "danger" }) +
    '</div>';
  }
  if (editing) html += renderEntryEditor(entry);
  html += '</div>';
  return html;
}

function renderEntryEditor(entry) {
  const section = state.ui.entrySection || "portion";
  let html = '<div style="margin-top:10px;padding:10px;background:' + C.bg + ';border-radius:10px">' +
    '<div class="row" style="margin-bottom:10px;flex-wrap:wrap">' +
      '<button class="sectionBtn' + (section === "portion" ? " active" : "") + '" data-action="setEntrySection" data-arg="portion">Portion</button>' +
      '<button class="sectionBtn' + (section === "macros" ? " active" : "") + '" data-action="setEntrySection" data-arg="macros">Macros</button>' +
      '<button class="sectionBtn' + (section === "details" ? " active" : "") + '" data-action="setEntrySection" data-arg="details">Details</button>' +
      '<button class="sectionBtn' + (section === "move" ? " active" : "") + '" data-action="setEntrySection" data-arg="move">Move Day</button>' +
      '<button class="sectionBtn' + (section === "copy" ? " active" : "") + '" data-action="setEntrySection" data-arg="copy">Copy</button>' +
    '</div>';

  if (section === "portion") {
    const cachedFood = state.foodCache[entry.foodId];
    const weightVal = state.ui.entryWeightInput != null ? state.ui.entryWeightInput : String(entry.weight);
    const sizes = (cachedFood && cachedFood.servingSizes) || [];
    if (sizes.length > 0) {
      html += '<div class="rowWrap" style="margin-bottom:10px">' +
        sizes.map(function(s) {
          return '<button class="chip' + (parseFloat(weightVal) === s.grams ? ' active' : '') + '" data-action="setEntryWeight" data-arg="' + s.grams + '">' + esc(s.label) + '</button>';
        }).join('') +
      '</div>';
    }
    html += '<div class="row" style="align-items:center;margin-bottom:8px">' +
      textInput({ id: "entryWeightInput", value: weightVal, type: "number", bind: "entryWeightInput", enter: "saveEntryPortion", style: "flex:1" }) +
      '<span style="color:' + C.textMut + ';font-size:12px">g</span>' +
      btn({ label: "Save", action: "saveEntryPortion", small: true }) +
    '</div>';
    if (cachedFood) {
      const w = parseFloat(weightVal) || 0;
      const m = calcMacrosForWeight(cachedFood, w);
      html += '<div style="color:' + C.textMut + ';font-size:11px">Preview: ' + m.calories + ' kcal \u2022 P ' + m.protein + 'g \u2022 C ' + m.carbs + 'g \u2022 F ' + m.fat + 'g</div>';
    } else {
      html += '<div style="color:' + C.textMut + ';font-size:11px">Original food details unavailable \u2014 weight will scale the current macros proportionally.</div>';
    }
  } else if (section === "macros") {
    const m = entry.macros;
    const isCustom = entry.source === "Recipe" || entry.source === "Manual Entry" || entry.source === "Custom Barcode Entry";
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">' +
      '<div><label class="label" style="color:' + C.calories + '">Calories (kcal)</label>' +
        '<input class="input" type="number" id="editMacroCaloriesInput" value="' + m.calories + '" data-enter="saveEditMacros" style="padding:6px;font-size:13px"></div>' +
      macroEditField("protein", "Protein (g)", m.protein, "saveEditMacros", "editMacroProtein") +
      macroEditField("carbs", "Carbs (g)", m.carbs, "saveEditMacros", "editMacroCarbs") +
      macroEditField("fat", "Fat (g)", m.fat, "saveEditMacros", "editMacroFat") +
      macroEditField("fiber", "Fiber (g)", m.fiber || 0) +
    '</div>';
    html += '<div style="color:' + C.textMut + ';font-size:11px;margin-bottom:8px">Calories auto-calculate from protein/carbs/fat \u2014 edit it directly to override (e.g. alcohol, which adds calories beyond P/C/F).</div>';
    html += '<div style="color:' + C.textMut + ';font-size:11px;margin-bottom:8px">' +
      (isCustom ? "This is a " + (entry.source === "Recipe" ? "recipe" : "custom food") + " you created \u2014 saving here also updates it for next time." : "This only changes today\u2019s entry \u2014 the original food won\u2019t be affected.") +
    '</div>';
    html += btn({ label: "Save Macros", action: "saveEditMacros", small: true });
  } else if (section === "details") {
    const nameVal = state.ui.entryNameInput != null ? state.ui.entryNameInput : entry.name;
    const brandVal = state.ui.entryBrandInput != null ? state.ui.entryBrandInput : (entry.brand || "");
    const override = state.ui.entryAnimalOverrideInput !== undefined ? state.ui.entryAnimalOverrideInput : entry.animalOverride;
    html += '<div style="margin-bottom:10px"><label class="label">Food Name</label>' +
      textInput({ id: "entryNameInput", value: nameVal, bind: "entryNameInput", enter: "saveEntryDetails" }) + '</div>';
    html += '<div style="margin-bottom:10px"><label class="label">Brand</label>' +
      textInput({ id: "entryBrandInput", value: brandVal, placeholder: "e.g. Schneiders", bind: "entryBrandInput", enter: "saveEntryDetails" }) + '</div>';
    html += '<div style="margin-bottom:10px"><label class="label" style="margin-bottom:6px">Protein Source</label><div class="row">' +
      [[null,"Auto"],[false,"Plant"],[true,"Animal"]].map(function(o) {
        const active = override === o[0];
        return '<button class="chip' + (active ? ' active' : '') + '" data-action="setEntryAnimalOverride" data-arg="' + (o[0] === null ? "auto" : o[0]) + '" style="flex:1;text-align:center">' + o[1] + '</button>';
      }).join('') +
    '</div></div>';
    html += '<div style="color:' + C.textMut + ';font-size:11px;margin-bottom:8px">"Auto" guesses from the food name for the dashboard’s plant-protein estimate. Override it here if it guessed wrong.</div>';
    html += btn({ label: "Save Details", action: "saveEntryDetails", small: true });
  } else if (section === "move") {
    const targetDate = state.ui.entryMoveDate || state.date;
    html += '<div class="row" style="margin-bottom:10px">' +
      btn({ label: "\u2039 Yesterday", action: "moveEntryYesterday", small: true, outline: true }) +
      btn({ label: "Today", action: "moveEntryToday", small: true, outline: true }) +
      btn({ label: "Tomorrow \u203a", action: "moveEntryTomorrow", small: true, outline: true }) +
    '</div>';
    html += '<div class="row" style="align-items:center">' +
      textInput({ value: targetDate, type: "date", bind: "entryMoveDate", style: "flex:1" }) +
      btn({ label: "Move", action: "moveEntryCustomDate", small: true }) +
    '</div>';
  } else {
    const copyDate = state.ui.entryCopyDate || state.date;
    html += '<div style="color:' + C.textMut + ';font-size:11px;margin-bottom:10px">Logs a duplicate of this entry on the date you pick \u2014 the original stays right here.</div>';
    html += '<div class="row" style="margin-bottom:10px">' +
      btn({ label: "\u2039 Yesterday", action: "copyEntryYesterday", small: true, outline: true }) +
      btn({ label: "Today", action: "copyEntryToday", small: true, outline: true }) +
      btn({ label: "Tomorrow \u203a", action: "copyEntryTomorrow", small: true, outline: true }) +
    '</div>';
    html += '<div class="row" style="align-items:center">' +
      textInput({ value: copyDate, type: "date", bind: "entryCopyDate", style: "flex:1" }) +
      btn({ label: "Copy", action: "copyEntryCustomDate", small: true }) +
    '</div>';
  }
  // For barcode-scanned items only: after fixing the weight (Portion) and/or macros (Macros)
  // above, offer to remember the correction so the NEXT scan of this barcode uses it instead
  // of the wrong data the scan returned. Shown on the Portion/Macros tabs, where the fixing
  // actually happens.
  if ((section === "portion" || section === "macros") && barcodeCodeForEntry(entry)) {
    html += '<div style="border-top:1px solid ' + C.border + ';margin-top:12px;padding-top:12px">' +
      '<div style="color:' + C.textMut + ';font-size:11px;margin-bottom:8px">Scanned by barcode. Fixed the numbers above? Save the correction so future scans of this product use it.</div>' +
      btn({ label: "\u{1F4BE} Save correction for future scans", action: "saveBarcodeCorrection", arg: entry.id, small: true, outline: true }) +
    '</div>';
  }
  html += '</div>';
  return html;
}

function macroEditField(key, label, value, enterAction, bindAction) {
  return '<div><label class="label" style="text-transform:capitalize">' + label + '</label>' +
    '<input class="input" type="number" id="editMacro_' + key + '" value="' + value + '" data-enter="' + (enterAction || "saveEditMacros") + '"' + (bindAction ? ' data-bind="' + bindAction + '"' : '') + ' style="padding:6px;font-size:13px"></div>';
}
// Live-patches the (auto-calculated-but-overridable) calories field as protein/carbs/fat are
// edited -- shared by the dashboard log-entry Macros tab and the History food-record Macros
// tab, since both use the same editMacro_* element ids and neither is ever on-screen at the
// same time as the other. Fiber deliberately isn't wired to this (it doesn't factor into
// Atwater calories). Fixes a real gap: alcohol contributes ~7 kcal/g that isn't captured by
// protein/carbs/fat at all, so a food containing it needs calories to be a real, editable
// number rather than always silently re-derived from P/C/F -- exactly like Manual Entry's
// calories field already works.
function patchEditMacroCalories() {
  const p = parseFloat(document.getElementById("editMacro_protein").value) || 0;
  const c = parseFloat(document.getElementById("editMacro_carbs").value) || 0;
  const f = parseFloat(document.getElementById("editMacro_fat").value) || 0;
  const el = document.getElementById("editMacroCaloriesInput");
  if (el) el.value = calcCaloriesFromMacros(p, c, f);
}
inputActions.editMacroProtein = function() { patchEditMacroCalories(); };
inputActions.editMacroCarbs = function() { patchEditMacroCalories(); };
inputActions.editMacroFat = function() { patchEditMacroCalories(); };

function closeEntryEditor() {
  state.ui.editingEntryId = null;
  state.ui.entrySection = "portion";
  state.ui.entryWeightInput = null;
  state.ui.entryMoveDate = null;
  state.ui.entryCopyDate = null;
  state.ui.entryNameInput = null;
  state.ui.entryBrandInput = null;
  state.ui.entryAnimalOverrideInput = undefined;
}

actions.toggleEntryEditor = function(entryId) {
  if (state.ui.editingEntryId === entryId) {
    closeEntryEditor();
  } else {
    const entry = (state.foodLogs[state.date] || []).find(function(e){ return e.id === entryId; });
    state.ui.editingEntryId = entryId;
    state.ui.entrySection = "portion";
    state.ui.entryWeightInput = entry ? String(entry.weight) : "100";
    state.ui.entryMoveDate = state.date;
  }
  rerender();
};
actions.setEntrySection = function(section) { state.ui.entrySection = section; rerender(); };
actions.askRemoveFood = function(entryId) { state.ui.confirmRemoveEntryId = entryId; rerender(); };
actions.cancelRemoveFood = function() { state.ui.confirmRemoveEntryId = null; rerender(); };
actions.removeFood = function(entryId) {
  state.ui.confirmRemoveEntryId = null;
  if (state.ui.editingEntryId === entryId) closeEntryEditor();
  removeFoodFromLog(entryId);
  rerender();
};

inputActions.entryWeightInput = function(val) { state.ui.entryWeightInput = val; };
actions.setEntryWeight = function(grams) { state.ui.entryWeightInput = grams; rerender(); };
actions.saveEntryPortion = function() {
  const id = state.ui.editingEntryId;
  if (!id) return;
  const w = parseFloat(state.ui.entryWeightInput);
  if (!w || w <= 0) return;
  const entry = (state.foodLogs[state.date] || []).find(function(e){ return e.id === id; });
  if (!entry) return;
  const cachedFood = state.foodCache[entry.foodId];
  let macros;
  if (cachedFood) {
    macros = calcMacrosForWeight(cachedFood, w);
  } else {
    const ratio = w / entry.weight;
    macros = {
      calories: Math.round(entry.macros.calories * ratio),
      protein: round1(entry.macros.protein * ratio),
      carbs: round1(entry.macros.carbs * ratio),
      fat: round1(entry.macros.fat * ratio),
      fiber: round1((entry.macros.fiber||0) * ratio),
    };
  }
  updateFoodEntry(id, { weight: w, macros: macros });
  closeEntryEditor();
  rerender();
};

// Editing macros on a log entry only affects that entry \u2014 UNLESS it's a food you created
// yourself (a recipe or a manual/custom-barcode entry), in which case the correction is
// also written back to the source so future uses of it are already fixed.
function propagateCustomFoodEdit(entry, newMacros) {
  if (entry.source === "Manual Entry" || entry.source === "Custom Barcode Entry") {
    const cached = state.foodCache[entry.foodId];
    if (cached) {
      state.foodCache[entry.foodId] = Object.assign({}, cached, {
        calories: newMacros.calories, protein: newMacros.protein, carbs: newMacros.carbs, fat: newMacros.fat, fiber: newMacros.fiber,
      });
      saveFoodCache();
    }
    if (entry.source === "Custom Barcode Entry" && entry.foodId && entry.foodId.indexOf("barcode_") === 0) {
      const code = entry.foodId.slice("barcode_".length);
      if (state.customBarcodes[code]) {
        state.customBarcodes[code] = Object.assign({}, state.customBarcodes[code], {
          calories: newMacros.calories, protein: newMacros.protein, carbs: newMacros.carbs, fat: newMacros.fat, fiber: newMacros.fiber,
        });
        saveCustomBarcodes();
      }
    }
  } else if (entry.source === "Recipe" && entry.foodId && entry.foodId.indexOf("recipe_food_") === 0) {
    const recipeId = entry.foodId.slice("recipe_food_".length);
    const recipe = state.recipes.find(function(r){ return r.id === recipeId; });
    if (recipe) {
      const old = entry.macros;
      const ratioP = old.protein > 0 ? newMacros.protein / old.protein : 1;
      const ratioC = old.carbs > 0 ? newMacros.carbs / old.carbs : 1;
      const ratioF = old.fat > 0 ? newMacros.fat / old.fat : 1;
      const newIngredients = recipe.ingredients.map(function(ing) {
        const p2 = round1(ing.protein * ratioP), c2 = round1(ing.carbs * ratioC), f2 = round1(ing.fat * ratioF);
        return Object.assign({}, ing, { protein: p2, carbs: c2, fat: f2, calories: Math.round(p2 * 4 + c2 * 4 + f2 * 9) });
      });
      state.recipes = state.recipes.map(function(r){ return r.id === recipeId ? Object.assign({}, r, { ingredients: newIngredients, updatedAt: new Date().toISOString() }) : r; });
      saveRecipes();
    }
  }
}

actions.saveEditMacros = function() {
  const id = state.ui.editingEntryId;
  if (!id) return;
  const entry = (state.foodLogs[state.date] || []).find(function(e){ return e.id === id; });
  if (!entry) return;
  const p = Math.max(0, parseFloat(document.getElementById("editMacro_protein").value) || 0);
  const c = Math.max(0, parseFloat(document.getElementById("editMacro_carbs").value) || 0);
  const f = Math.max(0, parseFloat(document.getElementById("editMacro_fat").value) || 0);
  const fib = Math.max(0, parseFloat(document.getElementById("editMacro_fiber").value) || 0);
  // Calories comes from its own (auto-calculated-but-editable) field now, not always
  // recomputed from P/C/F -- so a correction that needs to account for alcohol's extra ~7
  // kcal/g isn't silently discarded on save.
  const cal = Math.max(0, parseFloat(document.getElementById("editMacroCaloriesInput").value) || 0);
  const newMacros = { protein: p, carbs: c, fat: f, fiber: fib, calories: cal };
  propagateCustomFoodEdit(entry, newMacros);
  updateFoodEntry(id, { macros: newMacros });
  closeEntryEditor();
  rerender();
};

inputActions.entryNameInput = function(val) { state.ui.entryNameInput = val; };
inputActions.entryBrandInput = function(val) { state.ui.entryBrandInput = val; };
actions.setEntryAnimalOverride = function(arg) {
  state.ui.entryAnimalOverrideInput = arg === "auto" ? null : (arg === "true");
  rerender();
};
actions.saveEntryDetails = function() {
  const id = state.ui.editingEntryId;
  if (!id) return;
  const entry = (state.foodLogs[state.date] || []).find(function(e){ return e.id === id; });
  if (!entry) return;
  const name = (state.ui.entryNameInput != null ? state.ui.entryNameInput : entry.name).trim();
  if (!name) return; // never allow saving a blank name
  const brand = (state.ui.entryBrandInput != null ? state.ui.entryBrandInput : (entry.brand || "")).trim();
  const override = state.ui.entryAnimalOverrideInput !== undefined ? state.ui.entryAnimalOverrideInput : entry.animalOverride;
  updateFoodEntry(id, { name: name, brand: brand, animalOverride: override });
  closeEntryEditor();
  rerender();
};

// The scannable barcode number behind a logged entry, or null if it isn't a barcode item.
// Barcode-scanned items found in Open Food Facts carry foodId "off_<barcode>" and source
// "Open Food Facts (Barcode)"; ones typed in after a failed scan carry foodId "barcode_<code>".
// Deliberately excludes text-searched OFF results (also "off_" but source "Open Food Facts"),
// since their id may be an internal OFF id rather than a real scannable barcode.
function barcodeCodeForEntry(entry) {
  if (!entry || !entry.foodId) return null;
  if (entry.foodId.indexOf("barcode_") === 0) return entry.foodId.slice("barcode_".length);
  if (entry.source === "Open Food Facts (Barcode)" && entry.foodId.indexOf("off_") === 0) return entry.foodId.slice("off_".length);
  return null;
}

// Snapshots a logged barcode entry's CURRENT weight + macros into state.customBarcodes, keyed
// by the raw barcode. handleBarcodeDetected checks state.customBarcodes[code] before hitting
// Open Food Facts, so the next scan of this product uses the corrected numbers instead of the
// wrong ones OFF returned. Stored in the same per-serving shape as a hand-entered custom
// barcode, so it also shows up (and stays editable/deletable) in Strategy > Data > Custom
// Barcodes. Snapshots the entry as it stands, so fix the weight (Portion) and macros (Macros)
// first, then save the correction.
actions.saveBarcodeCorrection = function(entryId) {
  const entry = (state.foodLogs[state.date] || []).find(function(e){ return e.id === entryId; });
  if (!entry) return;
  const code = barcodeCodeForEntry(entry);
  if (!code) return;
  const w = entry.weight || 100;
  const m = entry.macros;
  state.customBarcodes[code] = {
    id: "barcode_" + code, name: entry.name, brand: "", source: "Custom Barcode Entry",
    per100g: false, calories: m.calories, protein: m.protein, carbs: m.carbs, fat: m.fat, fiber: m.fiber || 0,
    state: "—", servingSizes: [{ label: round1(w) + "g", grams: w }],
  };
  saveCustomBarcodes();
  showToast("Saved — future scans will use this");
};

function moveFoodEntryToDate(entryId, toDate) {
  const fromDate = state.date;
  if (!toDate || toDate === fromDate) return false;
  const list = state.foodLogs[fromDate] || [];
  const idx = list.findIndex(function(e){ return e.id === entryId; });
  if (idx < 0) return false;
  const entry = list[idx];
  list.splice(idx, 1);
  state.foodLogs[fromDate] = list;
  if (!state.foodLogs[toDate]) state.foodLogs[toDate] = [];
  state.foodLogs[toDate].push(entry);
  saveFoodLogs();
  return true;
}

// Unlike moveFoodEntryToDate, copying to the same date the entry is already on is allowed --
// duplicating something logged today onto today ("ate a second serving") is a legitimate case,
// not a no-op to guard against. Leaves the editor open (no closeEntryEditor call) so copying
// the same item to several dates in a row doesn't require reopening it each time.
function copyFoodEntryToDate(entryId, toDate) {
  const fromDate = state.date;
  if (!toDate) return false;
  const list = state.foodLogs[fromDate] || [];
  const entry = list.find(function(e){ return e.id === entryId; });
  if (!entry) return false;
  const now = new Date().toISOString();
  const copy = Object.assign({}, entry, {
    id: "log_" + Date.now() + "_" + Math.random().toString(36).slice(2,7),
    timestamp: now, updatedAt: now,
    photoExpires: entry.photo ? new Date(Date.now() + 2*24*60*60*1000).toISOString() : null,
  });
  if (!state.foodLogs[toDate]) state.foodLogs[toDate] = [];
  state.foodLogs[toDate].push(copy);
  saveFoodLogs();
  return true;
}

// Instant, synchronous matches against foods already logged, favorited, or fetched before --
// shown immediately as the user types (e.g. "ice-" surfaces a previously-added "Ice Cream")
// with no network round trip. The debounced live database search below layers remote hits on
// top of this once the user pauses typing.
function localFoodMatches(q) {
  const seen = new Set();
  const out = [];
  function addFrom(list, cached) {
    list.forEach(function(f) {
      if (seen.has(f.id) || f.name.toLowerCase().indexOf(q) < 0) return;
      seen.add(f.id);
      out.push(cached ? Object.assign({}, f, { source: f.source + " (Cached)" }) : f);
    });
  }
  addFrom(state.recentFoods, false);
  addFrom(state.favorites, false);
  addFrom(Object.values(state.foodCache), true);
  return out;
}

function filterFoodsByName(list, query) {
  const q = (query || "").trim().toLowerCase();
  if (!q) return list;
  return list.filter(function(f){ return f.name.toLowerCase().indexOf(q) >= 0; });
}

// Applies a correction to a food's stored record everywhere it might be cached -- History
// (recentFoods), Favorites, and the general food-lookup cache -- so re-adding it from ANY of
// those places uses the corrected data, not just the one list the user happened to edit from.
// Mirrors propagateCustomFoodEdit's reasoning (a log-entry edit propagating to its source) but
// generalized to any food, editable directly rather than only via a logged instance.
function updateFoodRecordEverywhere(foodId, updates) {
  const idx = state.recentFoods.findIndex(function(f){ return f.id === foodId; });
  if (idx < 0) return false;
  state.recentFoods[idx] = Object.assign({}, state.recentFoods[idx], updates);
  saveRecentFoods();
  const favIdx = state.favorites.findIndex(function(f){ return f.id === foodId; });

let foodSearchDebounceTimer = null;
let foodSearchSeq = 0;

inputActions.foodQuery = function(val) {
  const fu = foodUi();
  fu.query = val;
  fu.wizardSuggestion = detectWizard(val);
  foodSearchSeq++; // invalidate any live search still in flight from an earlier keystroke
  clearTimeout(foodSearchDebounceTimer);

  const q = val.trim().toLowerCase();
  // Previously-eaten foods appear from the very first character -- it's a local, synchronous
  // lookup with no network cost, and surfacing them instantly is the whole point of the group.
  fu.historyResults = q.length >= 1 ? localFoodMatches(q) : [];
  fu.results = []; // database hits arrive below, once the debounced search returns
  fu.searching = false;
  patchFoodResultsBlock();

  if (q.length < 3) return; // too short to bother the (rate-limited) remote databases
  const mySeq = foodSearchSeq;
  foodSearchDebounceTimer = setTimeout(function() { liveFoodSearch(q, mySeq); }, 450);
};

// Database results, minus anything already listed in the "Eaten before" group, so a food the
// user has had before shows once (in history) rather than twice.
function dbResultsExcludingHistory(historyList, dbFoods) {
  const historyIds = new Set((historyList || []).map(function(f){ return f.id; }));
  return deduplicateFoods(dbFoods).filter(function(f){ return !historyIds.has(f.id); });
}

// Debounced as-you-type database search, fired from inputActions.foodQuery after a pause in
// typing so a fast typist doesn't send a USDA + Open Food Facts request per keystroke -- USDA
// in particular runs on a shared, rate-limited demo key (see CLAUDE.md). mySeq guards against
// an older, slower request resolving after a newer one and clobbering fresher results with
// stale ones -- a real risk once searches can overlap, unlike the old tap/Enter-only flow.
async function liveFoodSearch(q, mySeq) {
  const fu = foodUi();
  fu.searching = true;
  patchFoodResultsBlock();
  const usdaP = searchUSDA(q);
  const offP = searchOpenFoodFacts(q);
  const usda = await usdaP, off = await offP;
  if (mySeq !== foodSearchSeq) return; // superseded by further typing or an explicit search
  fu.historyResults = localFoodMatches(q);
  fu.results = dbResultsExcludingHistory(fu.historyResults, usda.concat(off));
  fu.searching = false;
  patchFoodResultsBlock();
}

actions.doFoodSearch = async function() {
  const fu = foodUi();
  const q = fu.query.trim();
  if (!q) return;
  clearTimeout(foodSearchDebounceTimer);
  const mySeq = ++foodSearchSeq;
  const qLower = q.toLowerCase();
  fu.searching = true;
  fu.wizardSuggestion = detectWizard(fu.query);
  fu.historyResults = localFoodMatches(qLower);
  fu.results = [];
  rerender();

  const usdaP = searchUSDA(q);
  const offP = searchOpenFoodFacts(q);
  const usda = await usdaP, off = await offP;
  if (mySeq !== foodSearchSeq) return; // superseded by further typing or another explicit search
  fu.historyResults = localFoodMatches(qLower);
  fu.results = dbResultsExcludingHistory(fu.historyResults, usda.concat(off));
  fu.searching = false;
  rerender();
};

function stopBarcodeCamera() {
  if (barcodeDetectionRAF) { cancelAnimationFrame(barcodeDetectionRAF); barcodeDetectionRAF = null; }
  if (barcodeStream) { barcodeStream.getTracks().forEach(function(t){ t.stop(); }); barcodeStream = null; }
}

async function startBarcodeCamera() {
  const fu = foodUi();
  if (!("BarcodeDetector" in window)) {
    fu.scanError = "Live camera scanning isn't supported in this browser — use manual entry below.";
    rerender();
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    if (!foodUi().scanningBarcode) { stream.getTracks().forEach(function(t){ t.stop(); }); return; } // closed while awaiting permission
    barcodeStream = stream;
    const video = document.getElementById("barcodeVideo");
    if (!video) { stopBarcodeCamera(); return; }
    video.srcObject = stream;
    await video.play();
    const detector = new BarcodeDetector({ formats: ["ean_13", "ean_8", "upc_a", "upc_e", "code_128"] });
    const tick = async function() {
      if (!foodUi().scanningBarcode) return;
      try {
        const codes = await detector.detect(video);
        if (codes.length > 0) {
          stopBarcodeCamera();
          handleBarcodeDetected(codes[0].rawValue);
          return;
        }
      } catch (e) { /* keep trying next frame */ }
      barcodeDetectionRAF = requestAnimationFrame(tick);
    };
    barcodeDetectionRAF = requestAnimationFrame(tick);
  } catch (e) {
    foodUi().scanError = "Couldn't access camera (" + e.message + ") — use manual entry below.";
    rerender();
  }
}

async function handleBarcodeDetected(code) {
  const fu = foodUi();
  fu.scanNotFoundCode = null;

  const remembered = state.customBarcodes[code];
  if (remembered) {
    fu.scanningBarcode = false;
    fu.addingFood = remembered;
    fu.addWeight = String(remembered.loggedWeight || (remembered.servingSizes && remembered.servingSizes[0] && remembered.servingSizes[0].grams) || "");
    fu.addServingBasis = null; fu.addQty = "1";
    pendingFocusId = "addWeightInput";
    rerender();
    return;
  }

  fu.scanLoading = true; fu.scanError = null;
  rerender();
  const food = await searchBarcode(code);
  fu.scanLoading = false;
  if (!food) {
    fu.scanNotFoundCode = code;
    fu.customBarcodeManual = { name: "", weight: "100", calories: "", protein: "", carbs: "", fat: "", fiber: "" };
    rerender();
    return;
  }
  fu.scanningBarcode = false;
  fu.addingFood = food;
  fu.addWeight = "";
  fu.addServingBasis = null; fu.addQty = "1";
  pendingFocusId = "addWeightInput";
  rerender();
}

function sumRecipeIngredients(ingredients) {
  return (ingredients || []).reduce(function(acc, i) {
    return {
      weight: acc.weight + (i.weight || 0),
      calories: acc.calories + (i.calories || 0),
      protein: acc.protein + (i.protein || 0),
      carbs: acc.carbs + (i.carbs || 0),
      fat: acc.fat + (i.fat || 0),
      fiber: acc.fiber + (i.fiber || 0),
    };
  }, { weight: 0, calories: 0, protein: 0, carbs: 0, fat: 0, fiber: 0 });
}

}

actions.logRecipe = function(id) {
  const recipe = state.recipes.find(function(r){ return r.id === id; });
  if (!recipe) return;
  const totals = sumRecipeIngredients(recipe.ingredients);
  const fu = foodUi();
  fu.loggingRecipe = recipe;
  fu.loggingWeight = String(round1(totals.weight) || 100);
  rerender();
};
actions.cancelLogRecipe = function() { stepBackOneLevel(); };
inputActions.loggingRecipeWeight = function(val) { foodUi().loggingWeight = val; };
actions.confirmLogRecipe = function() {
  const fu = foodUi();
  const recipe = fu.loggingRecipe;
  if (!recipe) return;
  const now = Date.now();
  if (fu._confirmLock && now - fu._confirmLock < 600) return;
  fu._confirmLock = now;
  const totals = sumRecipeIngredients(recipe.ingredients);
  const w = parseFloat(fu.loggingWeight) || 0;
  const ratio = totals.weight > 0 ? w / totals.weight : 0;
  const m = { calories: Math.round(totals.calories * ratio), protein: round1(totals.protein * ratio), carbs: round1(totals.carbs * ratio), fat: round1(totals.fat * ratio), fiber: round1(totals.fiber * ratio) };
  addFoodToLog({
    id: "recipe_food_" + recipe.id, name: recipe.name, source: "Recipe",
    calories: m.calories, protein: m.protein, carbs: m.carbs, fat: m.fat, fiber: m.fiber,
    state: "—", loggedWeight: w, loggedMacros: m, timestamp: new Date().toISOString(),
  });
  stepBackOneLevel();
};

actions.selectFoodForAdd = function(foodId, srcTab) {
  const fu = foodUi();
  let food = fu.results.find(function(f){ return f.id === foodId; });

  // results, so it has to be searched too -- those rows can come from favorites or the food
  // cache, not just recentFoods, and would otherwise fall through the srcTab checks below.
  if (!food) food = (fu.historyResults || []).find(function(f){ return f.id === foodId; });
  if (!food && srcTab === "history") food = state.recentFoods.find(function(f){ return f.id === foodId; });
  if (!food && srcTab === "favorites") food = state.favorites.find(function(f){ return f.id === foodId; });
  if (!food) food = state.foodCache[foodId];
  if (!food) return;
  fu.addingFood = food;
  fu.addWeight = food.loggedWeight ? String(food.loggedWeight) : "";
  fu.addServingBasis = null; fu.addQty = "1";
  pendingFocusId = "addWeightInput";
  rerender();
};
