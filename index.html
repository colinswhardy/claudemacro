// Shared by the three "pick a serving size, then dial in quantity or grams" screens (adding a
// food from search, picking a recipe ingredient, and the wizard's result screen): tapping a
// serving chip like "1 cookie (33g)" lets you type a quantity ("2") instead of calculating
// grams yourself. Each screen keeps its own weight/servingBasis/qty state (different
// containers), but the math and the calorie-preview DOM patching are identical, so they're
// factored out here instead of tripled. Patching (not a full rerender) matters because a
// rerender mid-keystroke would blur the input the user is actively typing into.
function computeQtyWeight(qty, basisGrams) {
  return round1((parseFloat(qty) || 0) * basisGrams);
}
function patchMacroPreview(idPrefix, food, weight) {
  const m = calcMacrosForWeight(food, weight);
  const calEl = document.getElementById(idPrefix + "Cal");
  if (calEl) calEl.textContent = m.calories;
  const proEl = document.getElementById(idPrefix + "Pro");
  if (proEl) proEl.textContent = m.protein + "g";
  const carbEl = document.getElementById(idPrefix + "Carb");
  if (carbEl) carbEl.textContent = m.carbs + "g";
  const fatEl = document.getElementById(idPrefix + "Fat");
  if (fatEl) fatEl.textContent = m.fat + "g";
  return m;
}
// Renders the serving-size chips plus, depending on mode, either a quantity input ("2" x this
// serving) or a plain grams input. cfg: { food, weight, servingBasis, qty, chipAction,
// weightInputId, weightBind, qtyInputId, qtyBind, qtyReadoutId, enterAction, useGramsAction,
// compact (tighter spacing for the ingredient picker's smaller card) }.
function renderServingControls(cfg) {
  const gapBottom = cfg.compact ? "12px" : "16px";
  let html = '<div class="rowWrap" style="margin-bottom:' + gapBottom + '">' +
    (cfg.food.servingSizes || []).map(function(s) {
      const active = cfg.servingBasis === s.grams;
      return '<button class="chip' + (active ? ' active' : '') + '" data-action="' + cfg.chipAction + '" data-arg="' + s.grams + '">' + esc(s.label) + '</button>';
    }).join('') +
  '</div>';
  if (cfg.servingBasis) {
    html += '<div class="row" style="align-items:center;margin-bottom:8px">' +
      textInput({ id: cfg.qtyInputId, value: cfg.qty, type: "number", bind: cfg.qtyBind, enter: cfg.enterAction, style: "width:90px" }) +
      '<span id="' + cfg.qtyReadoutId + '" style="color:' + C.textMut + ';font-size:13px;align-self:center">× ' + round1(cfg.servingBasis) + 'g each = ' + round1(cfg.weight) + 'g</span>' +
    '</div>';
    html += '<div style="margin-bottom:' + (cfg.compact ? "12px" : "20px") + '">' + btn({ label: "Enter grams instead", action: cfg.useGramsAction, outline: true, small: true }) + '</div>';
  } else {
    html += '<div class="row" style="align-items:center;margin-bottom:' + (cfg.compact ? "12px" : "20px") + '">' +
      textInput({ id: cfg.weightInputId, value: cfg.weight, type: "number", bind: cfg.weightBind, enter: cfg.enterAction, style: "flex:1" }) +
      '<span style="color:' + C.textMut + (cfg.compact ? ';font-size:13px' : '') + ';align-self:center">grams</span>' +
    '</div>';
  }
  return html;
}

inputActions.addQty = function(val) {

// protein/carbs/fat -> calories, shared by Manual Entry and the "barcode not found" custom entry
// screen (both let you type raw macros for a food that isn't in any database). Atwater factors
// (4/4/9) match the ones already used for recipe-ingredient scaling and the Strategy tab's
// calorie<->macro target math.
function calcCaloriesFromMacros(protein, carbs, fat) {
  return Math.round((parseFloat(protein) || 0) * 4 + (parseFloat(carbs) || 0) * 4 + (parseFloat(fat) || 0) * 9);
}

function renderAiComparison(fu) {
  if (!fu.aiCompareError && !fu.aiCompareResults) return '';
  let html = '<div style="margin-top:4px;margin-bottom:16px">';
  html += '<div style="color:' + C.textSec + ';font-size:13px;font-weight:600;margin-bottom:8px">Gemini Comparison</div>';
  if (fu.aiCompareError) {
    html += '<div style="padding:10px 12px;background:' + C.warning + '15;border-radius:8px;color:' + C.warning + ';font-size:13px">' + esc(fu.aiCompareError) + '</div></div>';
    return html;
  }
  const primaryLabel = aiProviderLabel(state.settings.aiProvider);
  const a = sumAiItems(fu.aiResults);
  const b = sumAiItems(fu.aiCompareResults);
  const metrics = [["Calories", "calories", C.calories, ""], ["Protein", "protein", C.protein, "g"], ["Carbs", "carbs", C.carbs, "g"], ["Fat", "fat", C.fat, "g"]];

  html += '<div style="background:' + C.inputBg + ';border:1px solid ' + C.border + ';border-radius:10px;padding:12px 14px">';
  html += '<div style="display:flex;font-size:11px;color:' + C.textMut + ';margin-bottom:8px"><div style="flex:1"></div><div style="width:64px;text-align:right">' + esc(primaryLabel) + '</div><div style="width:64px;text-align:right">Gemini</div></div>';
  metrics.forEach(function(m) {
    const va = a[m[1]], vb = b[m[1]];
    const denom = Math.max(va, vb, 1);
    const pctDiff = Math.abs(va - vb) / denom * 100;
    const notable = pctDiff >= 15;
    html += '<div style="display:flex;align-items:center;padding:4px 0' + (notable ? ';background:' + C.warning + '11;border-radius:6px' : '') + '">' +
      '<div style="flex:1;font-size:13px;color:' + m[2] + '">' + m[0] + '</div>' +
      '<div style="width:64px;text-align:right;font-size:13px;color:' + C.text + '">' + (Math.round(va * 10) / 10) + m[3] + '</div>' +
      '<div style="width:64px;text-align:right;font-size:13px;color:' + C.text + '">' + (Math.round(vb * 10) / 10) + m[3] + '</div>' +
    '</div>';
    if (notable) {
      html += '<div style="text-align:right;font-size:11px;color:' + C.warning + ';margin-bottom:2px">⚠ differs by ' + Math.round(pctDiff) + '%</div>';
    }
  });
  html += '</div>';
  if (fu.aiPhoto) {
    html += '<div style="color:' + C.textMut + ';font-size:11px;margin-top:6px">Gemini’s estimate is text-only — it doesn’t see the attached photo.</div>';
  }
  html += renderAiResultsBlock("Gemini Results:", C.textSec, fu.aiCompareResults, "addAiCompareResult", "addAiCompareResultsCombined");
  html += '</div>';
  return html;
}

function sumAiItems(items) {
  return (items || []).reduce(function(acc, item) {
    return {
      weight: acc.weight + (item.quantity_grams || 0),
      calories: acc.calories + (item.calories || 0),
      protein: acc.protein + (item.protein || 0),
      carbs: acc.carbs + (item.carbs || 0),
      fat: acc.fat + (item.fat || 0),
      fiber: acc.fiber + (item.fiber || 0),
    };
  }, { weight: 0, calories: 0, protein: 0, carbs: 0, fat: 0, fiber: 0 });
}

actions.runAIEstimate = async function() {
  const fu = foodUi();
  if (!fu.aiDesc.trim() && !fu.aiPhoto) return;
  fu.aiLoading = true; fu.aiError = null; fu.aiCompareResults = null; fu.aiCompareError = null;
  rerender();

  const set = state.settings;
  const isClaudePrimary = set.aiProvider === "claude-haiku" || set.aiProvider === "claude-sonnet";
  const doCompare = isClaudePrimary && set.compareWithGemini;

  let primaryP;
  if (set.aiProvider === "gemini" && set.geminiApiKey) {
    primaryP = estimateWithGemini(fu.aiDesc, set.geminiApiKey);
  } else if (!set.claudeApiKey) {
    primaryP = Promise.resolve({ error: "No Claude API key set. Add one in Strategy \u2192 AI Settings, or switch provider to Gemini." });
  } else {
    primaryP = estimateWithClaude(fu.aiDesc, fu.aiPhoto, set.aiProvider, set.claudeApiKey);
  }
  const comparePromise = doCompare
    ? (set.geminiApiKey ? estimateWithGemini(fu.aiDesc, set.geminiApiKey) : Promise.resolve({ error: "No Gemini API key set. Add one in Strategy \u2192 AI Settings to enable comparison." }))
    : Promise.resolve(null);

  const results = await Promise.all([primaryP, comparePromise]);
  const result = results[0];
  const compareResult = results[1];
  fu.aiLoading = false;
  if (result.error) { fu.aiError = result.error; }
  else { fu.aiResults = result.data; fu.aiError = null; }
  if (compareResult) {
    if (compareResult.error) { fu.aiCompareError = compareResult.error; }
    else { fu.aiCompareResults = compareResult.data; fu.aiCompareError = null; }
  }
  rerender();
};

        enterAction: "wizardConfirmAdd", useGramsAction: "wizardUseGrams", compact: true,
      }) +
      '<div style="margin-bottom:8px"><span id="wizardPreviewCal" style="color:' + C.calories + ';font-weight:700;font-size:18px">' + m.calories + '</span><span style="color:' + C.calories + ';font-weight:700;font-size:18px"> kcal</span></div>' +
      '<div class="row" style="gap:12px;font-size:13px">' +
        '<span style="color:' + C.protein + '">P: <span id="wizardPreviewPro">' + m.protein + 'g</span></span>' +
        '<span style="color:' + C.carbs + '">C: <span id="wizardPreviewCarb">' + m.carbs + 'g</span></span>' +
        '<span style="color:' + C.fat + '">F: <span id="wizardPreviewFat">' + m.fat + 'g</span></span>' +
        (m.fiber > 0 ? '<span style="color:' + C.textMut + '">Fiber: ' + m.fiber + 'g</span>' : '') +
      '</div></div>';
  }

  html += '<div class="row" style="margin-top:16px">' +
    btn({ label: "Cancel", action: "closeWizard", outline: true, full: true }) +
    btn({ id: "wizardConfirmBtn", label: "Add to Log", action: "wizardConfirmAdd", full: true, disabled: !wiz.selectedFood || !(parseFloat(wiz.weight) > 0) }) +
  '</div>';
  return html;
}

actions.wizardSelect = async function(option) {
  const fu = foodUi();
  const wiz = fu.wizard;
  const config = WIZARD_CONFIGS[fu.wizardType];
  const currentStep = config.steps[wiz.step];
  wiz.selections[currentStep.key] = option;
  const isLastStep = wiz.step === config.steps.length - 1;

  if (option === "Other") {
    wiz.showAI = true;
    rerender();
    return;
  }
  if (isLastStep) {
    wiz.searching = true;
    rerender();
    const parts = [config.label];
    Object.keys(wiz.selections).forEach(function(k) {
      const v = wiz.selections[k];
      if (v !== "Other" && v !== "As-Served") parts.push(v);
    });
    const query = parts.join(" ");
    const usda = await searchUSDA(query);
    const off = await searchOpenFoodFacts(query);
    const merged = deduplicateFoods(usda.concat(off));
    wiz.searchResults = merged;
    wiz.searching = false;
    if (merged.length > 0) { wiz.selectedFood = merged[0]; wiz.weight = ""; wiz.servingBasis = null; wiz.qty = "1"; pendingFocusId = "wizardWeightInput"; }
    rerender();
  } else {
    wiz.step += 1;
    rerender();
  }
};

actions.wizardBack = function() { foodUi().wizard.step -= 1; rerender(); };
actions.wizardAiBack = function() { foodUi().wizard.showAI = false; rerender(); };

actions.wizardAiEstimate = async function() {
  const fu = foodUi();
  const wiz = fu.wizard;
  if (!wiz.aiDesc.trim()) return;
  wiz.aiLoading = true; wiz.aiError = null;
  rerender();
  const config = WIZARD_CONFIGS[fu.wizardType];
  const parts = [config.label];
  Object.keys(wiz.selections).forEach(function(k) { if (wiz.selections[k] !== "Other") parts.push(wiz.selections[k]); });
  const fullDesc = parts.join(", ") + ": " + wiz.aiDesc;

  const set = state.settings;
  const isClaudePrimary = set.aiProvider === "claude-haiku" || set.aiProvider === "claude-sonnet";
  const doCompare = isClaudePrimary && set.compareWithGemini && !!set.geminiApiKey;

  let primaryP;
  if (set.aiProvider === "gemini" && set.geminiApiKey) {
    primaryP = estimateWithGemini(fullDesc, set.geminiApiKey);
  } else if (!set.claudeApiKey) {
    primaryP = Promise.resolve({ error: "No Claude API key set. Add one in Strategy \u2192 AI Settings." });
  } else {
    primaryP = estimateWithClaude(fullDesc, null, set.aiProvider, set.claudeApiKey);
  }
  const comparePromise = doCompare ? estimateWithGemini(fullDesc, set.geminiApiKey) : Promise.resolve(null);

  const results = await Promise.all([primaryP, comparePromise]);
  const result = results[0];
  const compareResult = results[1];
  wiz.aiLoading = false;
  if (result.error) { wiz.aiError = result.error; rerender(); return; }
  if (!result.data || result.data.length === 0) { wiz.aiError = "No estimate returned."; rerender(); return; }

  const primaryEst = result.data[0];
  // Only treated as a real second candidate if it actually came back clean -- a compare
  // failure (missing key, network error, etc.) just silently falls back to the single-result
  // flow below rather than blocking on or surfacing a secondary error in this compact screen.
  const compareEst = (compareResult && !compareResult.error && compareResult.data && compareResult.data.length > 0) ? compareResult.data[0] : null;

  if (!compareEst) {
    wiz.selectedFood = {
      id: "ai_" + Date.now(), name: primaryEst.name || fullDesc, source: "AI Estimate",
      calories: primaryEst.calories, protein: primaryEst.protein, carbs: primaryEst.carbs, fat: primaryEst.fat, fiber: primaryEst.fiber || 0,
      state: wiz.selections.prep || "\u2014",
      servingSizes: [{ label: primaryEst.quantity_grams + "g", grams: primaryEst.quantity_grams }],
      per100g: false, reason: primaryEst.reason || "",
    };
    wiz.weight = String(primaryEst.quantity_grams || 100);
    wiz.servingBasis = null; wiz.qty = "1";
    wiz.searchResults = [];
  } else {
    // Both providers came back -- reuse the wizard's existing "pick from a list of candidate
    // foods" screen (the same one regular database search results use) instead of building
    // new UI. That list renders each candidate's calories as a per-100g rate, so convert each
    // estimate to one instead of leaving it as an absolute value for the estimated portion.
    const toPer100gFood = function(est, providerLabel) {
      const grams = est.quantity_grams || 100;
      const scale = 100 / grams;
      return {
        id: "ai_" + Date.now() + "_" + providerLabel,
        name: (est.name || fullDesc) + " (" + providerLabel + ")",
        source: "AI Estimate", state: wiz.selections.prep || "\u2014",
        calories: Math.round(est.calories * scale), protein: round1(est.protein * scale),
        carbs: round1(est.carbs * scale), fat: round1(est.fat * scale), fiber: round1((est.fiber || 0) * scale),
        per100g: true, reason: est.reason || "",
        servingSizes: [{ label: Math.round(grams) + "g (estimated)", grams: grams }],
      };
    };
    wiz.searchResults = [
      toPer100gFood(primaryEst, aiProviderLabel(set.aiProvider)),
      toPer100gFood(compareEst, "Gemini"),
    ];
    wiz.selectedFood = null;
  }
  wiz.showAI = false;
  rerender();
};

actions.wizardConfirmAdd = function() {
  const fu = foodUi();
  const wiz = fu.wizard;
  if (!wiz.selectedFood) return;
  const w = parseFloat(wiz.weight);
  if (!w || w <= 0) return;
  const now = Date.now();
  if (fu._confirmLock && now - fu._confirmLock < 600) return;
  fu._confirmLock = now;
  const m = calcMacrosForWeight(wiz.selectedFood, w);
  addFoodToLog(Object.assign({}, wiz.selectedFood, { loggedWeight: w, loggedMacros: m, timestamp: new Date().toISOString(), wizardUsed: true }));
  fu.query = ""; fu.results = []; fu.historyResults = [];
  stepBackOneLevel();
};

  );

  const allWeights = Object.keys(state.weights).sort().map(function(d){ return [d, state.weights[d]]; });
  const latestWeight = allWeights.length > 0 ? allWeights[allWeights.length-1][1].weight : null;
  const latestDateStr = allWeights.length > 0 ? allWeights[allWeights.length-1][0] : null;
  const effStartDate = set.startDate || (allWeights.length > 0 ? allWeights[0][0] : null);
  const effStartWeight = (set.startWeight != null && set.startWeight !== "") ? set.startWeight : (allWeights.length > 0 ? allWeights[0][1].weight : null);

  // wu.statsFollowsRange and switches these two cards (only these two -- Current Weight/Total

// X pixel position for each date, proportional to its real elapsed time from the first date --
// so missed days leave a proportional gap. dates is ascending "YYYY-MM-DD" strings; returns an
// array of x pixels from x0 (left edge) across plotWidth. Degenerate spans (one date, or all
// the same) collapse to x0. Pure and date-only, so it's unit-tested directly.
function weightChartXPositions(dates, x0, plotWidth) {
  const t0 = parseDateStr(dates[0]).getTime();
  const tSpan = parseDateStr(dates[dates.length - 1]).getTime() - t0;
  return dates.map(function(d) {
    if (tSpan <= 0) return x0;
    return x0 + ((parseDateStr(d).getTime() - t0) / tSpan) * plotWidth;
  });
}

// Millisecond cutoff for a "7d"/"30d"/"90d"/"6m"/"all" chip, as a real calendar-day boundary --
// N calendar days ending on (and including) referenceDateStr, at local midnight. "all" (or
// anything unrecognized) returns 0, admitting everything.
//
// Fixed 2026-07: this used to be `Date.now() - N*86400000` compared against each entry's
// local-midnight timestamp. Date.now() is a moving clock-time, not a calendar boundary, so the
// cutoff fell at an arbitrary time WITHIN a day rather than at midnight -- whichever calendar
// day that happened to slice through got silently excluded, depending purely on what time of
// day "now" was when the chart was viewed (reported as "7d seems to start from Monday": if
// today is Sunday, the boundary lands partway through the Sunday one week back, which always
// sorts after that Sunday's own midnight timestamp, so that Sunday drops out and the window
// effectively starts the following Monday). setDate() (not raw ms subtraction) so this is also
// correct across DST transitions, which are 23 or 25 hours, not a clean 24.
function weightChartCutoff(timeRange, referenceDateStr) {
  const days = { "7d": 7, "30d": 30, "90d": 90, "6m": 180 }[timeRange];
  if (!days) return 0;
  const d = parseDateStr(referenceDateStr);
  d.setDate(d.getDate() - (days - 1)); // inclusive of the reference day itself -> N calendar days total
  return d.getTime();
}

// First-vs-last net change across a chart's currently-filtered window, expressed the same way
// the starting-point calculation is (avg/day, and per-week). null when there isn't enough data
// in the window to say anything (fewer than 2 points). data: ascending [{date, weight}].
function weightRangeStats(data) {
  if (!data || data.length < 2) return null;
  const first = data[0], last = data[data.length - 1];
  const days = Math.max(1, (parseDateStr(last.date) - parseDateStr(first.date)) / 86400000);
  const change = last.weight - first.weight;
  return { avgDaily: Math.round((change / days) * 100) / 100, weeklyChange: round1(change / (days / 7)) };
}
function weightStatsRangeLabel(timeRange) {
  return { "7d": "last 7 days", "30d": "last 30 days", "90d": "last 90 days", "6m": "last 6 months", "all": "all time" }[timeRange] || "selected range";
}

function renderWeightChart(data, goalWeight, selectedDate) {
  const w = 460, h = 200, padL = 36, padR = 10, padT = 10, padB = 24;
  const weights = data.map(function(d){ return d.weight; });
  let minW = Math.min.apply(null, weights), maxW = Math.max.apply(null, weights);
  if (goalWeight) { minW = Math.min(minW, goalWeight); maxW = Math.max(maxW, goalWeight); }
  const pad = (maxW - minW) * 0.15 || 2;
  minW -= pad; maxW += pad;
  // X is proportional to actual elapsed time, not evenly spaced by index (see
  // weightChartXPositions) -- a gap where a day or week of weigh-ins was missed shows as a real
  // horizontal gap instead of sitting as close as two consecutive days.
  const xs = weightChartXPositions(data.map(function(d){ return d.date; }), padL, w - padL - padR);
  const yScale = function(val) { return padT + (1 - (val - minW) / (maxW - minW)) * (h - padT - padB); };
  const xScale = function(i) { return xs[i]; };

  let path = "";
  data.forEach(function(d, i) {
    const x = xScale(i), y = yScale(d.weight);
    path += (i === 0 ? "M" : "L") + x.toFixed(1) + "," + y.toFixed(1) + " ";
  });

  let dots = "";
  data.forEach(function(d, i) {
    const cx = xScale(i).toFixed(1), cy = yScale(d.weight).toFixed(1);
    const isSel = d.date === selectedDate;
    // Larger invisible circle first so small dots stay easy to tap on mobile.
    dots += '<circle cx="' + cx + '" cy="' + cy + '" r="12" fill="transparent" data-action="selectWeightPoint" data-arg="' + d.date + '" style="cursor:pointer"></circle>';
    dots += '<circle cx="' + cx + '" cy="' + cy + '" r="' + (isSel ? 6 : 3) + '" fill="' + (isSel ? C.warning : C.primary) + '"' + (isSel ? ' stroke="#fff" stroke-width="2"' : '') + ' data-action="selectWeightPoint" data-arg="' + d.date + '" style="cursor:pointer;pointer-events:none"></circle>';
  });

  let gridLines = "";
  const numGrid = 4;
  for (let g = 0; g <= numGrid; g++) {
    const y = padT + (g / numGrid) * (h - padT - padB);
    gridLines += '<line x1="' + padL + '" y1="' + y.toFixed(1) + '" x2="' + (w-padR) + '" y2="' + y.toFixed(1) + '" stroke="' + C.border + '" stroke-width="1" stroke-dasharray="3,3"></line>';
  }

  let xLabels = "";
  const labelEvery = Math.max(1, Math.ceil(data.length / 5));
  data.forEach(function(d, i) {
    if (i % labelEvery === 0 || i === data.length - 1) {
      const lbl = parseDateStr(d.date).toLocaleDateString("en-US", { month: "short", day: "numeric" });
      xLabels += '<text x="' + xScale(i).toFixed(1) + '" y="' + (h-6) + '" font-size="10" fill="' + C.textMut + '" text-anchor="middle">' + lbl + '</text>';
    }
  });

  let yLabels = "";
  for (let g = 0; g <= numGrid; g++) {
    const val = maxW - (g / numGrid) * (maxW - minW);
    const y = padT + (g / numGrid) * (h - padT - padB);
    yLabels += '<text x="4" y="' + (y+3).toFixed(1) + '" font-size="10" fill="' + C.textMut + '">' + Math.round(val) + '</text>';
  }

  let goalLine = "";
  if (goalWeight && goalWeight >= minW && goalWeight <= maxW) {
    const gy = yScale(goalWeight);
    goalLine = '<line x1="' + padL + '" y1="' + gy.toFixed(1) + '" x2="' + (w-padR) + '" y2="' + gy.toFixed(1) + '" stroke="' + C.success + '" stroke-width="1.5" stroke-dasharray="5,5"></line>' +
      '<text x="' + (w-padR) + '" y="' + (gy-4).toFixed(1) + '" font-size="10" fill="' + C.success + '" text-anchor="end">Goal: ' + goalWeight + '</text>';
  }

  return '<div style="width:100%;overflow-x:auto"><svg viewBox="0 0 ' + w + ' ' + h + '" style="width:100%;height:220px" preserveAspectRatio="xMidYMid meet">' +
    gridLines + yLabels + xLabels + goalLine +
    '<path d="' + path + '" fill="none" stroke="' + C.primary + '" stroke-width="2"></path>' +
    dots +
  '</svg></div>';
}

function parseCsvLine(line) {
  const result = [];
  let cur = "", inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQuotes) {
      if (c === '"') {
        if (line[i+1] === '"') { cur += '"'; i++; }
        else { inQuotes = false; }
      } else { cur += c; }
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { result.push(cur); cur = ""; }
      else cur += c;
    }
  }
  result.push(cur);
  return result;
}

changeActions.renphoImport = function(el) {
  const file = el.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const text = ev.target.result;
      const lines = text.split("\n").filter(function(l){ return l.trim(); });
      const cols0 = parseCsvLine(lines[0]).map(function(h){ return h.toLowerCase(); });
      const dateIdx = cols0.findIndex(function(h){ return h.indexOf("time") >= 0 || h.indexOf("date") >= 0; });
      const weightIdx = cols0.findIndex(function(h){ return h.indexOf("weight") >= 0; });
      if (dateIdx < 0 || weightIdx < 0) { weightUi().importMsg = "Could not detect date/weight columns"; rerender(); return; }
      let count = 0;
      for (let i = 1; i < lines.length; i++) {
        const cols = parseCsvLine(lines[i]);
        if (cols.length <= Math.max(dateIdx, weightIdx)) continue;
        const dateStr = cols[dateIdx].trim().replace(/"/g, "");
        const w = parseFloat(cols[weightIdx].trim().replace(/"/g, ""));
        if (!w || isNaN(w)) continue;
        let d;
        if (dateStr.indexOf("/") >= 0) {
          const parts = dateStr.split(/[\s/]/);
          if (parts[2] && parts[2].length === 4) d = parts[2] + "-" + parts[0].padStart(2,"0") + "-" + parts[1].padStart(2,"0");
          else d = fmtDate(new Date(dateStr));
        } else {
          d = fmtDate(new Date(dateStr));
        }
        if (d && d !== "NaN-NaN-NaN" && !state.weights[d]) {
          state.weights[d] = { weight: w, unit: "lbs", timestamp: new Date(dateStr).toISOString(), updatedAt: new Date().toISOString() };
          count++;
        }
      }
      saveWeights();
      weightUi().importMsg = "Imported " + count + " weight entries";
      rerender();
    } catch (e) {
      weightUi().importMsg = "Error parsing file. Check format.";
      rerender();
    }
  };
  reader.readAsText(file);
  el.value = "";
};

const MACRO_CAL_PER_G = { protein: 4, carbs: 4, fat: 9 };

// Editing a macro gram field directly always recomputes calories from the (now current) grams —
// locks don't apply in this direction, they only protect grams when *calories* change (below).
function syncCalorieFromMacros() {
  const set = state.settings;
  set.calorieTarget = Math.round(set.proteinTarget * 4 + set.carbsTarget * 4 + set.fatTarget * 9);
  saveSettings();
  const el = document.getElementById("calorieTargetInput");
  if (el) el.value = set.calorieTarget;
}
inputActions.proteinTarget = function(v) { state.settings.proteinTarget = parseInt(v,10) || 0; state.settings.macroPreset = "Custom"; syncCalorieFromMacros(); };
inputActions.carbsTarget = function(v) { state.settings.carbsTarget = parseInt(v,10) || 0; state.settings.macroPreset = "Custom"; syncCalorieFromMacros(); };
inputActions.fatTarget = function(v) { state.settings.fatTarget = parseInt(v,10) || 0; state.settings.macroPreset = "Custom"; syncCalorieFromMacros(); };

// Editing calories redistributes the change across unlocked macros only, preserving their
// relative proportion to each other; locked macros' grams are left untouched.
inputActions.calorieTarget = function(v) {
  const set = state.settings;
  const newCal = parseInt(v, 10) || 0;
  set.calorieTarget = newCal;
  const locks = set.macroLocks || {};
  const keys = ["protein", "carbs", "fat"];
  const lockedKeys = keys.filter(function(k){ return locks[k]; });
  const unlockedKeys = keys.filter(function(k){ return !locks[k]; });
  const lockedCal = lockedKeys.reduce(function(sum, k){ return sum + set[k + "Target"] * MACRO_CAL_PER_G[k]; }, 0);
  const remaining = Math.max(0, newCal - lockedCal);
  if (unlockedKeys.length > 0) {
    const unlockedCalTotal = unlockedKeys.reduce(function(sum, k){ return sum + set[k + "Target"] * MACRO_CAL_PER_G[k]; }, 0);
    unlockedKeys.forEach(function(k) {
      const share = unlockedCalTotal > 0 ? (set[k + "Target"] * MACRO_CAL_PER_G[k]) / unlockedCalTotal : 1 / unlockedKeys.length;
      set[k + "Target"] = Math.round((remaining * share) / MACRO_CAL_PER_G[k]);
    });
  }
  set.macroPreset = "Custom";
  saveSettings();
  keys.forEach(function(k) {
    const el = document.getElementById(k + "TargetInput");
    if (el) el.value = set[k + "Target"];
  });
};

actions.toggleMacroLock = function(key) {
  const set = state.settings;
  const locks = Object.assign({ protein: false, carbs: false, fat: false }, set.macroLocks);
  const lockedCount = ["protein", "carbs", "fat"].filter(function(k){ return locks[k]; }).length;
  if (!locks[key] && lockedCount >= 2) return; // max 2 locks at once
  locks[key] = !locks[key];
  set.macroLocks = locks;
  saveSettings();
  rerender();
};

const KCAL_PER_WEIGHT_UNIT = { lbs: 3500, kg: 7700 };

// Maintenance (TDEE) estimated from Colin's own history instead of a Mifflin-type formula --
// the app never collects height/age/sex, but it does have months of logged intake and daily
// weigh-ins, which is strictly better data: over the last 28 full days, maintenance = average
// logged intake minus the energy equivalent of the weight actually gained/lost across that
// window. Days under 800 kcal are treated as incompletely logged and skipped (a partial day
// would drag the average down and understate maintenance). Needs >= 10 usable food days and
// two weigh-ins spanning >= 14 days; returns null rather than a garbage number below that.
// The intake average (complete food days only) and the weight trend (first/last weigh-in in
// the window) cover slightly different day sets -- inherent to the heuristic, fine at this
// precision.
function estimateMaintenanceCalories() {
  const unit = state.settings.weightUnit || "lbs";
  const kcalPerUnit = KCAL_PER_WEIGHT_UNIT[unit] || 3500;
  const today = todayStr();
  const cutoff = fmtDate(new Date(Date.now() - 28 * 86400000));
  const calDays = [];
  Object.keys(state.foodLogs).forEach(function(d) {
    if (d >= cutoff && d < today) { // exclude today: it's usually mid-logging
      const cals = (state.foodLogs[d] || []).reduce(function(s, e){ return s + (e.macros.calories || 0); }, 0);
      if (cals >= 800) calDays.push(cals);
    }
  });
  const weighDates = Object.keys(state.weights).filter(function(d){ return d >= cutoff && d <= today; }).sort();
  if (calDays.length < 10 || weighDates.length < 2) return null;
  const first = weighDates[0], last = weighDates[weighDates.length - 1];
  const daysSpan = (parseDateStr(last) - parseDateStr(first)) / 86400000;
  if (daysSpan < 14) return null;
  const trendPerDay = (state.weights[last].weight - state.weights[first].weight) / daysSpan;
  const avgIntake = calDays.reduce(function(a, b){ return a + b; }, 0) / calDays.length;
  return { maintenance: Math.round(avgIntake - trendPerDay * kcalPerUnit), daysUsed: calDays.length };
}

// Two independent daily-calorie answers from the same maintenance estimate: what it takes to
// land the goal weight ON the target date, and what the chosen change-per-week pace implies
// (plus when that pace finishes). remaining is signed -- negative means cutting, so both
// recommendations naturally come out below maintenance on a cut and above on a bulk.
function computeGoalPlan(maintenance) {
  const set = state.settings;
  const unit = set.weightUnit || "lbs";
  const kcalPerUnit = KCAL_PER_WEIGHT_UNIT[unit] || 3500;
  const allDates = Object.keys(state.weights).sort();
  const current = allDates.length ? state.weights[allDates[allDates.length - 1]].weight : null;
  const goal = parseFloat(set.goalWeight);
  if (current == null || !goal) return null;
  const remaining = goal - current;
  const plan = { current: current, goal: goal, remaining: round1(remaining), unit: unit };
  if (set.goalDate) {
    const days = (parseDateStr(set.goalDate) - parseDateStr(todayStr())) / 86400000;
    if (days > 0) {
      const ratePerWeek = remaining / (days / 7);
      plan.byDate = { date: set.goalDate, ratePerWeek: round1(ratePerWeek), calories: Math.round(maintenance + (ratePerWeek / 7) * kcalPerUnit) };
    }
  }
  const rate = Math.abs(parseFloat(set.goalRatePerWeek));
  if (rate > 0 && remaining !== 0) {
    const signedRate = remaining < 0 ? -rate : rate;
    const weeks = Math.abs(remaining) / rate;
    plan.byRate = {
      ratePerWeek: signedRate,
      calories: Math.round(maintenance + (signedRate / 7) * kcalPerUnit),
      finishDate: fmtDate(new Date(Date.now() + weeks * 7 * 86400000)),
      weeks: round1(weeks),
    };
  }
  return (plan.byDate || plan.byRate) ? plan : null;
}

function goalPlanRow(calories, headline, detail) {
  const tooLow = calories < 1200;
  return '<div style="padding:12px 14px;background:' + C.inputBg + ';border-radius:12px;margin-top:10px">' +
    '<div style="display:flex;justify-content:space-between;align-items:center">' +
      '<div style="color:' + C.textSec + ';font-size:13px">' + headline + '</div>' +
      '<div style="font-size:20px;font-weight:800;color:' + (tooLow ? C.warning : C.calories) + '">' + calories.toLocaleString() + ' <span style="font-size:12px;font-weight:400;color:' + C.textMut + '">kcal/day</span></div>' +
    '</div>' +
    '<div style="color:' + C.textMut + ';font-size:11px;margin-top:4px">' + detail + '</div>' +
    (tooLow ? '<div style="color:' + C.warning + ';font-size:11px;margin-top:4px">⚠ Very aggressive — consider a slower pace or later date.</div>' : '') +
  '</div>';
}

function renderGoalPlanBlock() {
  const unit = state.settings.weightUnit || "lbs";
  const est = estimateMaintenanceCalories();
  if (!est) {
    return '<div style="color:' + C.textMut + ';font-size:12px;margin-top:12px">Calorie recommendations need more recent data — about 2+ weeks of logged food days and weigh-ins within the last 28 days.</div>';
  }
  let html = '<div style="margin-top:12px">' + statCard("Est. Maintenance", est.maintenance.toLocaleString() + " kcal/day") + '</div>';
  html += '<div style="color:' + C.textMut + ';font-size:11px;margin-top:6px">Measured from your own last ' + est.daysUsed + ' fully-logged days vs. your actual weight change — not a formula estimate.</div>';
  const plan = computeGoalPlan(est.maintenance);
  if (!plan) {
    html += '<div style="color:' + C.textMut + ';font-size:12px;margin-top:10px">Set a goal weight (and a target date or weekly pace) to get a recommended daily calorie target.</div>';
    return html;
  }
  const dirWord = plan.remaining < 0 ? "lose" : "gain";
  const fullDate = function(d) { return parseDateStr(d).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }); };
  if (plan.byDate) {
    html += goalPlanRow(
      plan.byDate.calories,
      "To hit " + plan.goal + " " + unit + " by " + fullDate(plan.byDate.date),
      "Requires " + (plan.byDate.ratePerWeek > 0 ? "+" : "") + plan.byDate.ratePerWeek + " " + unit + "/week from your current " + plan.current + " " + unit + "."
    );
  }
  if (plan.byRate) {
    html += goalPlanRow(
      plan.byRate.calories,
      "At " + Math.abs(plan.byRate.ratePerWeek) + " " + unit + "/week " + (plan.byRate.ratePerWeek < 0 ? "lost" : "gained"),
      "You'd " + dirWord + " " + Math.abs(plan.remaining) + " " + unit + " in about " + plan.byRate.weeks + " weeks — done around " + fullDate(plan.byRate.finishDate) + "."
    );
  }
  html += '<div style="color:' + C.textMut + ';font-size:11px;margin-top:8px">Recommendations shift automatically as your logged intake and weight trend change — check back after a week or two of new data.</div>';
  return html;
}

function patchGoalPlanBlock() {
  const el = document.getElementById("goalPlanBlock");

}

function renderWeightGoalsSection() {
  const set = state.settings;
  const allWeights = Object.keys(state.weights).sort().map(function(d){ return [d, state.weights[d]]; });
  const latestWeight = allWeights.length > 0 ? allWeights[allWeights.length-1][1].weight : null;
  const goalWeight = parseFloat(set.goalWeight);
  const remaining = (latestWeight != null && goalWeight) ? Math.abs(latestWeight - goalWeight) : null;
  const thirtyDaysAgo = Date.now() - 30*86400000;
  const last30 = allWeights.filter(function(w){ return parseDateStr(w[0]).getTime() >= thirtyDaysAgo; });
  let weeklyRate = null;
  if (last30.length >= 2) {
    const daysSpan = (parseDateStr(last30[last30.length-1][0]) - parseDateStr(last30[0][0])) / 86400000;
    if (daysSpan > 0) weeklyRate = (last30[last30.length-1][1].weight - last30[0][1].weight) / (daysSpan / 7);
  }
  const weeksToGoal = (weeklyRate && remaining) ? Math.abs(remaining / weeklyRate) : null;
  const estGoalDate = weeksToGoal ? new Date(Date.now() + weeksToGoal*7*86400000) : null;

  const effStartDate = set.startDate || (allWeights.length > 0 ? allWeights[0][0] : null);
  const effStartWeight = (set.startWeight != null && set.startWeight !== "") ? set.startWeight : (allWeights.length > 0 ? allWeights[0][1].weight : null);
  const totalChangeSinceStart = (latestWeight != null && effStartWeight != null) ? round1(latestWeight - effStartWeight) : null;

  let html = '<h3 class="cardTitle">Weight Goals</h3>';
  if (latestWeight != null) html += statCard("Current Weight", latestWeight + " " + set.weightUnit, C.text);
  const currentGoalType = set.goalType || "cut";
  html += '<div style="margin-top:16px"><label class="label">Goal Phase</label><div class="rowWrap">' +
    '<button class="chip' + (currentGoalType === 'cut' ? ' active' : '') + '" data-action="setGoalType" data-arg="cut">Cut</button>' +
    '<button class="chip' + (currentGoalType === 'maintain' ? ' active' : '') + '" data-action="setGoalType" data-arg="maintain">Maintenance</button>' +
    '<button class="chip' + (currentGoalType === 'bulk' ? ' active' : '') + '" data-action="setGoalType" data-arg="bulk">Bulk</button>' +
  '</div></div>';
  html += '<div style="margin-top:12px"><label class="label">Goal Weight (' + set.weightUnit + ')</label>' + textInput({ value: set.goalWeight, type: "number", bind: "goalWeight" }) + '</div>';
  html += '<div style="margin-top:12px"><label class="label">Target Date</label>' + textInput({ value: set.goalDate, type: "date", bind: "goalDate" }) + '</div>';
  html += '<div style="margin-top:12px"><label class="label">Desired Change Per Week (' + set.weightUnit + ', optional)</label>' + textInput({ value: set.goalRatePerWeek, type: "number", placeholder: "e.g. 1", bind: "goalRatePerWeek" }) + '</div>';
  if (remaining != null) {
    html += '<div class="row" style="margin-top:16px">' +
      statCard("Remaining", remaining.toFixed(1) + " " + set.weightUnit) +
      statCard("Est. Weeks", weeksToGoal ? weeksToGoal.toFixed(1) : "\u2014") +
    '</div>';
  }
  if (estGoalDate) {
    html += '<div style="margin-top:10px">' + statCard("Estimated Goal Date", estGoalDate.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"}), C.success) + '</div>';
  }

  html += '<div style="border-top:1px solid ' + C.border + ';margin:20px 0 16px"></div>';
  html += '<div class="label" style="margin-bottom:4px;text-transform:uppercase;font-weight:600;letter-spacing:0.5px">Recommended Calories</div>';
  html += '<div id="goalPlanBlock">' + renderGoalPlanBlock() + '</div>';

  html += '<div style="border-top:1px solid ' + C.border + ';margin:20px 0 16px"></div>';
  html += '<div class="label" style="margin-bottom:12px;text-transform:uppercase;font-weight:600;letter-spacing:0.5px">Starting Point</div>';
  html += '<div><label class="label">Starting Date</label>' + textInput({ value: set.startDate || "", type: "date", bind: "goalsStartDate" }) + '</div>';
  html += '<div style="margin-top:12px"><label class="label">Starting Weight (' + set.weightUnit + ')</label>' + textInput({ value: set.startWeight != null ? set.startWeight : "", type: "number", placeholder: effStartWeight != null ? String(effStartWeight) : "", bind: "goalsStartWeight" }) + '</div>';
  if (totalChangeSinceStart != null) {
    html += '<div style="margin-top:12px">' + statCard("Total Change Since Start", (totalChangeSinceStart > 0 ? "+" : "") + totalChangeSinceStart + " " + set.weightUnit, totalChangeSinceStart <= 0 ? C.success : C.danger) + '</div>';
  }
  html += '<div style="color:' + C.textMut + ';font-size:11px;margin-top:8px">Leave blank to auto-use your earliest logged weight. This also drives the "Total Change" and "Weekly Change" stats on the Weight tab.</div>';

  return card(html);
}

actions.askEditBarcode = function(code) {
  const su = strategyUi();
  const food = state.customBarcodes[code];
  if (!food) return;
  su.editingBarcodeCode = code;
  su.confirmDeleteBarcodeCode = null;
  const grams = (food.servingSizes && food.servingSizes[0] && food.servingSizes[0].grams) || 100;
  su.editBarcodeManual = { name: food.name, weight: String(grams), calories: String(food.calories), protein: String(food.protein), carbs: String(food.carbs), fat: String(food.fat), fiber: String(food.fiber || 0) };
  rerender();
};
actions.cancelEditBarcode = function() { const su = strategyUi(); su.editingBarcodeCode = null; su.editBarcodeManual = null; rerender(); };
actions.saveEditBarcode = function() {
  const su = strategyUi();
  const code = su.editingBarcodeCode;
  const m = su.editBarcodeManual;
  if (!code || !m || !m.name.trim()) return;
  const weightParsed = parseFloat(m.weight);
  const weight = isNaN(weightParsed) ? 100 : Math.max(0, weightParsed);
  const food = {
    id: "barcode_" + code, name: m.name.trim(), brand: "", source: "Custom Barcode Entry",
    per100g: false, calories: Math.max(0, parseFloat(m.calories) || 0), protein: Math.max(0, parseFloat(m.protein) || 0),
    carbs: Math.max(0, parseFloat(m.carbs) || 0), fat: Math.max(0, parseFloat(m.fat) || 0), fiber: Math.max(0, parseFloat(m.fiber) || 0),
    state: "—", servingSizes: [{ label: weight + "g", grams: weight }],
  };
  state.customBarcodes[code] = food;
  saveCustomBarcodes();
  if (state.foodCache["barcode_" + code]) { state.foodCache["barcode_" + code] = food; saveFoodCache(); }
  su.editingBarcodeCode = null;
  su.editBarcodeManual = null;
  rerender();
};
actions.askDeleteBarcode = function(code) { const su = strategyUi(); su.confirmDeleteBarcodeCode = code; su.editingBarcodeCode = null; rerender(); };
actions.cancelDeleteBarcode = function() { strategyUi().confirmDeleteBarcodeCode = null; rerender(); };
actions.deleteBarcode = function(code) {
  strategyUi().confirmDeleteBarcodeCode = null;
  delete state.customBarcodes[code];
  saveCustomBarcodes();
  scheduleCloudDelete("custom_barcodes", "barcode", code);
  rerender();
};

changeActions.importData = function(el) {
  const file = el.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.settings) { state.settings = Object.assign({}, DEFAULT_SETTINGS, data.settings); saveSettings(); }
      if (data.foodLogs) { state.foodLogs = data.foodLogs; saveFoodLogs(); }
      if (data.weights) { state.weights = data.weights; saveWeights(); }
      if (data.favorites) { state.favorites = data.favorites; saveFavorites(); }
      if (data.recentFoods) { state.recentFoods = data.recentFoods; saveRecentFoods(); }
      if (data.recipes) { state.recipes = data.recipes; saveRecipes(); }
      if (data.customBarcodes) { state.customBarcodes = data.customBarcodes; saveCustomBarcodes(); }
      alert("Data imported successfully!");
      rerender();
    } catch (e) { alert("Error importing data. Check file format."); }
  };
  reader.readAsText(file);
  el.value = "";
};
actions.askConfirmClear = function() { strategyUi().confirmClear = true; rerender(); };
actions.cancelConfirmClear = function() { strategyUi().confirmClear = false; rerender(); };
actions.clearAllData = async function() {
  const su = strategyUi();
  su.clearing = true;
  rerender();
  // Local wipe + push functions all upsert and never delete, so pushing an empty dataset
  // afterward wouldn't actually remove anything already in the cloud. Explicit DELETEs
  // (RLS-scoped to just this user's rows via user_id) are the only thing that really clears it.
  if (state.session) {
    const uid = state.session.userId;
    await Promise.all([
      supabaseTable("food_log_entries?user_id=eq." + uid, { method: "DELETE" }),
      supabaseTable("weight_entries?user_id=eq." + uid, { method: "DELETE" }),
      supabaseTable("recipes?user_id=eq." + uid, { method: "DELETE" }),
      supabaseTable("custom_barcodes?user_id=eq." + uid, { method: "DELETE" }),
      supabaseTable("user_settings?user_id=eq." + uid, { method: "DELETE" }),
      supabaseTable("user_app_data?user_id=eq." + uid, { method: "DELETE" }),
    ]);
  }
  state.settings = Object.assign({}, DEFAULT_SETTINGS);
  state.foodLogs = {}; state.weights = {}; state.favorites = []; state.recentFoods = []; state.foodCache = {}; state.recipes = []; state.customBarcodes = {};
  saveSettings(); saveFoodLogs(); saveWeights(); saveFavorites(); saveRecentFoods(); saveFoodCache(); saveRecipes(); saveCustomBarcodes();
  su.clearing = false;
  su.confirmClear = false;
  rerender();
};


// ============================================================
// INIT
// ============================================================
cleanExpiredPhotos();
if (!state.session) pendingFocusId = "loginEmailInput";
render();

// Best-effort real orientation lock (mainly Android, only works once installed/standalone --
// the manifest's "orientation":"portrait" hint covers the same case more reliably on its own).
// Neither this nor the manifest hint does anything on iOS Safari, which doesn't support locking
// web content's orientation at all -- the CSS landscape-block overlay above is what actually
// guarantees portrait-only there, and works everywhere regardless of API support.
if (screen.orientation && screen.orientation.lock) {
  screen.orientation.lock("portrait").catch(function() {});
}

// On boot, if already signed in, catch up with anything changed elsewhere (another device,
// a future companion app) and flush anything local that hasn't synced yet. This also keeps
// the session token fresh. Non-blocking - never delays first paint, only rerenders if
// something was actually pulled in that wasn't already showing.
if (state.session) {
  pullAndMergeAll().then(function(result) {
    // Rerender if anything at all was merged in -- not just food logs/weights. Restoring
    // recentFoods/favorites from the cloud (e.g. after a local eviction wiped History) needs a
    // repaint too, or the History tab would keep showing "empty" until the user navigated.
    if (result && result.data && result.data.totalAdded > 0) rerender();
  });
}

// If the app has been backgrounded for a while (not just a quick app-switch), treat
// coming back to it like reopening it: land on Dashboard / today, not wherever it was left.
let hiddenSinceMs = null;
document.addEventListener("visibilitychange", function() {
  if (document.hidden) {
    hiddenSinceMs = Date.now();
    // The moment the app is backgrounded is exactly when a pending debounced sync is most at
    // risk of never firing (see scheduleCloudSync above) -- flush now rather than hoping the
    // timer survives.
    flushPendingCloudSyncs();
  } else {
    if (hiddenSinceMs && (Date.now() - hiddenSinceMs) > 10 * 60 * 1000) {
      stopBarcodeCamera();
      state.tab = "dashboard";
      state.date = todayStr();
      state.ui = {};
      rerender();
    }
    hiddenSinceMs = null;
  }
});
// Covers actual navigation away/tab close, which visibilitychange doesn't always precede
// (e.g. closing a background tab directly) -- a second, redundant flush is harmless since
// flushPendingCloudSyncs() only acts on syncs that are still actually pending.
window.addEventListener("pagehide", flushPendingCloudSyncs);

// Physical back button and edge-swipe-back gestures both fire popstate. Collapse exactly
// one app-level level (see collapseOneNavLevel above) instead of letting the browser close
// the app -- it only actually exits once we're already at the base (dashboard) level, since
// that's the point where there's nothing left in our pushed history to intercept.
window.addEventListener("popstate", function() {
  backNavPending = false;
  if (navDepth > 0) navDepth--;
  collapseOneNavLevel();
  rerender();
});

</script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js', {scope:'./', updateViaCache:'none'}).then(function(reg){
    reg.update();
    var reloaded = false;
    navigator.serviceWorker.addEventListener('controllerchange', function(){
      if (reloaded) return;
      reloaded = true;
      window.location.reload();
    });
  }).catch(function(e){});
}
</script>
